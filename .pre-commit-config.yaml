default_install_hook_types:
  - pre-commit
  - pre-push

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: check-merge-conflict
      - id: mixed-line-ending
        # Fixer: pre-commit only. Pre-push must stay check-only so a push
        # never mutates the working tree.
        stages:
          - pre-commit

  - repo: https://github.com/adrienverge/yamllint
    rev: v1.38.0
    hooks:
      - id: yamllint
        args:
          - -c
          - .yamllint.yaml
        files: '(?i)\.(ya?ml)$'

  - repo: local
    hooks:
      - id: dotnet-tool-restore
        name: Install .NET tools
        entry: dotnet tool restore
        language: system
        files: '^\.config/dotnet-tools\.json$'
        pass_filenames: false
        stages:
          - pre-commit
        description: Install the .NET tools listed at .config/dotnet-tools.json.
      - id: fix-csharp-underscore-methods
        name: Auto-fix C# method names (remove underscores)
        entry: node scripts/fix-csharp-underscore-methods.js
        language: system
        types:
          - c#
        stages:
          - pre-commit
      - id: csharpier
        name: Run CSharpier on C# files
        entry: dotnet tool run csharpier format
        language: system
        types:
          - c#
        require_serial: true
        stages:
          - pre-commit
        description: Opinionated C# formatter. Restage files it rewrites.
      - id: sync-banner-version
        name: Sync banner version from package.json
        entry: node scripts/sync-banner-version.js
        language: system
        # always_run (not a files: filter): pre-commit's changed-file list
        # excludes deletions, so a files: pattern would never fire when a
        # *Tests.cs file is deleted and the banner test count would go stale
        # until CI's validate-banner workflow caught it. The script is fast
        # and idempotent, so run it on every commit.
        always_run: true
        pass_filenames: false
        stages:
          - pre-commit
        description: >-
          Sync package version and test count into the SVG banner. If it
          rewrites the banner, pre-commit reports the modified file; restage
          and commit again.
      - id: prettier
        name: Prettier (markdown, JSON, asmdef, asmref, YAML)
        entry: npx --no-install prettier --write
        language: system
        files: '(?i)\.(md|markdown|json|asmdef|asmref|ya?ml)$'
        require_serial: true
        stages:
          - pre-commit
      - id: markdownlint
        name: markdownlint-cli2
        entry: npx --no-install markdownlint-cli2 --fix
        language: system
        files: '(?i)\.(md|markdown)$'
        stages:
          - pre-commit
      - id: update-llms-txt
        name: Verify llms.txt is up-to-date
        entry: node scripts/update-llms-txt.js --check
        language: system
        pass_filenames: false
        # always_run (not a files: filter): pre-commit's changed-file list
        # excludes deletions, so a files: pattern would never fire when a
        # .llm/skills/*.md file is deleted, even though llms.txt enumerates
        # the skills directory and would go stale until CI's
        # validate-llms-txt workflow caught it. The --check run is fast and
        # idempotent, so run it on every commit (same rationale as
        # sync-banner-version above).
        always_run: true
        stages:
          - pre-commit
        description: Run "npm run update:llms-txt" when this fails.
      - id: validate-asmdef-references
        name: Validate asmdef precompiled references
        entry: node scripts/validate-asmdef-references.js
        language: system
        pass_filenames: false
        files: '\.asmdef$'
        stages:
          - pre-push
        description: >-
          Fail when a package asmdef populates precompiledReferences while
          overrideReferences is false (compiles in the Editor but breaks
          standalone/IL2CPP player builds).
      - id: validate-npm-meta
        name: Validate npm tarball hygiene
        entry: node scripts/validate-npm-meta.js
        language: system
        pass_filenames: false
        files: '^(package\.json|\.npmignore|CHANGELOG\.md|Editor/|Runtime/|Samples~/|SourceGenerators/)'
        stages:
          - pre-push
        description: >-
          Run npm pack dry-run checks that reject forbidden build-artifact
          paths and enforce Unity .meta pairing for shipped package files.
      - id: cspell
        name: Check spelling
        # --no-must-find-files: without it cspell exits 1 when every file
        # pre-commit passes is excluded by .cspell.json ignorePaths (e.g. a
        # push that only touches Samples~/**), failing with zero issues.
        entry: npx --no-install cspell --no-progress --no-summary --no-must-find-files
        language: system
        files: '(?i)\.(md|markdown|cs|json|ya?ml|ps1|js)$'
        pass_filenames: true
        require_serial: true
        stages:
          - pre-push
      - id: script-tests
        name: Run JavaScript script tests (node --test)
        entry: node --test scripts/
        language: system
        pass_filenames: false
        files: '^(package\.json|scripts/.*\.js)$'
        stages:
          - pre-push
