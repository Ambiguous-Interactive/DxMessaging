# DxMessaging — theme block to merge into mkdocs.yml
# (Replaces the current indigo/Roboto theme config. Keep your existing
# nav/plugins/markdown_extensions as they are.)

site_name: DxMessaging

theme:
  name: material
  custom_dir: docs/overrides          # for the homepage template
  logo: images/dxmessaging-mark.svg   # copy from production/brand/
  favicon: images/favicon-32.png      # copy from production/png/
  font:
    text: IBM Plex Sans
    code: JetBrains Mono
  palette:
    # Dark first — Dx family default
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: custom
      accent: custom
      toggle:
        icon: material/weather-night
        name: Switch to light mode
    # Light — Press paper
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: custom
      accent: custom
      toggle:
        icon: material/weather-sunny
        name: Switch to dark mode
  features:
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.indexes
    - navigation.top
    - navigation.footer
    - toc.follow
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.code.annotate
    - content.tabs.link

extra_css:
  - stylesheets/extra.css
