name: Lint Docs Links

# Blocking PR/push link check. Three gates, all deterministic enough to gate a PR:
#   1. Link-text style: check-markdown-links.ps1 flags markdown-to-markdown links
#      whose link text is just the raw file name (e.g. "[README.md](README.md)");
#      link text must be human-readable. This is a style check lychee cannot do
#      (lychee checks validity, not text), and markdownlint's MD059 only bans
#      generic texts like "here", not raw file names.
#   2. Offline: relative/local links AND in-repo "#anchor" fragments are validated
#      against the working tree with zero network, so they can never flake. (This
#      is a separate pass from gate 3 precisely so that EXTERNAL fragments are NOT
#      liveness-checked -- a remote page restructuring its anchors must never red a
#      PR. Local anchors are deterministic; external ones are not.)
#   3. Lenient external liveness: bot-detection / rate-limit / transient codes are
#      accepted (see .lychee.toml), and this blocking pass treats timeouts as
#      advisory via lychee's native --accept-timeouts=true CLI flag. A PR fails
#      only on a genuinely dead link (404/410 or DNS/connection failure).
# Both lychee passes are fed the set of TRACKED docs via `git ls-files |
# --files-from`, so vendored/generated/scratch trees are excluded automatically
# (lychee's glob does NOT honor .gitignore). Deep external rot is tracked by the
# scheduled advisory scan in markdown-link-validity.yml.

on:
  push:
    branches:
      - main
      - master
    paths:
      - "**/*.md"
      - "**/*.markdown"
      - "docs/**"
      - ".lychee.toml"
      - ".github/scripts/check-markdown-links.ps1"
      - ".github/actions/install-pinned-lychee/action.yml"
      - ".github/workflows/lint-doc-links.yml"
  # No pull_request paths filter: the workflow must always start so its required
  # check reports on every PR shape. The `changes` job decides whether to do the
  # real work; when nothing relevant changed it skips to success. See
  # docs/runbooks/required-checks.md.
  pull_request:
    branches:
      - main
      - master
  workflow_dispatch:

permissions:
  contents: read

jobs:
  changes:
    name: Detect docs-link-affecting changes
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
      pull-requests: read
    outputs:
      relevant: ${{ steps.filter.outputs.relevant }}
    steps:
      - name: Determine whether relevant files changed
        id: filter
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if [ "${{ github.event_name }}" != "pull_request" ]; then
            echo "relevant=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          if ! files="$(gh api \
            "repos/${{ github.repository }}/pulls/${{ github.event.pull_request.number }}/files" \
            --paginate --jq '.[].filename')"; then
            echo "relevant=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          pattern='(\.md$|\.markdown$|^docs/|^\.lychee\.toml$'
          pattern="$pattern"'|^\.github/scripts/check-markdown-links\.ps1$'
          pattern="$pattern"'|^\.github/actions/install-pinned-lychee/action\.yml$'
          pattern="$pattern"'|^\.github/workflows/lint-doc-links\.yml$)'
          if printf '%s\n' "$files" | grep -qE "$pattern"; then
            echo "relevant=true" >> "$GITHUB_OUTPUT"
          else
            echo "relevant=false" >> "$GITHUB_OUTPUT"
          fi

  lint:
    name: Lint docs links
    needs: changes
    if: ${{ always() && (needs.changes.result != 'success' || needs.changes.outputs.relevant != 'false') }}
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Validate change detection
        if: ${{ needs.changes.result != 'success' || (needs.changes.outputs.relevant != 'true' && needs.changes.outputs.relevant != 'false') }}
        run: |
          echo "::error::Change detection concluded '${{ needs.changes.result }}' with relevant='${{ needs.changes.outputs.relevant }}'."
          echo "::error::Required gates only skip after successful detection emits relevant=false."
          exit 1

      - name: Checkout
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      # Gate 1 -- link-text style. Flags markdown-to-markdown links whose text is
      # just the raw target file name; link text must be human-readable.
      - name: Check markdown link text is human-readable
        shell: pwsh
        run: ./.github/scripts/check-markdown-links.ps1 -Root .

      # Source of truth for "which docs to check": tracked files only. lychee's
      # glob ignores .gitignore, so this is how node_modules / site / coverage /
      # progress / etc. are kept out -- no denylist to drift or to over-match.
      - name: Collect tracked docs
        run: |
          git ls-files -z '*.md' '*.markdown' | tr '\0' '\n' \
            > "${RUNNER_TEMP}/doc-files.txt"
          echo "Checking $(wc -l < "${RUNNER_TEMP}/doc-files.txt") tracked doc(s)."

      - name: Install pinned lychee
        uses: ./.github/actions/install-pinned-lychee
        with:
          version: v0.24.2

      # Gate 2 -- offline. Validates relative/local links and in-repo "#anchor"
      # fragments against files on disk. No network, so a failure is a real broken
      # local link or a missing heading anchor, never a flake.
      - name: Check internal links and anchors (offline)
        run: |
          lychee \
            -c .lychee.toml \
            --offline \
            --include-fragments \
            --files-from "${RUNNER_TEMP}/doc-files.txt"

      # Gate 3 -- external liveness. Timeout acceptance is command-line-only here:
      # the scheduled advisory scan should still report persistent slow hosts.
      - name: Probe external link liveness
        run: |
          lychee \
            -c .lychee.toml \
            --scheme https \
            --scheme http \
            --accept-timeouts=true \
            --files-from "${RUNNER_TEMP}/doc-files.txt"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # Diagnostics: explain how to read a failure so contributors never reach for a
      # per-domain exclude again (the pattern that caused the original incident).
      - name: Explain link-check failures
        if: failure()
        run: |
          cat >> "${GITHUB_STEP_SUMMARY}" <<'EOF'
          ## How to read a link-check failure

          This job fails for exactly these reasons:

          - **Broken internal link or anchor** (offline gate): a relative link
            points at a missing file, or a `#anchor` matches no heading. Fix the
            path or the anchor text. (Note: lychee derives heading slugs slightly
            differently from GitHub for headings with consecutive spaces -- collapse
            double spaces in headings if a valid-looking anchor is flagged.)
          - **Dead external link** (liveness gate): the URL returned 404/410 or
            failed to connect/resolve. Update the link to its new location.

          Bot-detection and throttling responses
          (401/403/405/406/408/415/418/429/451/999/5xx) are ACCEPTED, and timeouts
          are accepted by this workflow's `--accept-timeouts=true` flag. Do NOT add
          a per-domain `exclude` to silence a 403; widen `accept` in `.lychee.toml`
          only if a site adopts a brand-new blocking status code.
          EOF
