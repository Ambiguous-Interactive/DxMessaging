name: Lint Docs Links

# Blocking PR/push link check. Two gates, both deterministic enough to gate a PR:
#   1. Offline: relative/local links AND in-repo "#anchor" fragments are validated
#      against the working tree with zero network, so they can never flake. (This
#      is a separate pass from gate 2 precisely so that EXTERNAL fragments are NOT
#      liveness-checked -- a remote page restructuring its anchors must never red a
#      PR. Local anchors are deterministic; external ones are not.)
#   2. Lenient external liveness: bot-detection / rate-limit / transient codes are
#      accepted (see .lychee.toml), and this blocking pass treats timeouts as
#      advisory via lychee's native --accept-timeouts=true CLI flag. A PR fails
#      only on a genuinely dead link (404/410 or DNS/connection failure).
# Both passes are fed the set of TRACKED docs via `git ls-files | --files-from`, so
# vendored/generated/scratch trees are excluded automatically (lychee's glob does
# NOT honor .gitignore). Deep external rot is tracked by the scheduled advisory
# scan in markdown-link-validity.yml.

on:
  push:
    branches:
      - main
      - master
    paths:
      - "**/*.md"
      - "**/*.markdown"
      - "docs/**"
      - ".lychee.toml"
      - "scripts/lint-doc-links.ps1"
      - "scripts/validate-lychee-config.js"
      - ".github/actions/install-pinned-lychee/action.yml"
  pull_request:
    paths:
      - "**/*.md"
      - "**/*.markdown"
      - "docs/**"
      - ".lychee.toml"
      - "scripts/lint-doc-links.ps1"
      - "scripts/validate-lychee-config.js"
      - ".github/actions/install-pinned-lychee/action.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22.18.0"
          cache: "npm"
          cache-dependency-path: package.json

      - name: Validate lychee configuration
        run: node scripts/validate-lychee-config.js

      - name: Run Markdown link linter
        shell: pwsh
        run: ./scripts/lint-doc-links.ps1 -VerboseOutput

      # Source of truth for "which docs to check": tracked files only. lychee's
      # glob ignores .gitignore, so this is how node_modules / site / coverage /
      # progress / etc. are kept out -- no denylist to drift or to over-match.
      - name: Collect tracked docs
        run: |
          git ls-files -z '*.md' '*.markdown' | tr '\0' '\n' \
            > "${RUNNER_TEMP}/doc-files.txt"
          echo "Checking $(wc -l < "${RUNNER_TEMP}/doc-files.txt") tracked doc(s)."

      - name: Install pinned lychee
        uses: ./.github/actions/install-pinned-lychee
        with:
          version: v0.24.2

      # Gate 1 -- offline. Validates relative/local links and in-repo "#anchor"
      # fragments against files on disk. No network, so a failure is a real broken
      # local link or a missing heading anchor, never a flake.
      - name: Check internal links and anchors (offline)
        run: |
          lychee \
            -c .lychee.toml \
            --offline \
            --include-fragments \
            --files-from "${RUNNER_TEMP}/doc-files.txt"

      # Gate 2 -- external liveness. Timeout acceptance is command-line-only here:
      # the scheduled advisory scan should still report persistent slow hosts.
      - name: Probe external link liveness
        run: |
          lychee \
            -c .lychee.toml \
            --scheme https \
            --scheme http \
            --accept-timeouts=true \
            --files-from "${RUNNER_TEMP}/doc-files.txt"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # Diagnostics: explain how to read a failure so contributors never reach for a
      # per-domain exclude again (the pattern that caused the original incident).
      - name: Explain link-check failures
        if: failure()
        run: |
          cat >> "${GITHUB_STEP_SUMMARY}" <<'EOF'
          ## How to read a link-check failure

          This job fails for exactly these reasons:

          - **Broken internal link or anchor** (offline gate): a relative link
            points at a missing file, or a `#anchor` matches no heading. Fix the
            path or the anchor text. (Note: lychee derives heading slugs slightly
            differently from GitHub for headings with consecutive spaces -- collapse
            double spaces in headings if a valid-looking anchor is flagged.)
          - **Dead external link** (liveness gate): the URL returned 404/410 or
            failed to connect/resolve. Update the link to its new location.

          Bot-detection and throttling responses
          (401/403/405/406/408/415/418/429/451/999/5xx) are ACCEPTED, and timeouts
          are accepted by this workflow's `--accept-timeouts=true` flag. Do NOT add
          a per-domain `exclude` to silence a 403; widen `accept` in `.lychee.toml`
          only if a site adopts a brand-new blocking status code.
          EOF
