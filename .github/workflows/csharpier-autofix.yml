name: CSharpier Auto Format

on:
  pull_request:
    paths:
      - "**/*.cs"
      - ".config/dotnet-tools.json"
      - ".csharpierrc*"
      - "**/.csharpierrc*"
      - ".csharpierignore"
      - "**/.csharpierignore"
      - ".editorconfig"
      - "**/.editorconfig"
  pull_request_target:
    paths:
      - "**/*.cs"
      - ".config/dotnet-tools.json"
      - ".csharpierrc*"
      - "**/.csharpierrc*"
      - ".csharpierignore"
      - "**/.csharpierignore"
      - ".editorconfig"
      - "**/.editorconfig"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write
  pull-requests: write

jobs:
  format:
    name: Format and propose changes
    if: ${{ github.event_name != 'pull_request_target' }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Setup .NET
        uses: actions/setup-dotnet@a98b56852c35b8e3190ac28c8c2271da59106c68 # v6.0.0
        with:
          dotnet-version: "8.0.x"

      - name: Restore .NET tools
        run: dotnet tool restore

      - name: Run CSharpier (format repository)
        if: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository && github.event.pull_request.user.login == 'dependabot[bot]' }}
        # The trailing "." is required: without a path, "csharpier format"
        # reads stdin (empty in a run step) and formats nothing.
        run: dotnet tool run csharpier format .

      - name: Renormalize line endings
        if: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository && github.event.pull_request.user.login == 'dependabot[bot]' }}
        shell: bash
        run: |
          # Renormalize each extension separately to avoid "pathspec did not match" failures
          # when certain file types don't exist or aren't accessible in this checkout context
          for ext in cs; do
            if git ls-files "*.$ext" "**/*.$ext" | grep -q .; then
              git add --renormalize -- "*.$ext" "**/*.$ext"
            fi
          done

      - name: Configure push credentials
        if: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository && github.event.pull_request.user.login == 'dependabot[bot]' }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: git remote set-url origin "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"

      - name: Commit formatting changes to PR branch (Dependabot only)
        if: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository && github.event.pull_request.user.login == 'dependabot[bot]' }}
        uses: stefanzweifel/git-auto-commit-action@4a55954c782fc1ea30b9056cd3e7a2b40ca8887d # v7
        with:
          commit_message: "chore(format): apply CSharpier formatting"
          branch: ${{ github.head_ref }}
          add_options: --renormalize
          file_pattern: |
            **/*.cs

      - name: Clear push credentials
        if: ${{ always() && github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository && github.event.pull_request.user.login == 'dependabot[bot]' }}
        run: git remote set-url origin "https://github.com/${GITHUB_REPOSITORY}.git"

      - name: Verify formatting (CI gate)
        run: dotnet tool run csharpier check .

  format_fork:
    name: Fork PR bot formatting PR (Dependabot only)
    if: ${{ github.event_name == 'pull_request_target' && github.event.pull_request.head.repo.full_name != github.repository && github.event.pull_request.user.login == 'dependabot[bot]' }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout fork PR HEAD
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
        with:
          repository: ${{ github.event.pull_request.head.repo.full_name }}
          ref: ${{ github.event.pull_request.head.ref }}
          persist-credentials: false
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@a98b56852c35b8e3190ac28c8c2271da59106c68 # v6.0.0
        with:
          dotnet-version: "8.0.x"

      - name: Restore .NET tools
        # Use the fork checkout's tool manifest (.config/dotnet-tools.json) so
        # the CSharpier version stays pinned in exactly one place and cannot
        # drift from the same-repo "check ." gate.
        run: dotnet tool restore

      - name: Run CSharpier (format repository)
        # CSharpier 1.x requires the "format" subcommand, and the trailing "."
        # is required: without a path, "csharpier format" reads stdin (empty
        # in a run step) and formats nothing.
        run: dotnet tool run csharpier format .

      - name: Renormalize line endings
        shell: bash
        run: |
          # Renormalize each extension separately to avoid "pathspec did not match" failures
          # when certain file types don't exist or aren't accessible in this checkout context
          for ext in cs; do
            if git ls-files "*.$ext" "**/*.$ext" | grep -q .; then
              git add --renormalize -- "*.$ext" "**/*.$ext"
            fi
          done

      - name: Detect changes
        id: changes
        shell: bash
        run: |
          if git diff --quiet; then
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
          else
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Create bot branch and push to base repo
        if: steps.changes.outputs.has_changes == 'true'
        shell: bash
        env:
          GH_REPO: ${{ github.repository }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          BRANCH="bot/csharpier/pr-${{ github.event.pull_request.number }}"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout -B "$BRANCH"
          # Only stage C# files to avoid touching workflow YAML (requires special permissions)
          # Use --renormalize to ensure LF line endings in git index per .gitattributes
          # Renormalize each extension separately to avoid "pathspec did not match" failures
          for ext in cs; do
            if git ls-files "*.$ext" "**/*.$ext" | grep -q .; then
              git add --renormalize -- "*.$ext" "**/*.$ext"
            fi
          done
          git commit -m "chore(format): apply CSharpier formatting for PR #${{ github.event.pull_request.number }}"
          auth_header="$(printf 'x-access-token:%s' "${GH_TOKEN}" | base64 | tr -d '\n')"
          git remote add upstream "https://github.com/${GH_REPO}.git"
          git -c "http.https://github.com/.extraheader=AUTHORIZATION: basic ${auth_header}" fetch upstream
          git -c "http.https://github.com/.extraheader=AUTHORIZATION: basic ${auth_header}" push upstream "$BRANCH" --force
          echo "branch=$BRANCH" >> "$GITHUB_OUTPUT"

      - name: Open or update formatting PR in base repo
        if: steps.changes.outputs.has_changes == 'true'
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9
        with:
          script: |
            const prNumber = context.payload.pull_request.number;
            const baseRef = context.payload.pull_request.base.ref;
            const headBranch = `bot/csharpier/pr-${prNumber}`;
            const {owner, repo} = context.repo;
            const title = `chore(format): Apply CSharpier to PR #${prNumber}`;
            const body = [
              `This automated PR applies CSharpier formatting to the changes from PR #${prNumber}.`,
              '',
              `- Source PR (fork): #${prNumber}`,
              `- Target branch: ${baseRef}`,
              '',
              'If this PR is merged, it will include the contributor\'s changes plus required formatting.',
              'You can then close the original PR or ask the author to rebase.',
            ].join('\n');

            // Check if a PR from this branch already exists
            const existing = await github.rest.pulls.list({ owner, repo, state: 'open', head: `${owner}:${headBranch}` });
            if (existing.data.length === 0) {
              await github.rest.pulls.create({ owner, repo, head: headBranch, base: baseRef, title, body });
            }

      - name: Comment link on original PR
        if: steps.changes.outputs.has_changes == 'true'
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9
        with:
          script: |
            const prNumber = context.payload.pull_request.number;
            const {owner, repo} = context.repo;
            const headBranch = `bot/csharpier/pr-${prNumber}`;
            // Find the formatting PR we just created or updated
            const resp = await github.rest.pulls.list({ owner, repo, state: 'open', head: `${owner}:${headBranch}` });
            if (resp.data.length > 0) {
              const fmtPr = resp.data[0];
              const body = `A formatting PR has been opened: #${fmtPr.number} (applies CSharpier to this PR).`;
              // Avoid duplicate comments by checking recent comments
              const comments = await github.rest.issues.listComments({ owner, repo, issue_number: prNumber, per_page: 50 });
              const already = comments.data.some(
                (c) =>
                  c.body &&
                  c.body.includes(`#${fmtPr.number}`) &&
                  c.user &&
                  c.user.login === 'github-actions[bot]'
              );
              if (!already) {
                await github.rest.issues.createComment({ owner, repo, issue_number: prNumber, body });
              }
            }
