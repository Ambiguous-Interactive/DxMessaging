# =============================================================================
# Devcontainer Build + Validation Test
# =============================================================================
# Purpose:
#   Builds the .devcontainer image (with the GHCR-cached layers) and runs an
#   in-container smoke test verifying:
#     - .NET SDK (9 + 10 side-by-side) is present and runnable
#     - git LFS is installed (Unity LFS workflow)
#     - PowerShell is installed (parity with .ps1 entry points)
#     - The asmdef-discovery node module loads and self-tests cleanly
#     - The cache-mount contract still holds (validate-caching.sh)
#     - The script-test node:test suite (node --test scripts/) passes inside
#       the devcontainer image
#
# Local Unity verification is NOT exercised here: it runs through the
# unity-mcp-remote MCP server (the host editor), not inside this container.
#
# Triggers:
#   - PRs to master; the `changes` job skips unrelated PRs while still
#     reporting the required check.
#   - Pushes to master with the same paths (keep main image cache warm)
#   - Manual dispatch
#
# Critical: eventFilterForPush
#   devcontainers/ci@513af61f4de4f75d37e4438f184ba4358f0fc1ca # v0.3 defaults `eventFilterForPush` to "push", which
#   silently SKIPS pushing the image on `schedule` / `workflow_dispatch`
#   events. Setting it to "" makes the `push` knob the single source of
#   truth (combined with `refFilterForPush: refs/heads/master`). This gotcha
#   is documented in .llm/skills/github-actions/cicd-devcontainer-workflows.md.
# =============================================================================

name: Test Devcontainer

on:
  push:
    branches:
      - master
    paths:
      - ".devcontainer/**"
      - ".github/**"
      - "scripts/unity/**"
  pull_request:
    branches:
      - master
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  changes:
    name: Detect devcontainer-affecting changes
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
      pull-requests: read
    outputs:
      relevant: ${{ steps.filter.outputs.relevant }}
    steps:
      - name: Determine whether relevant files changed
        id: filter
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if [ "${{ github.event_name }}" != "pull_request" ]; then
            echo "relevant=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          if ! files="$(gh api \
            "repos/${{ github.repository }}/pulls/${{ github.event.pull_request.number }}/files" \
            --paginate --jq '.[].filename')"; then
            echo "relevant=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          if printf '%s\n' "$files" | grep -qE '(^\.devcontainer/|^\.github/|^scripts/unity/)'; then
            echo "relevant=true" >> "$GITHUB_OUTPUT"
          else
            echo "relevant=false" >> "$GITHUB_OUTPUT"
          fi

  test:
    name: Build + smoke-test devcontainer image
    needs: changes
    if: ${{ always() && (needs.changes.result != 'success' || needs.changes.outputs.relevant != 'false') }}
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      contents: read
      packages: write
    steps:
      - name: Validate change detection
        if: ${{ needs.changes.result != 'success' || (needs.changes.outputs.relevant != 'true' && needs.changes.outputs.relevant != 'false') }}
        run: |
          echo "::error::Change detection concluded '${{ needs.changes.result }}' with relevant='${{ needs.changes.outputs.relevant }}'."
          echo "::error::Required gates only skip after successful detection emits relevant=false."
          exit 1

      - name: Checkout repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
        with:
          lfs: true
          persist-credentials: false

      - name: Debug workflow context
        run: |
          echo "Event name: ${{ github.event_name }}"
          echo "Ref: ${{ github.ref }}"
          echo "Actor: ${{ github.actor }}"

      - name: Set lowercase repository name
        id: repo
        run: |
          set -euo pipefail
          repo_lower=$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')
          echo "repository_lowercase=${repo_lower}" >> "${GITHUB_OUTPUT}"

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Pre-build devcontainer image
        uses: devcontainers/ci@513af61f4de4f75d37e4438f184ba4358f0fc1ca # v0.3
        env:
          BUILDKIT_PROGRESS: plain
        with:
          imageName: ghcr.io/${{ steps.repo.outputs.repository_lowercase }}/devcontainer
          cacheFrom: ghcr.io/${{ steps.repo.outputs.repository_lowercase }}/devcontainer
          push: filter
          refFilterForPush: refs/heads/master
          # Required: devcontainers/ci defaults eventFilterForPush to "push",
          # which silently skips push on schedule / workflow_dispatch triggers.
          # Empty string here makes `push` + `refFilterForPush` the single
          # source of truth.
          eventFilterForPush: ""

      - name: Run devcontainer smoke tests
        uses: devcontainers/ci@513af61f4de4f75d37e4438f184ba4358f0fc1ca # v0.3
        with:
          imageName: ghcr.io/${{ steps.repo.outputs.repository_lowercase }}/devcontainer
          cacheFrom: ghcr.io/${{ steps.repo.outputs.repository_lowercase }}/devcontainer
          push: never
          runCmd: |
            set -euo pipefail
            echo "=== Toolchain versions ==="
            dotnet --version
            git lfs version
            pwsh -NoProfile -Command 'Write-Host "PowerShell OK"'
            node --version
            python3 --version

            echo "=== .NET 10 SDK + runtime presence ==="
            dotnet --list-sdks | grep -E '^10\.0' \
              || (echo "ERROR: .NET 10 SDK not found" >&2 && exit 1)
            dotnet --list-runtimes | grep -E '^Microsoft\.NETCore\.App 10\.0' \
              || (echo "ERROR: .NET 10 runtime not found" >&2 && exit 1)

            echo "=== asmdef-discovery self-test ==="
            node scripts/unity/lib/asmdef-discovery.js | tail -n 30

            echo "=== Cache-mount contract ==="
            bash .devcontainer/validate-caching.sh

            echo "=== Node script tests ==="
            node --test scripts/

            echo "=== All devcontainer smoke checks passed ==="
