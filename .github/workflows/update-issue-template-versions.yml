---
name: Update Issue Template Versions

# Regenerates the bug-report issue template's package-version dropdown and, on the
# default branch, commits it back. This is the self-healing backstop for the
# `check:issue-template-versions` gate: whenever package.json / CHANGELOG.md change
# on master (a release lands, a version is added) the dropdown is brought current
# even if a contributor bumped the version without running the generator. The
# release PR (release-prepare.yml) already regenerates it proactively; this keeps
# it correct for every other path.
#
# Mirrors update-llms-txt.yml: the built-in GITHUB_TOKEN cannot push to a protected
# branch, so the push is authenticated by a GitHub App installation token
# (secrets.AUTO_COMMIT_APP_ID + secrets.AUTO_COMMIT_APP_PRIVATE_KEY) whose App is
# allowed to bypass branch protection. If those secrets are absent the commit
# degrades to a logged no-op (regeneration + validation still run). See
# docs/runbooks/perf-numbers-auto-commit.md.
on:
  schedule:
    # Weekly on Monday at 10:00 AM UTC (offset from update-llms-txt's 09:00 slot).
    - cron: "0 10 * * 1"
  workflow_dispatch:
  push:
    branches:
      - main
      - master
    paths:
      - package.json
      - CHANGELOG.md
      - .github/ISSUE_TEMPLATE/bug_report.yml
      - scripts/generate-issue-template-versions.js

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# The push is authenticated by the GitHub App installation token, not the job's
# GITHUB_TOKEN, so contents:read is all this job's own token needs (checkout).
permissions:
  contents: read

jobs:
  update:
    name: Update Issue Template Versions
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Check for the auto-commit GitHub App credentials
        id: check-autocommit-app
        # Degrade to a logged no-op when the App is not provisioned, instead of a
        # red build. See docs/runbooks/perf-numbers-auto-commit.md.
        env:
          AUTO_COMMIT_APP_ID: ${{ secrets.AUTO_COMMIT_APP_ID }}
          AUTO_COMMIT_APP_PRIVATE_KEY: ${{ secrets.AUTO_COMMIT_APP_PRIVATE_KEY }}
        run: |
          set -euo pipefail
          if [ -n "${AUTO_COMMIT_APP_ID:-}" ] && \
             [ -n "${AUTO_COMMIT_APP_PRIVATE_KEY:-}" ]; then
            echo "has-app=true" >> "${GITHUB_OUTPUT}"
          else
            echo "::warning::AUTO_COMMIT_APP_* secrets are not set; skipping the issue-template-versions auto-commit. See docs/runbooks/perf-numbers-auto-commit.md."
            echo "has-app=false" >> "${GITHUB_OUTPUT}"
          fi

      - name: Generate auto-commit GitHub App token
        id: app-token
        if: steps.check-autocommit-app.outputs.has-app == 'true'
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3
        with:
          app-id: ${{ secrets.AUTO_COMMIT_APP_ID }}
          private-key: ${{ secrets.AUTO_COMMIT_APP_PRIVATE_KEY }}

      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          token: ${{ steps.app-token.outputs.token || github.token }}
          persist-credentials: false

      - name: Refresh branch before generating
        if: steps.check-autocommit-app.outputs.has-app == 'true'
        env:
          GH_FETCH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          set -euo pipefail
          auth_header="$(printf 'x-access-token:%s' "${GH_FETCH_TOKEN}" | base64 | tr -d '\n')"
          git -c "http.https://github.com/.extraheader=AUTHORIZATION: basic ${auth_header}" \
            fetch --no-tags --depth=1 origin \
            "+refs/heads/${GITHUB_REF_NAME}:refs/remotes/origin/${GITHUB_REF_NAME}"
          git checkout -B "${GITHUB_REF_NAME}" "refs/remotes/origin/${GITHUB_REF_NAME}"
          echo "Refreshed ${GITHUB_REF_NAME} to $(git rev-parse HEAD) before regenerating the dropdown."

      - name: Setup Node.js
        uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38 # v6
        with:
          node-version: "22.18.0"
          cache: npm
          cache-dependency-path: package.json

      - name: Install dependencies
        run: |
          if [ -f package-lock.json ]; then
            npm ci
          else
            npm i --no-audit --no-fund
          fi

      - name: Update issue-template versions
        run: npm run update:issue-template-versions

      - name: Validate issue-template versions generator contract
        run: npm run check:issue-template-versions

      - name: Check for changes
        id: git-check
        run: |
          git diff --exit-code -- .github/ISSUE_TEMPLATE/bug_report.yml || echo "changed=true" >> "$GITHUB_OUTPUT"

      - name: Commit and push changes
        if: steps.git-check.outputs.changed == 'true' && steps.check-autocommit-app.outputs.has-app == 'true'
        env:
          GH_PUSH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          set -euo pipefail
          auth_header="$(printf 'x-access-token:%s' "${GH_PUSH_TOKEN}" | base64 | tr -d '\n')"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          target_file=".github/ISSUE_TEMPLATE/bug_report.yml"
          for attempt in 1 2 3; do
            git -c "http.https://github.com/.extraheader=AUTHORIZATION: basic ${auth_header}" \
              fetch --no-tags --depth=1 origin \
              "+refs/heads/${GITHUB_REF_NAME}:refs/remotes/origin/${GITHUB_REF_NAME}"
            latest_sha="$(git rev-parse "refs/remotes/origin/${GITHUB_REF_NAME}")"
            current_sha="$(git rev-parse HEAD)"
            if [ "${latest_sha}" != "${current_sha}" ]; then
              echo "::warning::Default branch ${GITHUB_REF_NAME} advanced from ${current_sha} to ${latest_sha}; regenerating on the latest head before pushing."
              git checkout -f -B "${GITHUB_REF_NAME}" "refs/remotes/origin/${GITHUB_REF_NAME}"
              npm run update:issue-template-versions
              npm run check:issue-template-versions
            fi

            if git diff --quiet -- "${target_file}"; then
              echo "The version dropdown is already current; nothing to commit."
              exit 0
            fi

            base_sha="$(git rev-parse HEAD)"
            git add -- "${target_file}"
            if git diff --cached --quiet -- "${target_file}"; then
              echo "No staged dropdown changes remain; nothing to commit."
              exit 0
            fi
            git commit -m "chore: update issue-template package versions"

            set +e
            git -c "http.https://github.com/.extraheader=AUTHORIZATION: basic ${auth_header}" \
              push origin "HEAD:${GITHUB_REF_NAME}"
            push_status=$?
            set -e
            if [ "${push_status}" -eq 0 ]; then
              exit 0
            fi

            git -c "http.https://github.com/.extraheader=AUTHORIZATION: basic ${auth_header}" \
              fetch --no-tags --depth=1 origin \
              "+refs/heads/${GITHUB_REF_NAME}:refs/remotes/origin/${GITHUB_REF_NAME}"
            latest_after_push="$(git rev-parse "refs/remotes/origin/${GITHUB_REF_NAME}")"
            if [ "${latest_after_push}" = "${base_sha}" ]; then
              echo "::error::issue-template-versions auto-commit push failed while ${GITHUB_REF_NAME} still pointed at ${base_sha}."
              exit "${push_status}"
            fi

            if [ "${attempt}" -eq 3 ]; then
              echo "::warning::Default branch ${GITHUB_REF_NAME} kept advancing during the auto-commit; skipping this stale attempt. A newer run will regenerate from the latest head."
              exit 0
            fi

            echo "::warning::Default branch ${GITHUB_REF_NAME} advanced during the push; retrying from ${latest_after_push}."
            git checkout -f -B "${GITHUB_REF_NAME}" "refs/remotes/origin/${GITHUB_REF_NAME}"
            npm run update:issue-template-versions
            npm run check:issue-template-versions
          done
