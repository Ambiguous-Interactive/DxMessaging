name: Release Prepare

# Manual entry point of the release pipeline. Dispatched from the DEFAULT
# branch, it first validates the GitHub App token needed to publish the
# release PR, computes the next version (bump or explicit), rewrites
# package.json, rotates CHANGELOG.md's Unreleased section under the new
# version heading, syncs the banner SVG, re-runs the script tests and
# validators against the bumped tree, and opens a `release/vX.Y.Z` pull
# request with the GitHub App token. Merging that PR (squash, keeping the
# `release: vX.Y.Z` title) triggers release-tag.yml, which creates the tag
# that fires the existing tag-triggered release.yml.
#
# PREREQUISITE: the AUTO_COMMIT_APP_ID / AUTO_COMMIT_APP_PRIVATE_KEY GitHub
# App (Contents + Pull requests read-and-write, installed on this repo); the
# same App perf-numbers.yml uses. Without it the non-dry-run path fails fast
# with a ::error:: before mutating anything. Dry-run needs no App: it prints
# the prepared diff and stops.
on:
  workflow_dispatch:
    inputs:
      bump:
        description: "Semver bump kind (ignored when version is set)"
        type: choice
        options:
          - patch
          - minor
          - major
        default: patch
      version:
        description: "Explicit version X.Y.Z (wins over bump; must be greater than the current version)"
        type: string
        required: false
      dry-run:
        description: "Print the prepared diff without pushing a branch or opening a PR"
        type: boolean
        default: false

concurrency:
  group: release-prepare
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  prepare:
    name: Prepare release PR
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Require the default branch
        env:
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
        run: |
          set -euo pipefail
          if [ "${GITHUB_REF}" != "refs/heads/${DEFAULT_BRANCH}" ]; then
            echo "::error::Release Prepare must be dispatched from the default branch (${DEFAULT_BRANCH}); got ${GITHUB_REF}. Release PRs always branch off the default branch."
            exit 1
          fi

      - name: Check for the auto-commit GitHub App credentials
        id: check-autocommit-app
        # Mirrors the perf-numbers.yml runner-preflight probe. Dry-run works
        # without the App; the publishing path fails HERE, before any file is
        # rewritten, so a half-prepared release is never left behind.
        env:
          AUTO_COMMIT_APP_ID: ${{ secrets.AUTO_COMMIT_APP_ID }}
          AUTO_COMMIT_APP_PRIVATE_KEY: ${{ secrets.AUTO_COMMIT_APP_PRIVATE_KEY }}
          DRY_RUN: ${{ inputs.dry-run }}
        run: |
          set -euo pipefail
          if [ -n "${AUTO_COMMIT_APP_ID:-}" ] && [ -n "${AUTO_COMMIT_APP_PRIVATE_KEY:-}" ]; then
            echo "has-app=true" >> "${GITHUB_OUTPUT}"
          else
            echo "has-app=false" >> "${GITHUB_OUTPUT}"
            if [ "${DRY_RUN}" != "true" ]; then
              message="AUTO_COMMIT_APP_ID / AUTO_COMMIT_APP_PRIVATE_KEY secrets are not set; "
              message+="Release Prepare cannot push the release branch or open the PR. Provision the "
              message+="GitHub App (see docs/runbooks/perf-numbers-auto-commit.md) or re-run with dry-run."
              echo "::error::${message}"
              exit 1
            fi
            echo "::warning::AUTO_COMMIT_APP_* secrets are not set; dry-run continues but a real run would fail."
          fi

      - name: Generate the auto-commit GitHub App token
        id: app-token
        if: ${{ !inputs.dry-run }}
        # Request only the release-prepare scopes this workflow needs. If the App
        # installation no longer grants them, fail here before spending time
        # preparing a release tree that cannot be published.
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3
        with:
          app-id: ${{ secrets.AUTO_COMMIT_APP_ID }}
          private-key: ${{ secrets.AUTO_COMMIT_APP_PRIVATE_KEY }}
          permission-contents: write
          permission-pull-requests: write

      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
        with:
          token: ${{ steps.app-token.outputs.token || github.token }}
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: "22.18.0"

      - name: Setup .NET
        # validate:all runs check:analyzers, which builds the source
        # generators against the SDK pinned in SourceGenerators/global.json.
        uses: actions/setup-dotnet@a98b56852c35b8e3190ac28c8c2271da59106c68 # v6.0.0
        with:
          global-json-file: SourceGenerators/global.json

      - name: Install Node dependencies
        run: |
          set -euo pipefail
          if [ -f package-lock.json ]; then
            npm ci
          else
            npm i --no-audit --no-fund
          fi

      - name: Prepare the release (version bump + changelog rotation)
        env:
          BUMP: ${{ inputs.bump }}
          EXPLICIT_VERSION: ${{ inputs.version }}
        run: |
          set -euo pipefail
          args=(--bump "${BUMP}")
          if [ -n "${EXPLICIT_VERSION}" ]; then
            args+=(--version "${EXPLICIT_VERSION}")
          fi
          node scripts/release/prepare-release.js "${args[@]}"

      - name: Sync the version into generated files
        # The banner SVG and llms.txt both embed the package version, and the
        # bug-report template's version dropdown is derived from it; validate:all's
        # check:llms-txt / check:issue-template-versions (and CI's validate-banner)
        # fail when they drift from package.json, so regenerate all three for the
        # release commit.
        run: |
          set -euo pipefail
          npm run sync:banner
          npm run update:llms-txt
          npm run update:issue-template-versions

      - name: Validate the prepared tree
        run: |
          set -euo pipefail
          npm test
          npm run format:check
          npm run validate:all

      - name: Resolve the prepared version
        id: version
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          version="$(jq -r '.version // empty' package.json)"
          if [ -z "${version}" ]; then
            echo "::error::package.json version is missing after prepare-release.js."
            exit 1
          fi
          tag="v${version}"
          branch="release/${tag}"
          if gh api "repos/${GITHUB_REPOSITORY}/git/ref/tags/${tag}" >/dev/null 2>&1; then
            echo "::error::Tag ${tag} already exists; this version has already been released."
            exit 1
          fi
          if gh api "repos/${GITHUB_REPOSITORY}/git/ref/heads/${branch}" >/dev/null 2>&1; then
            echo "::error::Branch ${branch} already exists; close or delete the stale release PR before preparing ${tag} again."
            exit 1
          fi
          {
            echo "version=${version}"
            echo "tag=${tag}"
            echo "branch=${branch}"
          } >> "${GITHUB_OUTPUT}"

      - name: Print the dry-run plan
        if: ${{ inputs.dry-run }}
        env:
          TAG: ${{ steps.version.outputs.tag }}
          BRANCH: ${{ steps.version.outputs.branch }}
        run: |
          set -euo pipefail
          echo "Dry run: would push branch ${BRANCH} and open a PR titled 'release: ${TAG}'."
          echo "::group::Prepared diff"
          git --no-pager diff
          echo "::endgroup::"
          echo "Dry run complete; nothing was pushed."

      - name: Push the release branch and open the PR
        if: ${{ !inputs.dry-run }}
        env:
          GH_PUSH_TOKEN: ${{ steps.app-token.outputs.token }}
          VERSION: ${{ steps.version.outputs.version }}
          TAG: ${{ steps.version.outputs.tag }}
          BRANCH: ${{ steps.version.outputs.branch }}
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -b "${BRANCH}"
          # Stage every file the bump + "Sync the version into generated files"
          # step can touch. Keep this list in lockstep with those generators
          # (sync:banner, update:llms-txt, update:issue-template-versions); an
          # omitted artifact is regenerated, passes validate:all, then is silently
          # dropped from the release commit.
          git add package.json CHANGELOG.md docs/images/DxMessaging-banner.svg llms.txt .github/ISSUE_TEMPLATE/bug_report.yml
          if git diff --cached --quiet -- package.json CHANGELOG.md docs/images/DxMessaging-banner.svg llms.txt .github/ISSUE_TEMPLATE/bug_report.yml; then
            echo "::error::Release preparation staged no changes; refusing to create an empty release commit."
            exit 1
          fi
          git commit -m "release: ${TAG}"

          recovery_dir="artifacts/release-prepare"
          mkdir -p "${recovery_dir}"
          git format-patch -1 --stdout > "${recovery_dir}/release-${TAG}.patch"
          git show --stat --oneline --decorate --no-renames HEAD > "${recovery_dir}/release-${TAG}.stat.txt"

          auth_header="$(printf 'x-access-token:%s' "${GH_PUSH_TOKEN}" | base64 | tr -d '\n')"
          push_log="${RUNNER_TEMP}/release-push.log"
          set +e
          git -c "http.https://github.com/.extraheader=AUTHORIZATION: basic ${auth_header}" \
            push origin "HEAD:refs/heads/${BRANCH}" 2>&1 | tee "${push_log}"
          push_status=${PIPESTATUS[0]}
          set -e
          if [ "${push_status}" -ne 0 ]; then
            echo "::group::release branch push failure"
            cat "${push_log}" || true
            echo "::endgroup::"
            message="Failed to push ${BRANCH} with the auto-commit GitHub App token. "
            message+="Confirm the App is installed on ${GITHUB_REPOSITORY}, has Contents: write, "
            message+="and is allowed by any ruleset or branch rule that targets release branches. "
            message+="A recovery patch was written to ${recovery_dir}/release-${TAG}.patch."
            echo "::error::${message}"
            exit "${push_status}"
          fi

          # Excerpt the rotated changelog section for the PR body via the single
          # shared extractor (the same scripts/release module release.yml and
          # release-drafter.yml use), so the PR preview matches the published
          # release body exactly. Node is already provisioned for prepare-release.js.
          changelog_excerpt="$(node scripts/release/release-notes.js --version "${VERSION}")"

          pr_body_file="${RUNNER_TEMP}/release-pr-body.md"
          {
            echo "Automated release preparation for ${TAG} (run: ${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID})."
            echo
            echo "## Release checklist"
            echo
            echo "- [ ] \`package.json\` version is ${VERSION} and \`CHANGELOG.md\` has the \`## [${VERSION}]\` section below."
            echo "- [ ] The changelog excerpt reads as release notes (user-facing wording, no leftover Unreleased churn)."
            echo "- [ ] Squash-merge with the default \`release: ${TAG}\` title (release-tag.yml matches that subject on ${DEFAULT_BRANCH})."
            echo
            echo "## Changelog for ${VERSION}"
            echo
            echo "${changelog_excerpt}"
            echo
            echo "## What happens after merge"
            echo
            echo "1. release-tag.yml sees the \`release: ${TAG}\` commit on ${DEFAULT_BRANCH} and pushes the annotated tag \`${TAG}\`."
            echo "1. The tag fires release.yml: validate (pack + attest), the trusted Unity editmode check, the .unitypackage export,"
            echo "   npm publish (Trusted Publishing), then the GitHub Release with the .tgz, .sha256, and .unitypackage assets"
            echo "   plus the asset-store-submission artifact."
            echo "1. The Unity Asset Store upload stays MANUAL: download the asset-store-submission artifact and follow docs/runbooks/asset-store-publishing.md."
          } > "${pr_body_file}"

          pr_create_err="${RUNNER_TEMP}/release-pr-create.err"
          set +e
          pr_create_out="$(GH_TOKEN="${GH_PUSH_TOKEN}" gh pr create \
            --repo "${GITHUB_REPOSITORY}" \
            --base "${DEFAULT_BRANCH}" \
            --head "${BRANCH}" \
            --title "release: ${TAG}" \
            --body-file "${pr_body_file}" 2>"${pr_create_err}")"
          pr_create_status=$?
          set -e
          if [ "${pr_create_status}" -ne 0 ]; then
            compare_url="${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/compare/${DEFAULT_BRANCH}...${BRANCH}"
            message="Pushed ${BRANCH}, but PR creation failed. The release commit is preserved on the branch; "
            message+="open the PR manually if needed: ${compare_url}. Confirm the App has Pull requests: write."
            echo "::error::${message}"
            echo "gh stdout: ${pr_create_out}"
            cat "${pr_create_err}" || true
            exit "${pr_create_status}"
          fi
          echo "${pr_create_out}"

      - name: Upload failed release preparation patch
        if: ${{ failure() && !inputs.dry-run }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: release-prepare-recovery-${{ github.run_id }}-${{ github.run_attempt }}
          path: artifacts/release-prepare/
          if-no-files-found: ignore
