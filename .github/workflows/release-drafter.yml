name: Release Drafter

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: release-drafter
  cancel-in-progress: false

jobs:
  update-release-draft:
    if: github.repository == 'Ambiguous-Interactive/DxMessaging'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Setup Node.js
        # The shared changelog extractor (scripts/release/release-notes.js) runs
        # under Node; pin it instead of the runner's ambient version.
        uses: actions/setup-node@v6
        with:
          node-version: "22.18.0"

      - name: Diagnose release inputs
        run: |
          set -euo pipefail
          PACKAGE_VERSION="$(jq -r '.version // empty' package.json)"
          LATEST_TAG="$(git tag --list | grep -E '^v?[0-9]+\.[0-9]+\.[0-9]+([-.+][0-9A-Za-z.-]+)?$' | sort -V | tail -n 1 || true)"
          if [ -n "$LATEST_TAG" ]; then
            COMMITS_SINCE_TAG="$(git rev-list "${LATEST_TAG}..HEAD" --count)"
          else
            COMMITS_SINCE_TAG="$(git rev-list HEAD --count)"
          fi
          echo "Package version: ${PACKAGE_VERSION:-missing}"
          echo "Latest semver tag: ${LATEST_TAG:-none}"
          echo "Commits since latest tag: ${COMMITS_SINCE_TAG}"
          echo "Draft changelog source: CHANGELOG.md ## [Unreleased]"

      - name: Extract unreleased changelog
        id: changelog
        run: |
          if [ ! -f CHANGELOG.md ]; then
            echo "Warning: CHANGELOG.md not found"
            echo "No changelog file found." > /tmp/changelog_section.md
            echo "changelog_file=/tmp/changelog_section.md" >> "$GITHUB_OUTPUT"
            echo "changelog_section=missing" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # Single shared extractor (the same scripts/release module release.yml
          # and release-prepare.yml use). It exits non-zero when the Unreleased
          # section is missing or empty; fall back to a placeholder then.
          if node scripts/release/release-notes.js --version Unreleased > /tmp/changelog_section.md; then
            echo "changelog_section=Unreleased" >> "$GITHUB_OUTPUT"
          else
            echo "::notice::No usable '## [Unreleased]' changelog section; using a placeholder."
            echo "No changelog entry found under Unreleased." > /tmp/changelog_section.md
            echo "changelog_section=missing" >> "$GITHUB_OUTPUT"
          fi
          echo "changelog_file=/tmp/changelog_section.md" >> "$GITHUB_OUTPUT"
          echo "Extracted Unreleased changelog bytes: $(wc -c < /tmp/changelog_section.md)"

      # release-drafter intermittently trips a transient GitHub API timeout ("We couldn't respond
      # to your request in time") while diffing commits between the last tag and the default branch.
      # The action is idempotent -- it finds and updates the SAME draft release each run -- so a
      # single backed-off retry clears the flake without masking a genuine outage: the retry has no
      # continue-on-error, so a second failure fails the job. continue-on-error on the first attempt
      # keeps its real result observable via steps.<id>.outcome while letting the retry proceed.
      - name: Run Release Drafter
        uses: release-drafter/release-drafter@v7
        id: release_drafter
        continue-on-error: true
        with:
          config-name: release-drafter.yml
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Backoff before Release Drafter retry
        if: steps.release_drafter.outcome == 'failure'
        run: sleep 15

      - name: Run Release Drafter (retry)
        if: steps.release_drafter.outcome == 'failure'
        uses: release-drafter/release-drafter@v7
        id: release_drafter_retry
        with:
          config-name: release-drafter.yml
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Update release body with changelog
        uses: actions/github-script@v9
        env:
          # Whichever attempt succeeded supplies the outputs; a failed attempt yields empty strings,
          # so the || falls through to the retry's outputs. If both attempts failed, the job already
          # stopped at the retry step and this step never runs.
          RELEASE_ID: ${{ steps.release_drafter.outputs.id || steps.release_drafter_retry.outputs.id }}
          DRAFTER_BODY: ${{ steps.release_drafter.outputs.body || steps.release_drafter_retry.outputs.body }}
          CHANGELOG_FILE: ${{ steps.changelog.outputs.changelog_file }}
          CHANGELOG_SECTION: ${{ steps.changelog.outputs.changelog_section }}
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');

            const releaseId = parseInt(process.env.RELEASE_ID, 10);
            if (!Number.isInteger(releaseId) || releaseId <= 0) {
              throw new Error('Invalid releaseId: ' + process.env.RELEASE_ID + '. Expected a positive integer.');
            }
            const drafterBody = process.env.DRAFTER_BODY || '';
            const changelogFile = process.env.CHANGELOG_FILE;
            const changelogSection = process.env.CHANGELOG_SECTION || 'unknown';

            let changelogContent = '';
            try {
              changelogContent = fs.readFileSync(changelogFile, 'utf8').trim();
            } catch (err) {
              console.log('Warning: Could not read changelog file:', err.message);
              changelogContent = 'No changelog content available.';
            }

            const bodyParts = [
              '## Changelog',
              '',
              changelogContent,
              '',
              '---',
              '',
              drafterBody
            ];
            const body = bodyParts.join('\n');

            await github.rest.repos.updateRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              release_id: releaseId,
              body: body
            });

            console.log('Updated release draft body for release id ' + releaseId + ' using changelog section ' + changelogSection + '.');
