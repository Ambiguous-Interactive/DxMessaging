name: Actionlint

on:
  pull_request:
    paths:
      - ".github/workflows/**"
      - ".github/actionlint.yaml"
      - "scripts/validate-workflows.js"
      - ".github/unity-versions.json"
      - "scripts/validate-unity-versions.js"
      - "scripts/unity/maintain-windows-runner.ps1"
      - "scripts/unity/install-runner-maintenance-task.ps1"
  push:
    branches:
      - main
      - master
    paths:
      - ".github/workflows/**"
      - ".github/actionlint.yaml"
      - "scripts/validate-workflows.js"
      - ".github/unity-versions.json"
      - "scripts/validate-unity-versions.js"
      - "scripts/unity/maintain-windows-runner.ps1"
      - "scripts/unity/install-runner-maintenance-task.ps1"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  actionlint:
    name: Lint GitHub Actions workflows
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Install shellcheck
        run: sudo apt-get update && sudo apt-get install -y --no-install-recommends shellcheck

      - name: Run actionlint
        uses: rhysd/actionlint@v1.7.12

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22.18.0"
          cache: npm
          cache-dependency-path: package.json

      - name: Install dependencies
        # validate-workflows.js parses workflows structurally with the declared
        # `yaml` devDependency (formatting-invariant gate checks), so the job
        # MUST install node_modules before running it. A cached install is a few
        # seconds; without it `require("yaml")` throws MODULE_NOT_FOUND and every
        # workflow fails the compute-unity-assemblies gate check. package-lock.json
        # is gitignored, so the block is lockfile-aware (npm ci when present, npm
        # install fallback otherwise) per the workflow install-policy.
        run: |
          if [ -f package-lock.json ]; then
            npm ci
          else
            npm i --no-audit --no-fund
          fi

      - name: Validate workflow patterns
        run: node scripts/validate-workflows.js

      - name: Validate Unity version single-source
        run: node scripts/validate-unity-versions.js
