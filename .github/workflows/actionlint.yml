name: Actionlint

on:
  # No pull_request paths filter: the workflow must always start so its required
  # check reports on every PR shape. The `changes` job decides whether to do the
  # real work; when nothing relevant changed it skips to success. See
  # docs/runbooks/required-checks.md.
  pull_request:
    branches:
      - main
      - master
  push:
    branches:
      - main
      - master
    paths:
      - ".github/workflows/**"
      - ".github/actionlint.yaml"
      - ".github/unity-versions.json"
      - "scripts/validate-unity-versions.js"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  changes:
    name: Detect workflow-affecting changes
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
      pull-requests: read
    outputs:
      relevant: ${{ steps.filter.outputs.relevant }}
    steps:
      - name: Determine whether relevant files changed
        id: filter
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if [ "${{ github.event_name }}" != "pull_request" ]; then
            echo "relevant=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          if ! files="$(gh api \
            "repos/${{ github.repository }}/pulls/${{ github.event.pull_request.number }}/files" \
            --paginate --jq '.[].filename')"; then
            echo "relevant=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          if printf '%s\n' "$files" | grep -qE '(^\.github/workflows/|^\.github/actionlint\.yaml$|^\.github/unity-versions\.json$|^scripts/validate-unity-versions\.js$)'; then
            echo "relevant=true" >> "$GITHUB_OUTPUT"
          else
            echo "relevant=false" >> "$GITHUB_OUTPUT"
          fi

  actionlint:
    name: Lint GitHub Actions workflows
    needs: changes
    if: needs.changes.outputs.relevant == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Install shellcheck
        run: sudo apt-get update && sudo apt-get install -y --no-install-recommends shellcheck

      - name: Run actionlint
        uses: rhysd/actionlint@v1.7.12

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22.18.0"

      - name: Validate Unity version single-source
        # Uses only node builtins; no npm install required.
        run: node scripts/validate-unity-versions.js
