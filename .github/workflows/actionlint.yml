name: Actionlint

on:
  pull_request:
    paths:
      - ".github/workflows/**"
      - ".github/actionlint.yaml"
      - ".github/unity-versions.json"
      - "scripts/validate-unity-versions.js"
  push:
    branches:
      - main
      - master
    paths:
      - ".github/workflows/**"
      - ".github/actionlint.yaml"
      - ".github/unity-versions.json"
      - "scripts/validate-unity-versions.js"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  actionlint:
    name: Lint GitHub Actions workflows
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Install shellcheck
        run: sudo apt-get update && sudo apt-get install -y --no-install-recommends shellcheck

      - name: Run actionlint
        uses: rhysd/actionlint@v1.7.12

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22.18.0"

      - name: Validate Unity version single-source
        # Uses only node builtins; no npm install required.
        run: node scripts/validate-unity-versions.js
