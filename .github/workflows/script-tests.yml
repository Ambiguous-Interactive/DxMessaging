name: Script Tests

on:
  # No pull_request paths filter: the workflow must always start so its required
  # check reports on every PR shape. The `changes` job decides whether to do the
  # real work; when nothing relevant changed the required OS jobs run only a
  # cheap skip-notice step. See
  # docs/runbooks/required-checks.md.
  pull_request:
    branches:
      - main
      - master
  push:
    branches:
      - main
      - master
    paths:
      - .github/workflows/*.yml
      - .github/workflows/*.yaml
      - .github/actions/**/action.yml
      - .github/unity-versions.json
      - package.json
      - .npmignore
      - CHANGELOG.md
      - CHANGELOG.md.meta
      - LICENSE.md
      - LICENSE.md.meta
      - README.md
      - README.md.meta
      - "Third Party Notices.md"
      - "Third Party Notices.md.meta"
      - package.json.meta
      - Editor.meta
      - Editor/**
      - Runtime.meta
      - Runtime/**
      - Samples~/**
      - SourceGenerators.meta
      - SourceGenerators/**
      - scripts/**/*.ps1
      - scripts/**/*.sh
      # All tracked JS (not just scripts/): see the pull_request paths note.
      - "**/*.js"
      - "**/*.cjs"
      - "**/*.mjs"
      # validate:all runs validate:asmdef-references: see the pull_request note.
      - "**/*.asmdef"
      # validate:all runs validate:npm-meta: see the pull_request note.
      - "**/*.cs.meta"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  changes:
    name: Detect script-affecting changes
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
      pull-requests: read
    outputs:
      relevant: ${{ steps.filter.outputs.relevant }}
    steps:
      - name: Determine whether relevant files changed
        id: filter
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if [ "${{ github.event_name }}" != "pull_request" ]; then
            echo "relevant=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          if ! files="$(gh api \
            "repos/${{ github.repository }}/pulls/${{ github.event.pull_request.number }}/files" \
            --paginate --jq '.[].filename')"; then
            echo "relevant=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          # Faithful translation of this workflow's original pull_request paths,
          # built across lines to stay under the yamllint line-length limit.
          # The trailing **/*.js|cjs|mjs / **/*.asmdef / **/*.cs.meta alternatives
          # exist because validate:all gates the JS LoC budget, asmdef-references,
          # and npm-meta over every tracked file of those types, regardless of dir.
          pattern='(^\.github/workflows/[^/]*\.ya?ml$'
          pattern="$pattern"'|^\.github/actions/.*/action\.yml$|^\.github/unity-versions\.json$'
          pattern="$pattern"'|^package\.json$|^\.npmignore$'
          pattern="$pattern"'|^CHANGELOG\.md$|^CHANGELOG\.md\.meta$|^LICENSE\.md$|^LICENSE\.md\.meta$'
          pattern="$pattern"'|^README\.md$|^README\.md\.meta$|^Third Party Notices\.md$'
          pattern="$pattern"'|^Third Party Notices\.md\.meta$|^package\.json\.meta$'
          pattern="$pattern"'|^Editor\.meta$|^Editor/|^Runtime\.meta$|^Runtime/|^Samples~/'
          pattern="$pattern"'|^SourceGenerators\.meta$|^SourceGenerators/'
          pattern="$pattern"'|^scripts/.*\.ps1$|^scripts/.*\.sh$'
          pattern="$pattern"'|\.js$|\.cjs$|\.mjs$|\.asmdef$|\.cs\.meta$)'
          if printf '%s\n' "$files" | grep -qE "$pattern"; then
            echo "relevant=true" >> "$GITHUB_OUTPUT"
          else
            echo "relevant=false" >> "$GITHUB_OUTPUT"
          fi

  script-tests:
    name: Script tests (${{ matrix.os }})
    needs: changes
    # Keep the required matrix contexts present on every PR shape. If this
    # job-level guard skips before matrix expansion, GitHub reports only the
    # literal unevaluated matrix name and branch protection waits forever for
    # the three expanded OS contexts.
    if: ${{ always() }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 15
    permissions:
      contents: read
    # The concurrency group is expanded with ${{ matrix.os }}: a matrix job
    # may not share a single concurrency slot across OS entries (one slot
    # would cancel every successive OS the moment the next OS queues).
    concurrency:
      group: ${{ github.workflow }}-script-tests-${{ matrix.os }}-${{ github.ref }}
      cancel-in-progress: true
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
          - windows-latest

    steps:
      - name: Validate change detection
        if: ${{ needs.changes.result != 'success' || (needs.changes.outputs.relevant != 'true' && needs.changes.outputs.relevant != 'false') }}
        run: |
          echo "::error::Change detection concluded '${{ needs.changes.result }}' with relevant='${{ needs.changes.outputs.relevant }}'."
          echo "::error::Required gates only skip after successful detection emits relevant=false."
          exit 1

      - name: Skip non-script changes
        if: ${{ needs.changes.result == 'success' && needs.changes.outputs.relevant == 'false' }}
        shell: bash
        run: |
          echo "No script-affecting files changed; required context is present."

      - name: Checkout repository
        if: ${{ needs.changes.outputs.relevant != 'false' }}
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
          persist-credentials: false

      - name: Setup Node.js
        if: ${{ needs.changes.outputs.relevant != 'false' }}
        uses: actions/setup-node@v6
        with:
          node-version: "22.18.0"
          cache: npm
          # package-lock.json is gitignored in this repo, so point the cache
          # key at package.json or setup-node fails to find a lockfile.
          cache-dependency-path: package.json

      - name: Setup .NET
        if: ${{ needs.changes.outputs.relevant != 'false' }}
        # validate:all runs check:analyzers, which builds the source
        # generators against the SDK pinned in SourceGenerators/global.json.
        uses: actions/setup-dotnet@v5
        with:
          global-json-file: SourceGenerators/global.json

      - name: Install dependencies
        if: ${{ needs.changes.outputs.relevant != 'false' }}
        # No tracked package-lock.json: npm ci requires a lockfile, so fall
        # back to npm install when it is absent (repo-standard pattern).
        # `shell: bash` is required for the windows-latest matrix leg, where
        # the default run shell is pwsh and cannot parse this bash syntax.
        shell: bash
        run: |
          if [ -f package-lock.json ]; then
            npm ci
          else
            npm i --no-audit --no-fund
          fi

      - name: Run script tests
        if: ${{ needs.changes.outputs.relevant != 'false' }}
        # `shell: bash` ensures the invocation resolves consistently across
        # Linux, native macOS, and windows-latest (Git Bash), so platform-only
        # quoting or path regressions cannot pass CI unnoticed.
        shell: bash
        run: node --test scripts/

      - name: Run validators
        if: ${{ needs.changes.outputs.relevant != 'false' }}
        shell: bash
        run: npm run validate:all
