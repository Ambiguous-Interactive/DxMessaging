name: Script Tests

on:
  pull_request:
    paths:
      - .github/workflows/script-tests.yml
      - .github/workflows/release.yml
      - .github/actions/**/action.yml
      - .github/workflows/unity-*.yml
      - package.json
      - .npmignore
      - CHANGELOG.md
      - scripts/**/*.ps1
      - scripts/**/*.sh
      # All tracked JS (not just scripts/): validate:all runs the JS LoC
      # budget gate, which counts every tracked *.js/*.cjs/*.mjs (including
      # docs/javascripts/), so JS added anywhere must trigger this workflow.
      - "**/*.js"
      - "**/*.cjs"
      - "**/*.mjs"
      # validate:all runs validate:asmdef-references, which reads every
      # tracked .asmdef — so asmdef-only PRs must trigger this workflow.
      - "**/*.asmdef"
  push:
    branches:
      - main
      - master
    paths:
      - .github/workflows/script-tests.yml
      - .github/workflows/release.yml
      - .github/actions/**/action.yml
      - .github/workflows/unity-*.yml
      - package.json
      - .npmignore
      - CHANGELOG.md
      - scripts/**/*.ps1
      - scripts/**/*.sh
      # All tracked JS (not just scripts/): see the pull_request paths note.
      - "**/*.js"
      - "**/*.cjs"
      - "**/*.mjs"
      # validate:all runs validate:asmdef-references: see the pull_request note.
      - "**/*.asmdef"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  script-tests:
    name: Script tests (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 15
    permissions:
      contents: read
    # The concurrency group is expanded with ${{ matrix.os }}: a matrix job
    # may not share a single concurrency slot across OS entries (one slot
    # would cancel every successive OS the moment the next OS queues).
    concurrency:
      group: ${{ github.workflow }}-script-tests-${{ matrix.os }}-${{ github.ref }}
      cancel-in-progress: true
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22.18.0"
          cache: npm
          # package-lock.json is gitignored in this repo, so point the cache
          # key at package.json or setup-node fails to find a lockfile.
          cache-dependency-path: package.json

      - name: Setup .NET
        # validate:all runs check:analyzers, which builds the source
        # generators against the SDK pinned in SourceGenerators/global.json.
        uses: actions/setup-dotnet@v5
        with:
          global-json-file: SourceGenerators/global.json

      - name: Install dependencies
        # No tracked package-lock.json: npm ci requires a lockfile, so fall
        # back to npm install when it is absent (repo-standard pattern).
        # `shell: bash` is required for the windows-latest matrix leg, where
        # the default run shell is pwsh and cannot parse this bash syntax.
        shell: bash
        run: |
          if [ -f package-lock.json ]; then
            npm ci
          else
            npm i --no-audit --no-fund
          fi

      - name: Run script tests
        # `shell: bash` ensures the invocation resolves the same way on
        # windows-latest (Git Bash) as on ubuntu-latest, so a Windows-only
        # quoting or path regression cannot pass CI unnoticed.
        shell: bash
        run: node --test scripts/

      - name: Run validators
        shell: bash
        run: npm run validate:all
