---
name: Update llms.txt

# Regenerates llms.txt and, on the default branch, commits it back. The built-in
# GITHUB_TOKEN cannot push to a protected branch (github-actions[bot] is a system
# account, not a selectable branch-protection bypass actor), so the push is
# authenticated by a GitHub App installation token (secrets.AUTO_COMMIT_APP_ID +
# secrets.AUTO_COMMIT_APP_PRIVATE_KEY) whose App is allowed to bypass branch
# protection. If those secrets are absent the commit degrades to a logged no-op (the
# regeneration + validation still run). See docs/runbooks/perf-numbers-auto-commit.md.
on:
  schedule:
    # Run weekly on Monday at 9:00 AM UTC
    - cron: "0 9 * * 1"
  workflow_dispatch:
  push:
    branches:
      - main
      - master
    paths:
      - package.json
      - .llm/skills/**
      - scripts/update-llms-txt.js

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# The push is authenticated by the GitHub App installation token, not the job's
# GITHUB_TOKEN, so contents:read is all this job's own token needs (checkout).
permissions:
  contents: read

jobs:
  update:
    name: Update llms.txt
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Check for the auto-commit GitHub App credentials
        id: check-autocommit-app
        # Degrade to a logged no-op when the App is not provisioned, instead of a
        # red build. See docs/runbooks/perf-numbers-auto-commit.md.
        env:
          AUTO_COMMIT_APP_ID: ${{ secrets.AUTO_COMMIT_APP_ID }}
          AUTO_COMMIT_APP_PRIVATE_KEY: ${{ secrets.AUTO_COMMIT_APP_PRIVATE_KEY }}
        run: |
          set -euo pipefail
          if [ -n "${AUTO_COMMIT_APP_ID:-}" ] && \
             [ -n "${AUTO_COMMIT_APP_PRIVATE_KEY:-}" ]; then
            echo "has-app=true" >> "${GITHUB_OUTPUT}"
          else
            echo "::warning::AUTO_COMMIT_APP_* secrets are not set; skipping the llms.txt auto-commit. See docs/runbooks/perf-numbers-auto-commit.md."
            echo "has-app=false" >> "${GITHUB_OUTPUT}"
          fi

      - name: Generate auto-commit GitHub App token
        id: app-token
        if: steps.check-autocommit-app.outputs.has-app == 'true'
        uses: actions/create-github-app-token@v3
        with:
          app-id: ${{ secrets.AUTO_COMMIT_APP_ID }}
          private-key: ${{ secrets.AUTO_COMMIT_APP_PRIVATE_KEY }}

      - name: Checkout repository
        uses: actions/checkout@v7
        with:
          token: ${{ steps.app-token.outputs.token || github.token }}
          persist-credentials: false

      - name: Refresh branch before generating
        if: steps.check-autocommit-app.outputs.has-app == 'true'
        env:
          GH_FETCH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          set -euo pipefail
          auth_header="$(printf 'x-access-token:%s' "${GH_FETCH_TOKEN}" | base64 | tr -d '\n')"
          git -c "http.https://github.com/.extraheader=AUTHORIZATION: basic ${auth_header}" \
            fetch --no-tags --depth=1 origin \
            "+refs/heads/${GITHUB_REF_NAME}:refs/remotes/origin/${GITHUB_REF_NAME}"
          git checkout -B "${GITHUB_REF_NAME}" "refs/remotes/origin/${GITHUB_REF_NAME}"
          echo "Refreshed ${GITHUB_REF_NAME} to $(git rev-parse HEAD) before generating llms.txt."

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22.18.0"
          cache: npm
          cache-dependency-path: package.json

      - name: Install dependencies
        run: |
          if [ -f package-lock.json ]; then
            npm ci
          else
            npm i --no-audit --no-fund
          fi

      - name: Update llms.txt
        run: npm run update:llms-txt

      - name: Validate llms.txt generator contract
        run: npm run check:llms-txt

      - name: Check for changes
        id: git-check
        run: |
          # update:llms-txt regenerates llms.txt and syncs the skill-count claim in
          # README.md; both are committed so neither can drift on the default branch.
          git diff --exit-code -- llms.txt README.md || echo "changed=true" >> "$GITHUB_OUTPUT"

      - name: Commit and push changes
        if: steps.git-check.outputs.changed == 'true' && steps.check-autocommit-app.outputs.has-app == 'true'
        env:
          GH_PUSH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          set -euo pipefail
          auth_header="$(printf 'x-access-token:%s' "${GH_PUSH_TOKEN}" | base64 | tr -d '\n')"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          for attempt in 1 2 3; do
            git -c "http.https://github.com/.extraheader=AUTHORIZATION: basic ${auth_header}" \
              fetch --no-tags --depth=1 origin \
              "+refs/heads/${GITHUB_REF_NAME}:refs/remotes/origin/${GITHUB_REF_NAME}"
            latest_sha="$(git rev-parse "refs/remotes/origin/${GITHUB_REF_NAME}")"
            current_sha="$(git rev-parse HEAD)"
            if [ "${latest_sha}" != "${current_sha}" ]; then
              message="Default branch ${GITHUB_REF_NAME} advanced from ${current_sha} "
              message+="to ${latest_sha}; regenerating llms.txt on the latest head "
              message+="before pushing."
              echo "::warning::${message}"
              git checkout -f -B "${GITHUB_REF_NAME}" "refs/remotes/origin/${GITHUB_REF_NAME}"
              npm run update:llms-txt
              npm run check:llms-txt
            fi

            if git diff --quiet -- llms.txt README.md; then
              echo "llms.txt and README are already current; nothing to commit."
              exit 0
            fi

            base_sha="$(git rev-parse HEAD)"
            git add -- llms.txt README.md
            if git diff --cached --quiet -- llms.txt README.md; then
              echo "No staged llms.txt/README changes remain; nothing to commit."
              exit 0
            fi
            git commit -m "chore: update llms.txt"

            set +e
            git -c "http.https://github.com/.extraheader=AUTHORIZATION: basic ${auth_header}" \
              push origin "HEAD:${GITHUB_REF_NAME}"
            push_status=$?
            set -e
            if [ "${push_status}" -eq 0 ]; then
              exit 0
            fi

            git -c "http.https://github.com/.extraheader=AUTHORIZATION: basic ${auth_header}" \
              fetch --no-tags --depth=1 origin \
              "+refs/heads/${GITHUB_REF_NAME}:refs/remotes/origin/${GITHUB_REF_NAME}"
            latest_after_push="$(git rev-parse "refs/remotes/origin/${GITHUB_REF_NAME}")"
            if [ "${latest_after_push}" = "${base_sha}" ]; then
              echo "::error::llms.txt auto-commit push failed while ${GITHUB_REF_NAME} still pointed at ${base_sha}."
              exit "${push_status}"
            fi

            if [ "${attempt}" -eq 3 ]; then
              message="Default branch ${GITHUB_REF_NAME} kept advancing during "
              message+="the llms.txt auto-commit; skipping this stale attempt. "
              message+="A newer run will regenerate from the latest head."
              echo "::warning::${message}"
              exit 0
            fi

            message="Default branch ${GITHUB_REF_NAME} advanced during the llms.txt "
            message+="push; retrying from ${latest_after_push}."
            echo "::warning::${message}"
            git checkout -f -B "${GITHUB_REF_NAME}" "refs/remotes/origin/${GITHUB_REF_NAME}"
            npm run update:llms-txt
            npm run check:llms-txt
          done
