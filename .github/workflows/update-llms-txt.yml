---
name: Update llms.txt

# Regenerates llms.txt and, on the default branch, commits it back. The built-in
# GITHUB_TOKEN cannot push to a protected branch (github-actions[bot] is a system
# account, not a selectable branch-protection bypass actor), so the push is
# authenticated by a GitHub App installation token (secrets.AUTO_COMMIT_APP_ID +
# secrets.AUTO_COMMIT_APP_PRIVATE_KEY) whose App is allowed to bypass branch
# protection. If those secrets are absent the commit degrades to a logged no-op (the
# regeneration + validation still run). See docs/runbooks/perf-numbers-auto-commit.md.
on:
  schedule:
    # Run weekly on Monday at 9:00 AM UTC
    - cron: "0 9 * * 1"
  workflow_dispatch:
  push:
    branches:
      - main
      - master
    paths:
      - package.json
      - .llm/skills/**
      - scripts/update-llms-txt.js

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# The push is authenticated by the GitHub App installation token, not the job's
# GITHUB_TOKEN, so contents:read is all this job's own token needs (checkout).
permissions:
  contents: read

jobs:
  update:
    name: Update llms.txt
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Check for the auto-commit GitHub App credentials
        id: check-autocommit-app
        # Degrade to a logged no-op when the App is not provisioned, instead of a
        # red build. See docs/runbooks/perf-numbers-auto-commit.md.
        env:
          AUTO_COMMIT_APP_ID: ${{ secrets.AUTO_COMMIT_APP_ID }}
          AUTO_COMMIT_APP_PRIVATE_KEY: ${{ secrets.AUTO_COMMIT_APP_PRIVATE_KEY }}
        run: |
          set -euo pipefail
          if [ -n "${AUTO_COMMIT_APP_ID:-}" ] && \
             [ -n "${AUTO_COMMIT_APP_PRIVATE_KEY:-}" ]; then
            echo "has-app=true" >> "${GITHUB_OUTPUT}"
          else
            echo "::warning::AUTO_COMMIT_APP_* secrets are not set; skipping the llms.txt auto-commit. See docs/runbooks/perf-numbers-auto-commit.md."
            echo "has-app=false" >> "${GITHUB_OUTPUT}"
          fi

      - name: Generate auto-commit GitHub App token
        id: app-token
        if: steps.check-autocommit-app.outputs.has-app == 'true'
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ secrets.AUTO_COMMIT_APP_ID }}
          private-key: ${{ secrets.AUTO_COMMIT_APP_PRIVATE_KEY }}

      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          token: ${{ steps.app-token.outputs.token || github.token }}
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22.18.0"
          cache: npm
          cache-dependency-path: package.json

      - name: Install dependencies
        run: |
          if [ -f package-lock.json ]; then
            npm ci
          else
            npm i --no-audit --no-fund
          fi

      - name: Update llms.txt
        run: npm run update:llms-txt

      - name: Validate llms.txt generator contract
        run: npm run validate:llms-txt

      - name: Check for changes
        id: git-check
        run: |
          git diff --exit-code llms.txt || echo "changed=true" >> "$GITHUB_OUTPUT"

      - name: Configure push credentials
        if: steps.git-check.outputs.changed == 'true' && steps.check-autocommit-app.outputs.has-app == 'true'
        env:
          GH_PUSH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: git remote set-url origin "https://x-access-token:${GH_PUSH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"

      - name: Commit and push changes
        if: steps.git-check.outputs.changed == 'true' && steps.check-autocommit-app.outputs.has-app == 'true'
        uses: stefanzweifel/git-auto-commit-action@v7
        with:
          commit_message: "chore: update llms.txt"
          file_pattern: llms.txt
          commit_user_name: github-actions[bot]
          commit_user_email: github-actions[bot]@users.noreply.github.com

      - name: Clear push credentials
        if: ${{ always() && steps.git-check.outputs.changed == 'true' && steps.check-autocommit-app.outputs.has-app == 'true' }}
        run: git remote set-url origin "https://github.com/${GITHUB_REPOSITORY}.git"
