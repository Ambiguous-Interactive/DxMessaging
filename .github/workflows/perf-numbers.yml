name: Performance Numbers

# CI owns the documented dispatch-throughput numbers end to end. On every
# pull_request change to master/main this workflow re-runs the PlayMode (in-editor
# Mono) + Standalone (IL2CPP) dispatch benchmarks on ELI-MACHINE (the `fast` runner) at the LATEST
# Unity version, renders the AUTOGENERATED region of
# docs/architecture/performance.md from that run, and POSTS the refreshed numbers
# as a non-blocking sticky PR comment. It does NOT push onto the contributor's
# branch: a GITHUB_TOKEN push does not re-trigger the required pull_request checks
# (and a doc-only commit path-filters the others out), so the new head would have
# no successful required checks and merge would be blocked. On push to master or
# main (after the PR merges) the same benchmarks run and, if the numbers moved,
# CI attempts to commit the refreshed doc AND the regenerated master baseline CSV
# DIRECTLY to the default branch using a
# GitHub App installation token. The built-in GITHUB_TOKEN cannot push to a
# protected branch (github-actions[bot] is a system account and is not a
# selectable branch-protection bypass actor), so a dedicated App that IS allowed
# to bypass the protection does the push. If the branch advances before this
# long benchmark run reaches the push step, the job warns and skips the stale
# artifacts. App-token pushes DO re-trigger workflows, so recursion is broken the
# simple way: the push trigger ignores BOTH docs/architecture/performance.md and
# docs/architecture/perf-baseline.csv below, so
# the doc + baseline auto-commit cannot re-run the benchmark -- no loop guard needed.
# The committed numbers are therefore owned by CI, not by committed state, manual
# runs, or PR-body text.
#
# PREREQUISITE: a GitHub App (App ID in secrets.AUTO_COMMIT_APP_ID, private key in
# secrets.AUTO_COMMIT_APP_PRIVATE_KEY) with Contents: read and write, installed on
# this repo and allowed to bypass the master/main branch protection. Without it
# the push is rejected with GH006 / "changes must be made through a pull request";
# if the secrets are absent the commit job degrades to a logged no-op. See
# docs/runbooks/perf-numbers-auto-commit.md for the exact setup + click-paths.
on:
  pull_request:
    branches:
      - master
      - main
    types: [opened, synchronize, reopened]
  push:
    branches:
      - master
      - main
    # Loop break: the commit-perf-doc job pushes a doc + baseline commit with a
    # GitHub App token, which (unlike the built-in GITHUB_TOKEN) DOES re-trigger
    # workflows. Ignoring BOTH the perf doc AND the regenerated baseline CSV here
    # means that auto-commit cannot re-run the benchmark. A normal code merge still
    # touches non-ignored paths and runs.
    paths-ignore:
      - docs/architecture/performance.md
      - docs/architecture/perf-baseline.csv
  workflow_dispatch:

# Serialize merge-path runs on the same ref so two post-merge push jobs from
# this workflow do not race each other. A separate freshness check still guards
# against unrelated default-branch pushes landing while the benchmarks run. We do
# NOT cancel in-progress runs -- that would abort an in-flight benchmark.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

# Top-level least-privilege. The PR-comment job (comment-perf-doc) gets only
# pull-requests:write to post the sticky comment (it never pushes); the
# default-branch refresh job (commit-perf-doc) pushes with a GitHub App token, so
# its own GITHUB_TOKEN needs only contents:read. Each grants its scope on the job
# itself so the licensed Unity job never inherits write.
permissions:
  contents: read
  checks: write

jobs:
  runner-preflight:
    name: Self-hosted runner access preflight
    # Mirrors unity-tests.yml's preflight. Runs on ubuntu-latest BEFORE the
    # self-hosted perf-benchmarks job tries to queue, converting a missing
    # ELI-MACHINE from a "queued forever" hang into a fast, explained failure.
    # It also resolves the canonical Unity version and the licensed-secret
    # presence so the expensive job and the doc jobs consume ONE cheap preflight.
    # CRITICAL CONTRACT: this preflight must NEVER make perf CI more broken than
    # the no-preflight baseline. If the token cannot list either the org-level
    # OR repo-level runner inventory (403/404 from both), it emits a
    # ::warning:: and exits 0 (soft pass). Only a provably-wrong inventory
    # fails hard. See docs/runbooks/unity-runners-after-transfer.md.
    if: >-
      ${{
        github.event_name != 'pull_request' ||
        github.event.pull_request.head.repo.full_name == github.repository
      }}
    runs-on: ubuntu-latest
    timeout-minutes: 3
    # Job-level permissions REPLACE the default set entirely (any scope not listed
    # becomes 'none'), so contents:read is required for the folded-in checkout step
    # to read .github/unity-versions.json; actions:read is for the runner-inventory
    # gh api probe.
    permissions:
      actions: read
      contents: read
    concurrency:
      group: ${{ github.workflow }}-runner-preflight-${{ github.ref }}
      cancel-in-progress: true
    outputs:
      latest-version: ${{ steps.versions.outputs.latest-version }}
      unity-versions: ${{ steps.versions.outputs.unity-versions }}
      has-required-secrets: ${{ steps.check-secrets.outputs.has-secrets }}
      has-autocommit-app: ${{ steps.check-autocommit-app.outputs.has-app }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 1
          persist-credentials: false

      - name: Probe self-hosted runner availability
        env:
          GH_TOKEN: ${{ secrets.RUNNER_AUDIT_PAT || secrets.GITHUB_TOKEN }}
          # The `fast` label pins this workflow to ELI-MACHINE specifically (the
          # only self-hosted Windows runner carrying `fast`). A missing
          # ELI-MACHINE therefore fails this preflight fast. Keep in sync with
          # the perf-benchmarks `runs-on:` below.
          REQUIRED_LABELS: "self-hosted,Windows,RAM-64GB,fast"
        # gh api --paginate | jq -s pattern mirrors unity-tests.yml /
        # stuck-job-watchdog.yml; see those files for why `jq -s` is required.
        run: |
          set -euo pipefail
          echo "::group::Runner-access preflight"
          echo "Required labels: ${REQUIRED_LABELS}"
          IFS=',' read -r -a required <<< "${REQUIRED_LABELS}"
          runners_json="$(mktemp)"
          runners_scope=""
          if gh api --paginate \
              "orgs/${GITHUB_REPOSITORY_OWNER}/actions/runners?per_page=100" \
              2>/dev/null \
              | jq -s '[.[] | (.runners // [])[]]' > "${runners_json}" 2>/dev/null; then
            runners_scope="org"
          else
            if gh api --paginate \
                "repos/${GITHUB_REPOSITORY}/actions/runners?per_page=100" \
                2>/dev/null \
                | jq -s '[.[] | (.runners // [])[]]' > "${runners_json}" 2>/dev/null; then
              runners_scope="repo"
            fi
          fi
          if [ -z "${runners_scope}" ]; then
            org_url="orgs/${GITHUB_REPOSITORY_OWNER}/actions/runners"
            repo_url="repos/${GITHUB_REPOSITORY}/actions/runners"
            {
              echo "::warning::Runner inventory unavailable from both ${org_url}"
              echo "::warning::and ${repo_url} (likely 403: GITHUB_TOKEN lacks admin:org"
              echo "::warning::or administration:read)."
              echo "::warning::See docs/runbooks/unity-runners-after-transfer.md"
              echo "::warning::for how to plumb a RUNNER_AUDIT_PAT secret to upgrade"
              echo "::warning::this soft-pass to a hard-pass."
            }
            echo "Soft pass: skipping runner inventory check."
            echo "::endgroup::"
            exit 0
          fi
          echo "Runner inventory scope: ${runners_scope}"
          total="$(jq 'length' < "${runners_json}")"
          echo "Visible runners (${runners_scope} scope): ${total}"
          matched="$(jq --argjson labels "$(printf '%s\n' "${required[@]}" | jq -R . | jq -s .)" '
            [ .[]
              | select(.status == "online")
              | select(($labels | all(. as $l | (.labels // []) | map(.name) | index($l) | type == "number")))
            ] | length
          ' < "${runners_json}")"
          echo "Runners satisfying ${REQUIRED_LABELS}: ${matched}"
          if [ "${matched}" -lt 1 ]; then
            {
              echo "::error::No online self-hosted runner satisfies the required labels (${REQUIRED_LABELS})."
              echo "The perf benchmark job would queue forever."
              echo "See docs/runbooks/unity-runners-after-transfer.md for the post-transfer runner-group ACL fix."
            }
            jq '[ .[] | {name, status, busy, labels: [(.labels // [])[].name]} ]' \
              < "${runners_json}"
            exit 1
          fi
          echo "::endgroup::"

      - name: Resolve Unity version from canonical source
        id: versions
        # Single source of truth: .github/unity-versions.json. perf tracks the
        # LATEST entry only (last element of `all`); emitting it here means the
        # matrix leg, the artifact-download pattern, and render-perf-doc.js all
        # consume ONE value and cannot drift. See scripts/validate-unity-versions.js.
        run: |
          set -euo pipefail
          file=.github/unity-versions.json
          latest="$(jq -r '.all[-1]' "${file}")"
          {
            printf 'latest-version=%s\n' "${latest}"
            printf 'unity-versions=%s\n' "$(jq -c '[.all[-1]]' "${file}")"
          } >> "${GITHUB_OUTPUT}"

      - name: Check for required Unity license secrets
        id: check-secrets
        env:
          UNITY_SERIAL: ${{ secrets.UNITY_SERIAL }}
          UNITY_EMAIL: ${{ secrets.UNITY_EMAIL }}
          UNITY_PASSWORD: ${{ secrets.UNITY_PASSWORD }}
          ORG_BUILD_LOCK_TOKEN: ${{ secrets.ORG_BUILD_LOCK_TOKEN }}
        run: |
          set -euo pipefail
          if [ -n "${UNITY_SERIAL:-}" ] && \
             [ -n "${UNITY_EMAIL:-}" ] && \
             [ -n "${UNITY_PASSWORD:-}" ] && \
             [ -n "${ORG_BUILD_LOCK_TOKEN:-}" ]; then
            echo "has-secrets=true" >> "${GITHUB_OUTPUT}"
          else
            echo "has-secrets=false" >> "${GITHUB_OUTPUT}"
          fi

      - name: Check for the auto-commit GitHub App credentials
        id: check-autocommit-app
        # Gates the post-merge commit job so a repo that has not yet provisioned
        # the AUTO_COMMIT_APP_* GitHub App degrades to a logged no-op (the PR
        # comment still posts) instead of a red push-build. See
        # docs/runbooks/perf-numbers-auto-commit.md.
        env:
          AUTO_COMMIT_APP_ID: ${{ secrets.AUTO_COMMIT_APP_ID }}
          AUTO_COMMIT_APP_PRIVATE_KEY: ${{ secrets.AUTO_COMMIT_APP_PRIVATE_KEY }}
        run: |
          set -euo pipefail
          if [ -n "${AUTO_COMMIT_APP_ID:-}" ] && \
             [ -n "${AUTO_COMMIT_APP_PRIVATE_KEY:-}" ]; then
            echo "has-app=true" >> "${GITHUB_OUTPUT}"
          else
            if [ "${GITHUB_EVENT_NAME:-}" = "push" ]; then
              echo "::warning::AUTO_COMMIT_APP_* secrets are not set; skipping the perf doc auto-commit. See docs/runbooks/perf-numbers-auto-commit.md."
            fi
            echo "has-app=false" >> "${GITHUB_OUTPUT}"
          fi

  perf-benchmarks:
    name: Perf benchmarks ${{ matrix.unity-version }} ${{ matrix.test-mode }}
    needs:
      - runner-preflight
    # Same-repo gate (forks cannot run licensed Unity or be pushed to) AND the
    # licensed-secret gate. Mirrors unity-tests.yml's same-repo expression.
    if: >-
      ${{
        (github.event_name != 'pull_request' ||
          github.event.pull_request.head.repo.full_name == github.repository) &&
        needs.runner-preflight.outputs.has-required-secrets == 'true'
      }}
    # Pinned to ELI-MACHINE via the `fast` label (the only self-hosted Windows
    # runner carrying it). Keep in sync with the preflight REQUIRED_LABELS.
    runs-on: [self-hosted, Windows, RAM-64GB, fast]
    timeout-minutes: 660
    strategy:
      fail-fast: false
      # Both legs share the one Unity activation seat behind the org lock; run
      # them one-at-a-time within this workflow run so they queue behind one
      # another instead of racing the lock.
      max-parallel: 1
      matrix:
        # LATEST Unity version only -- the documented numbers track the newest
        # supported runtime. The single latest version is resolved from the
        # canonical source (.github/unity-versions.json) via runner-preflight, so
        # the matrix leg, the artifact-download pattern, and render-perf-doc.js all
        # consume ONE value and cannot drift. Single-entry matrix (not a bare
        # scalar) so the leg name still carries the version.
        unity-version: ${{ fromJSON(needs.runner-preflight.outputs.unity-versions) }}
        # render-perf-doc.js consumes the PlayMode (in-editor Mono) and Standalone
        # (IL2CPP) legs; the renderer prefers the player-fidelity scopes.
        test-mode:
          - playmode
          - standalone
    steps:
      - name: Enable Git long paths
        shell: pwsh
        env:
          GIT_CONFIG_GLOBAL: ${{ runner.temp }}/dxm-gitconfig
        run: git config --global core.longpaths true

      - name: Checkout
        uses: actions/checkout@v6
        env:
          GIT_CONFIG_GLOBAL: ${{ runner.temp }}/dxm-gitconfig
        with:
          # Check out the PR head so the benchmark runs against the PR's code,
          # not the merge commit. On workflow_dispatch this is empty and falls
          # back to the default ref.
          ref: ${{ github.event.pull_request.head.sha }}
          lfs: true
          persist-credentials: false

      - name: Print runner diagnostics
        # Composite action runs PowerShell internally; `shell: bash` on this
        # self-hosted Windows runner resolves to the WSL stub and fails. See
        # validate-workflows.js rule `forbidPlainShellBashOnSelfHostedWindows`.
        uses: ./.github/actions/print-self-hosted-runner-diagnostics
        with:
          matrix-note: "perf (organization lock wraps the Unity section)"

      - name: Cache Unity Library and package caches
        uses: actions/cache@v5
        env:
          PACKAGE_HASH: >-
            ${{ hashFiles(
              'package.json',
              'Runtime/**',
              'Editor/**',
              'Tests/**',
              'scripts/unity/run-ci-tests.ps1',
              'scripts/unity/lib/asmdef-discovery.js',
              '.github/actions/compute-unity-assemblies/action.yml',
              '.github/comparison-packages.json'
            ) }}
        with:
          path: |
            .artifacts/unity/projects/${{ matrix.unity-version }}-${{ matrix.test-mode }}/Library
            .artifacts/unity/cache/${{ matrix.unity-version }}
          key: Library-perf-${{ runner.os }}-${{ runner.arch }}-${{ matrix.unity-version }}-${{ matrix.test-mode }}-${{ env.PACKAGE_HASH }}

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22.18.0"

      # Single source of truth for the assembly include list. Perf benchmarks
      # OPT IN to the Benchmarks/Allocations assemblies via include-perf, exactly
      # as unity-benchmarks.yml does.
      - name: Compute benchmark assembly list
        id: compute
        uses: ./.github/actions/compute-unity-assemblies
        with:
          include-perf: "true"
          include-comparisons: "true"
          target: "${{ matrix.test-mode }}"

      - name: Validate Unity license secrets
        uses: ./.github/actions/validate-unity-license
        env:
          UNITY_SERIAL: ${{ secrets.UNITY_SERIAL }}
          UNITY_EMAIL: ${{ secrets.UNITY_EMAIL }}
          UNITY_PASSWORD: ${{ secrets.UNITY_PASSWORD }}

      # Capture privacy-safe machine specs for the doc/comment provenance line
      # (CPU/RAM/OS only -- collect-machine-specs.ps1 deliberately emits NO
      # hostname or runner name). Runs BEFORE the org lock so it never holds the
      # shared Unity seat, and writes into THIS leg's artifact dir so the existing
      # "Upload perf benchmark artifacts" step (which uploads the whole leg dir)
      # carries the specs to the doc/comment jobs. The script exits 0 even on
      # failure, so a probe error never reds the benchmark leg.
      - name: Collect machine specs
        shell: pwsh
        run: |
          $artifactsPath = '.artifacts/unity/perf/${{ matrix.unity-version }}-${{ matrix.test-mode }}'
          New-Item -ItemType Directory -Force -Path $artifactsPath | Out-Null
          ./scripts/unity/collect-machine-specs.ps1 `
            -OutputJson (Join-Path $artifactsPath 'machine-specs.json') `
            -OutputSummary (Join-Path $artifactsPath 'machine-specs.txt')

      # Editor install/repair does NOT require the paid Unity seat, so it runs
      # BEFORE the org lock. The PlayMode (in-editor Mono) leg needs no player
      # toolchain, so it provisions EditorOnly; the Standalone (IL2CPP) leg builds a
      # real IL2CPP player, so it provisions StandaloneWindowsIl2Cpp (Windows Build
      # Support with the IL2CPP scripting backend). Skip
      # provisioning, the org lock, and the run when the
      # compute step resolved an empty assembly list, so an empty discovery never
      # takes the paid Unity seat / org lock only to fail late at verify. The
      # verify step runs only after compute succeeds and is told via
      # expected-empty. Mirrors unity-tests.yml. The perf list is structurally
      # non-empty, so this is defense-in-depth and uniformity with the required
      # workflows.
      - name: Provision Unity Editor
        if: ${{ steps.compute.outputs.is-empty != 'true' }}
        timeout-minutes: 180
        shell: pwsh
        run: |
          $artifactsPath = '.artifacts/unity/perf/${{ matrix.unity-version }}-${{ matrix.test-mode }}'
          $diagnosticsPath = Join-Path $artifactsPath 'provisioning'
          $diagnosticsFile = Join-Path $diagnosticsPath 'ensure-editor-summary.json'
          New-Item -ItemType Directory -Force -Path $diagnosticsPath | Out-Null
          $provisioningProfile = if ('${{ matrix.test-mode }}' -eq 'standalone') { 'StandaloneWindowsIl2Cpp' } else { 'EditorOnly' }
          $editor = ./scripts/unity/ensure-editor.ps1 `
            -UnityVersion '${{ matrix.unity-version }}' `
            -CiManagedOnly `
            -RequireHealthyExisting `
            -ProvisioningProfile $provisioningProfile `
            -DiagnosticsPath $diagnosticsFile
          "UNITY_EDITOR_PATH=$editor" | Out-File -FilePath $env:GITHUB_ENV -Append

      - name: Upload Unity provisioning diagnostics
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: perf-provisioning-${{ matrix.unity-version }}-${{ matrix.test-mode }}
          path: .artifacts/unity/perf/${{ matrix.unity-version }}-${{ matrix.test-mode }}/provisioning
          if-no-files-found: warn
          retention-days: 14

      - name: Acquire organization Unity lock
        if: ${{ steps.compute.outputs.is-empty != 'true' }}
        uses: Ambiguous-Interactive/ambiguous-organization-build-lock/.github/actions/acquire-build-lock@v1
        with:
          lock-name: wallstop-organization-builds
          holder-id-suffix: perf-${{ matrix.unity-version }}-${{ matrix.test-mode }}
          timeout-minutes: "300"
        env:
          BUILD_LOCK_TOKEN: ${{ secrets.ORG_BUILD_LOCK_TOKEN }}

      - name: Run Unity Test Runner
        id: run_tests
        if: ${{ steps.compute.outputs.is-empty != 'true' }}
        # 180 (not 120): the standalone leg now builds a COLD IL2CPP player, which
        # is far slower than a Mono build; the PlayMode leg finishes well under
        # this. Stays strictly below the job-level timeout (660) so the step clock
        # fires first and releases the shared Unity seat. Must stay >= the
        # validator's RUN_BUDGET (120).
        timeout-minutes: 180
        shell: pwsh
        env:
          UNITY_SERIAL: ${{ secrets.UNITY_SERIAL }}
          UNITY_EMAIL: ${{ secrets.UNITY_EMAIL }}
          UNITY_PASSWORD: ${{ secrets.UNITY_PASSWORD }}
          UNITY_ACCELERATOR_ENDPOINT: ${{ secrets.UNITY_ACCELERATOR_ENDPOINT }}
        run: |
          # HASHTABLE splat (not an array): array splatting passes elements
          # POSITIONALLY, so '-IncludeComparisons' would bind to $RepoRoot. A
          # hashtable binds by parameter name. See unity-runner-script-contract
          # test "perf-numbers run step uses a name-binding (hashtable) splat".
          $extra = @{
              IncludeComparisons = $true
              ReleaseCodeOptimization = $true
              ReleasePlayerBuild = $true
          }
          if ('${{ matrix.test-mode }}' -eq 'standalone') {
              $extra['StandaloneScriptingBackend'] = 'IL2CPP'
          }
          ./scripts/unity/run-ci-tests.ps1 `
            -UnityVersion '${{ matrix.unity-version }}' `
            -TestMode '${{ matrix.test-mode }}' `
            -AssemblyNames $env:DXM_TEST_ASSEMBLIES `
            -ArtifactsPath '.artifacts/unity/perf/${{ matrix.unity-version }}-${{ matrix.test-mode }}' `
            @extra

      - name: Return Unity license
        if: always()
        uses: ./.github/actions/return-unity-license
        env:
          UNITY_EMAIL: ${{ secrets.UNITY_EMAIL }}
          UNITY_PASSWORD: ${{ secrets.UNITY_PASSWORD }}

      - name: Release organization Unity lock
        if: always()
        uses: Ambiguous-Interactive/ambiguous-organization-build-lock/.github/actions/release-build-lock@v1
        with:
          lock-name: wallstop-organization-builds
          holder-id-suffix: perf-${{ matrix.unity-version }}-${{ matrix.test-mode }}
        env:
          BUILD_LOCK_TOKEN: ${{ secrets.ORG_BUILD_LOCK_TOKEN }}

      - name: Dump Unity log tail on failure or cancellation
        if: ${{ failure() || cancelled() }}
        uses: ./.github/actions/dump-unity-log-tail
        with:
          results-dir: .artifacts/unity/perf/${{ matrix.unity-version }}-${{ matrix.test-mode }}
          label: Perf ${{ matrix.unity-version }} ${{ matrix.test-mode }}

      - name: Verify tests actually ran
        if: >-
          ${{
            !cancelled() &&
            steps.compute.outcome == 'success' &&
            (steps.compute.outputs.is-empty == 'true' || steps.run_tests.outcome != 'skipped')
          }}
        uses: ./.github/actions/verify-unity-results
        with:
          results-dir: .artifacts/unity/perf/${{ matrix.unity-version }}-${{ matrix.test-mode }}
          label: Perf ${{ matrix.unity-version }} ${{ matrix.test-mode }}
          expected-empty: ${{ steps.compute.outputs.is-empty }}

      - name: Upload perf benchmark artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: perf-${{ matrix.unity-version }}-${{ matrix.test-mode }}
          path: .artifacts/unity/perf/${{ matrix.unity-version }}-${{ matrix.test-mode }}
          if-no-files-found: warn
          retention-days: 14

  comment-perf-doc:
    name: Comment refreshed perf numbers on the PR
    needs:
      - runner-preflight
      - perf-benchmarks
    # PULL_REQUEST path: render the numbers from this run and post them as a
    # NON-BLOCKING sticky PR comment. We do NOT push onto the PR branch -- a
    # GITHUB_TOKEN push would not re-trigger the required pull_request checks (and a
    # doc-only commit path-filters the others out), leaving the new head with no
    # successful required checks and blocking merge. The committed doc is refreshed
    # directly on the default branch after the PR merges. Same-repo only (a fork PR
    # cannot run the licensed benchmarks), BOTH legs succeeded.
    if: >-
      ${{
        github.event_name == 'pull_request' &&
        github.event.pull_request.head.repo.full_name == github.repository &&
        needs.perf-benchmarks.result == 'success'
      }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    # Only pull-requests:write (to post the comment); NO contents:write -- the PR
    # path never pushes.
    permissions:
      contents: read
      pull-requests: write
    env:
      LATEST_VERSION: ${{ needs.runner-preflight.outputs.latest-version }}
      PERF_DOC: docs/architecture/performance.md
    steps:
      - name: Checkout PR head
        uses: actions/checkout@v6
        with:
          # Render against the PR's code (head.sha), not the merge commit, so the
          # "changed vs committed" comparison reflects this branch.
          ref: ${{ github.event.pull_request.head.sha }}
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22.18.0"
          cache: npm
          cache-dependency-path: package.json

      - name: Install dependencies
        # render-perf-doc.js is dependency-free, but the managed Prettier
        # normalization resolves prettier from node_modules.
        run: |
          if [ -f package-lock.json ]; then
            npm ci
          else
            npm i --no-audit --no-fund
          fi

      - name: Download perf benchmark artifacts
        uses: actions/download-artifact@v8
        with:
          pattern: perf-${{ env.LATEST_VERSION }}-*
          path: .artifacts/perf-download

      - name: Render dispatch-throughput numbers from this run
        id: render
        # Render into the working-tree doc (NOT committed on this path), normalize
        # with the repo's managed Prettier, compute whether the numbers moved vs the
        # committed doc, and extract the AUTOGENERATED table region for the comment.
        run: |
          set -euo pipefail
          inputs=()
          while IFS= read -r -d '' file; do
            inputs+=(--input "${file}")
          done < <(find .artifacts/perf-download \
            -type f \( -name 'unity.log' -o -name 'results.xml' \) -print0)
          if [ "${#inputs[@]}" -eq 0 ]; then
            echo "::error::No unity.log/results.xml found for ${LATEST_VERSION}."
            exit 1
          fi
          # Locate the machine-specs JSON the perf leg uploaded (glob the
          # downloaded artifacts; pick the first). Pass it to render-perf-doc.js so
          # the doc's "Runner:" provenance line reflects the real runner; the
          # renderer falls back to a neutral description when it is absent. Also
          # read the one-line summary into a step output for the PR comment title.
          machine_specs_json="$(find .artifacts/perf-download \
            -type f -name 'machine-specs.json' -print 2>/dev/null | sort | head -n1)"
          machine_specs_args=()
          if [ -n "${machine_specs_json}" ]; then
            machine_specs_args=(--machine-specs "${machine_specs_json}")
          fi
          machine_specs_txt="$(find .artifacts/perf-download \
            -type f -name 'machine-specs.txt' -print 2>/dev/null | sort | head -n1)"
          machine_summary=""
          if [ -n "${machine_specs_txt}" ]; then
            machine_summary="$(head -n1 "${machine_specs_txt}" | tr -d '\r')"
          fi
          echo "machine-summary=${machine_summary}" >> "${GITHUB_OUTPUT}"
          node scripts/unity/render-perf-doc.js \
            "${inputs[@]}" \
            --doc "${PERF_DOC}" \
            --unity-version "${LATEST_VERSION}" \
            "${machine_specs_args[@]}"
          node scripts/run-managed-prettier.js --write "${PERF_DOC}"
          table_file="${RUNNER_TEMP}/perf-table.md"
          awk '/AUTOGENERATED:DISPATCH-THROUGHPUT BEGIN/{f=1;next} /AUTOGENERATED:DISPATCH-THROUGHPUT END/{f=0} f' \
            "${PERF_DOC}" > "${table_file}"
          echo "table-file=${table_file}" >> "${GITHUB_OUTPUT}"
          if git diff --quiet -- "${PERF_DOC}"; then
            echo "changed=false" >> "${GITHUB_OUTPUT}"
          else
            echo "changed=true" >> "${GITHUB_OUTPUT}"
          fi

      - name: Upsert the perf-numbers PR comment
        uses: actions/github-script@v9
        env:
          PERF_TABLE_FILE: ${{ steps.render.outputs.table-file }}
          PERF_CHANGED: ${{ steps.render.outputs.changed }}
          PERF_VERSION: ${{ env.LATEST_VERSION }}
          HAS_AUTOCOMMIT_APP: ${{ needs.runner-preflight.outputs.has-autocommit-app }}
          # Privacy-safe one-line machine summary from collect-machine-specs.ps1
          # (CPU/RAM/OS only; no hostname or runner name). Drives the comment's
          # "Runner:" line; empty when the spec probe produced nothing.
          PERF_MACHINE_SUMMARY: ${{ steps.render.outputs.machine-summary }}
          # The PR head commit the numbers were rendered against (the checkout
          # ref above). NOT context.sha, which on pull_request events is the
          # transient merge commit that does not exist on the branch.
          PERF_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        with:
          script: |
            const fs = require("fs");
            const marker = "<!-- dxm-perf-autonumbers -->";
            let table = "";
            try {
              table = fs.readFileSync(process.env.PERF_TABLE_FILE, "utf8").trim();
            } catch (err) {
              table = "(no dispatch-throughput table was rendered)";
            }
            const changed = process.env.PERF_CHANGED === "true";
            const version = process.env.PERF_VERSION;
            const { owner, repo } = context.repo;
            const repoUrl = `${context.serverUrl}/${owner}/${repo}`;
            const runUrl = `${repoUrl}/actions/runs/${context.runId}`;
            // Reference the exact PR head commit the numbers reflect, as a
            // navigable link. Fall back to the literal text "this branch" (no
            // commit link) if the SHA is somehow empty, so the comment never
            // renders a broken /commit/ link; the run-logs link is appended
            // separately regardless.
            const headSha = (process.env.PERF_HEAD_SHA || "").trim();
            const commitRef = headSha
              ? `commit [\`${headSha.slice(0, 7)}\`](${repoUrl}/commit/${headSha})`
              : "this branch";
            const autoCommitReady = process.env.HAS_AUTOCOMMIT_APP === "true";
            const autoCommitNote = autoCommitReady
              ? "CI commits the refreshed doc directly to the default branch after this PR merges."
              : "AUTO_COMMIT_APP_* secrets are missing, so CI will warn and skip the post-merge doc commit.";
            const note = changed
              ? `These numbers MOVED versus the committed doc; ${autoCommitNote}`
              : "These numbers are UNCHANGED versus the committed doc.";
            // Privacy-safe runner provenance: CPU/RAM/OS only. Render a "Runner:"
            // line only when the spec probe produced a summary; NEVER print a
            // hardcoded machine name. An empty summary omits the line entirely.
            const machineSummary = (process.env.PERF_MACHINE_SUMMARY || "").trim();
            const runnerLine = machineSummary ? `\nRunner: ${machineSummary}` : "";
            const body = [
              marker,
              `## Dispatch throughput (Unity ${version})${runnerLine}`,
              "",
              `Regenerated by CI from ${commitRef} ([run logs](${runUrl})). ${note}`,
              "",
              table,
            ].join("\n");
            const issue_number = context.payload.pull_request.number;
            const comments = await github.paginate(github.rest.issues.listComments, {
              owner,
              repo,
              issue_number,
            });
            const existing = comments.find(
              (c) => c.body && c.body.includes(marker)
            );
            if (existing) {
              await github.rest.issues.updateComment({
                owner,
                repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number,
                body,
              });
            }

      - name: Fetch the master perf baseline
        id: baseline
        # Pull the committed master baseline so the delta comment can compare this
        # PR's numbers against it. Command-scoped GITHUB_TOKEN credentials only (the
        # checkout used persist-credentials: false). Guarded so a master without the
        # baseline yet -- first rollout -- does NOT fail the job: render-perf-deltas
        # writes a "no baseline yet" note in that case. The refspec form populates
        # refs/remotes/origin/master so `git show origin/master:<path>` resolves.
        env:
          GH_FETCH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          baseline_out="${RUNNER_TEMP}/master-baseline.csv"
          auth_header="$(printf 'x-access-token:%s' "${GH_FETCH_TOKEN}" | base64 | tr -d '\n')"
          git -c "http.https://github.com/.extraheader=AUTHORIZATION: basic ${auth_header}" \
            fetch --no-tags --depth=1 origin \
            "refs/heads/master:refs/remotes/origin/master" || true
          if git show origin/master:docs/architecture/perf-baseline.csv > "${baseline_out}" 2>/dev/null; then
            echo "Fetched master perf baseline to ${baseline_out}."
          else
            rm -f "${baseline_out}"
            echo "::notice::No perf baseline on master yet; the delta comment will note the absent baseline."
          fi
          echo "baseline-csv=${baseline_out}" >> "${GITHUB_OUTPUT}"

      - name: Render DxMessaging perf deltas vs master baseline
        id: deltas
        # Non-blocking: render-perf-deltas.js always exits 0 and prints TWO stdout
        # lines in this stable order -- `changed=true|false` then
        # `regressed=true|false`. `changed` drives the (tolerance-based) delta
        # comment below; `regressed` is the looser CI regression-gate signal
        # consumed by the final "Enforce DxMessaging perf regression gate" step. A
        # missing/header-only baseline yields a "no baseline yet" note and both
        # signals false (graceful first-rollout pass). Parse the SPECIFIC lines (not
        # a whole-stdout equality) so the second line never changes the first's
        # meaning. Scope is PlayMode (the in-editor Mono leg the committed baseline
        # tracks).
        env:
          BASELINE_CSV: ${{ steps.baseline.outputs.baseline-csv }}
        run: |
          set -euo pipefail
          inputs=()
          while IFS= read -r -d '' file; do
            inputs+=(--input "${file}")
          done < <(find .artifacts/perf-download \
            -type f \( -name 'unity.log' -o -name 'results.xml' \) -print0)
          if [ "${#inputs[@]}" -eq 0 ]; then
            echo "::error::No unity.log/results.xml found for ${LATEST_VERSION}."
            exit 1
          fi
          deltas_md="${RUNNER_TEMP}/perf-deltas.md"
          delta_out="$(node scripts/unity/render-perf-deltas.js \
            "${inputs[@]}" \
            --baseline-csv "${BASELINE_CSV}" \
            --unity-version "${LATEST_VERSION}" \
            --scope PlayMode \
            --output "${deltas_md}")"
          changed="$(printf '%s\n' "${delta_out}" | sed -n 's/^changed=//p' | tail -n1)"
          regressed="$(printf '%s\n' "${delta_out}" | sed -n 's/^regressed=//p' | tail -n1)"
          {
            echo "deltas-file=${deltas_md}"
            echo "changed=${changed}"
            echo "regressed=${regressed}"
          } >> "${GITHUB_OUTPUT}"

      - name: Upsert the perf-deltas PR comment
        # Only post/update the delta comment when something actually MOVED beyond
        # tolerance, so unchanged PRs stay quiet. Sticky via the dxm-perf-deltas
        # marker (separate from the always-on autonumbers comment).
        if: steps.deltas.outputs.changed == 'true'
        uses: actions/github-script@v9
        env:
          PERF_DELTAS_FILE: ${{ steps.deltas.outputs.deltas-file }}
          PERF_VERSION: ${{ env.LATEST_VERSION }}
        with:
          script: |
            const fs = require("fs");
            const marker = "<!-- dxm-perf-deltas -->";
            let table = "";
            try {
              table = fs.readFileSync(process.env.PERF_DELTAS_FILE, "utf8").trim();
            } catch (err) {
              table = "(no perf delta table was rendered)";
            }
            const version = process.env.PERF_VERSION;
            const { owner, repo } = context.repo;
            const repoUrl = `${context.serverUrl}/${owner}/${repo}`;
            const runUrl = `${repoUrl}/actions/runs/${context.runId}`;
            const body = [
              marker,
              `## DxMessaging perf deltas vs master baseline (Unity ${version}, PlayMode)`,
              "",
              `Regenerated by CI ([run logs](${runUrl})). Only metrics that moved beyond tolerance are flagged.`,
              "",
              table,
            ].join("\n");
            const issue_number = context.payload.pull_request.number;
            const comments = await github.paginate(github.rest.issues.listComments, {
              owner,
              repo,
              issue_number,
            });
            const existing = comments.find(
              (c) => c.body && c.body.includes(marker)
            );
            if (existing) {
              await github.rest.issues.updateComment({
                owner,
                repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number,
                body,
              });
            }

      # FINAL gate, AFTER the delta comment has posted so reviewers always see the
      # numbers even when the gate fails. render-perf-deltas.js compares this PR's
      # PlayMode DxMessaging numbers against the master baseline and emits
      # `regressed=true` only when a gated scenario dropped throughput beyond the
      # regression threshold or increased allocation. A missing/header-only baseline
      # yields regressed=false (the script always prints a literal true/false), so the
      # `== 'true'` condition is false -> this step is skipped -> graceful first-rollout
      # pass. No continue-on-error: a real regression must fail the job.
      - name: Enforce DxMessaging perf regression gate
        if: steps.deltas.outputs.regressed == 'true'
        run: |
          echo "::error::DxMessaging perf regression detected vs master baseline (see the perf delta comment)."
          exit 1

  commit-perf-doc:
    name: Commit refreshed perf doc to the default branch
    needs:
      - runner-preflight
      - perf-benchmarks
    # PUSH-TO-DEFAULT-BRANCH path: after a PR merges, re-render the doc from the
    # merged code, regenerate the master baseline CSV from the same run, and if
    # either moved, commit them DIRECTLY to the pushed
    # default branch using a GitHub App installation token. The built-in
    # GITHUB_TOKEN cannot push to a protected branch, so a dedicated App that is
    # allowed to bypass branch protection does the push. Recursion is broken by
    # the push trigger's paths-ignore on the perf doc + baseline, not by token
    # identity, so the doc + baseline auto-commit cannot re-run the benchmark --
    # no loop guard needed. Gated on a clean benchmark AND the App credentials being present
    # (otherwise this job degrades to a logged no-op); stale benchmark artifacts
    # also warn and skip if another merge advanced the branch first. See
    # docs/runbooks/perf-numbers-auto-commit.md.
    if: >-
      ${{
        github.event_name == 'push' &&
        needs.perf-benchmarks.result == 'success' &&
        needs.runner-preflight.outputs.has-autocommit-app == 'true'
      }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    # The push is authenticated by the GitHub App installation token (minted
    # below), NOT the job's GITHUB_TOKEN, so contents:read is all this job's own
    # token needs (checkout fallback + artifact download). No pull-requests scope:
    # this path pushes directly, it does not open a PR.
    permissions:
      contents: read
    env:
      LATEST_VERSION: ${{ needs.runner-preflight.outputs.latest-version }}
      PERF_DOC: docs/architecture/performance.md
      # The committed master baseline that the regression gate + PR delta comment
      # compare against. Regenerated from the real post-merge run and committed
      # alongside performance.md so the seeded bootstrap baseline becomes REAL
      # after the first master push. Added to the push trigger's paths-ignore so
      # this auto-commit cannot re-trigger the benchmark workflow.
      PERF_BASELINE: docs/architecture/perf-baseline.csv
    steps:
      - name: Generate auto-commit GitHub App token
        id: app-token
        # The App must have Contents: read and write, be installed on this repo,
        # and be allowed to bypass the master/main branch protection. The job `if`
        # above already proved both secrets are present.
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ secrets.AUTO_COMMIT_APP_ID }}
          private-key: ${{ secrets.AUTO_COMMIT_APP_PRIVATE_KEY }}

      - name: Checkout default branch
        uses: actions/checkout@v6
        with:
          token: ${{ steps.app-token.outputs.token }}
          persist-credentials: false

      - name: Check default branch is still current
        id: default-branch
        env:
          GH_FETCH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          set -euo pipefail
          auth_header="$(printf 'x-access-token:%s' "${GH_FETCH_TOKEN}" | base64 | tr -d '\n')"
          git -c "http.https://github.com/.extraheader=AUTHORIZATION: basic ${auth_header}" \
            fetch --no-tags --depth=1 origin \
            "refs/heads/${GITHUB_REF_NAME}:refs/remotes/origin/${GITHUB_REF_NAME}"
          latest_sha="$(git rev-parse "refs/remotes/origin/${GITHUB_REF_NAME}")"
          if [ "${latest_sha}" != "${GITHUB_SHA}" ]; then
            message="Default branch ${GITHUB_REF_NAME} advanced from ${GITHUB_SHA} to ${latest_sha}; "
            message+="skipping the perf doc auto-commit for stale benchmark artifacts. "
            message+="A newer push run will publish current numbers."
            echo "::warning::${message}"
            echo "fresh=false" >> "${GITHUB_OUTPUT}"
            exit 0
          fi
          echo "fresh=true" >> "${GITHUB_OUTPUT}"

      - name: Setup Node.js
        if: steps.default-branch.outputs.fresh == 'true'
        uses: actions/setup-node@v6
        with:
          node-version: "22.18.0"
          cache: npm
          cache-dependency-path: package.json

      - name: Install dependencies
        if: steps.default-branch.outputs.fresh == 'true'
        run: |
          if [ -f package-lock.json ]; then
            npm ci
          else
            npm i --no-audit --no-fund
          fi

      - name: Download perf benchmark artifacts
        if: steps.default-branch.outputs.fresh == 'true'
        uses: actions/download-artifact@v8
        with:
          pattern: perf-${{ env.LATEST_VERSION }}-*
          path: .artifacts/perf-download

      - name: Render dispatch-throughput table from this run
        id: render
        if: steps.default-branch.outputs.fresh == 'true'
        run: |
          set -euo pipefail
          inputs=()
          while IFS= read -r -d '' file; do
            inputs+=(--input "${file}")
          done < <(find .artifacts/perf-download \
            -type f \( -name 'unity.log' -o -name 'results.xml' \) -print0)
          if [ "${#inputs[@]}" -eq 0 ]; then
            echo "::error::No unity.log/results.xml found for ${LATEST_VERSION}."
            exit 1
          fi
          # Embed the real runner provenance in the committed doc's "Runner:" line
          # from the privacy-safe machine-specs JSON the perf leg uploaded (glob;
          # first match). render-perf-doc.js falls back to a neutral description
          # when it is absent, so a missing probe never blocks the commit.
          machine_specs_json="$(find .artifacts/perf-download \
            -type f -name 'machine-specs.json' -print 2>/dev/null | sort | head -n1)"
          machine_specs_args=()
          if [ -n "${machine_specs_json}" ]; then
            machine_specs_args=(--machine-specs "${machine_specs_json}")
          fi
          node scripts/unity/render-perf-doc.js \
            "${inputs[@]}" \
            --doc "${PERF_DOC}" \
            --unity-version "${LATEST_VERSION}" \
            "${machine_specs_args[@]}"
          node scripts/run-managed-prettier.js --write "${PERF_DOC}"
          # Regenerate the committed master baseline from the SAME real run so the
          # regression gate + PR delta comment compare against REAL numbers after
          # the first master push (the committed seed is only a bootstrap).
          # --replace overwrites the existing rows with this run's rows.
          node scripts/unity/extract-perf-baseline.js \
            "${inputs[@]}" \
            --output "${PERF_BASELINE}" \
            --replace
          # The doc OR the baseline moving counts as a change to commit. Check both
          # tracked paths so a baseline-only refresh is still committed.
          if git diff --quiet -- "${PERF_DOC}" "${PERF_BASELINE}"; then
            echo "changed=false" >> "${GITHUB_OUTPUT}"
          else
            echo "changed=true" >> "${GITHUB_OUTPUT}"
          fi

      - name: Verify rendered doc passes the required prettier gate
        if: steps.default-branch.outputs.fresh == 'true' && steps.render.outputs.changed == 'true'
        # Belt-and-suspenders, now load-bearing: the paths-ignore loop break means
        # the committed doc does not get a fresh markdown-json.yml run, so fail
        # loudly HERE rather than push a doc that is red on the required prettier
        # gate.
        run: node scripts/run-managed-prettier.js --check "${PERF_DOC}"

      - name: Commit and push refreshed perf doc
        if: steps.default-branch.outputs.fresh == 'true' && steps.render.outputs.changed == 'true'
        env:
          GH_PUSH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          set -euo pipefail
          auth_header="$(printf 'x-access-token:%s' "${GH_PUSH_TOKEN}" | base64 | tr -d '\n')"
          git -c "http.https://github.com/.extraheader=AUTHORIZATION: basic ${auth_header}" \
            fetch --no-tags --depth=1 origin \
            "refs/heads/${GITHUB_REF_NAME}:refs/remotes/origin/${GITHUB_REF_NAME}"
          latest_sha="$(git rev-parse "refs/remotes/origin/${GITHUB_REF_NAME}")"
          if [ "${latest_sha}" != "${GITHUB_SHA}" ]; then
            message="Default branch ${GITHUB_REF_NAME} advanced from ${GITHUB_SHA} to ${latest_sha}; "
            message+="skipping the perf doc auto-commit for stale benchmark artifacts. "
            message+="A newer push run will publish current numbers."
            echo "::warning::${message}"
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -- "${PERF_DOC}"
          # Stage the regenerated baseline in the SAME commit so the gate + delta
          # baselines become real on master. paths-ignore covers both files, so
          # this commit cannot re-trigger the benchmark workflow.
          git add -- "${PERF_BASELINE}"
          if git diff --cached --quiet -- "${PERF_DOC}" "${PERF_BASELINE}"; then
            echo "No staged perf doc/baseline changes remain; nothing to commit."
            exit 0
          fi
          git commit -m "docs(perf): auto-update dispatch throughput numbers"

          set +e
          git -c "http.https://github.com/.extraheader=AUTHORIZATION: basic ${auth_header}" \
            push origin "HEAD:${GITHUB_REF_NAME}"
          push_status=$?
          set -e
          if [ "${push_status}" -eq 0 ]; then
            exit 0
          fi

          git -c "http.https://github.com/.extraheader=AUTHORIZATION: basic ${auth_header}" \
            fetch --no-tags --depth=1 origin \
            "refs/heads/${GITHUB_REF_NAME}:refs/remotes/origin/${GITHUB_REF_NAME}"
          latest_after_push="$(git rev-parse "refs/remotes/origin/${GITHUB_REF_NAME}")"
          if [ "${latest_after_push}" != "${GITHUB_SHA}" ]; then
            message="Default branch ${GITHUB_REF_NAME} advanced from ${GITHUB_SHA} "
            message+="to ${latest_after_push} during the perf doc push; skipping stale "
            message+="benchmark artifacts. A newer push run will publish current numbers."
            echo "::warning::${message}"
            exit 0
          fi

          echo "::error::Perf doc auto-commit push failed while ${GITHUB_REF_NAME} still pointed at ${GITHUB_SHA}."
          exit "${push_status}"
