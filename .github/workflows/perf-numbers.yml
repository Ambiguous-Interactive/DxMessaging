name: Performance Numbers

# CI owns the documented dispatch-throughput numbers end to end. On every push to
# master/main -- or on a controlled manual dispatch from the default branch --
# this workflow runs the dispatch benchmarks on ELI-MACHINE (the `fast` runner)
# at the LATEST Unity version on TWO legs. BOTH legs publish: the Standalone
# IL2CPP (Release player) leg is the throughput
# HEADLINE -- the AOT backend shipped players run -- while the in-editor PlayMode
# (Mono) leg supplies the REAL GC-allocation numbers, because a Release player
# strips the GC.Alloc profiler recorder so the Standalone leg cannot measure them at
# all (the renderer omits those memory columns). Allocation counts are build-config-independent, so
# the Mono counts represent the shipped IL2CPP player; the committed regression
# baseline stays Standalone-only (extract-perf-baseline.js --scope Standalone).
# On push to master or main (after the PR merges) -- or on a manual
# workflow_dispatch from the default
# branch, the supported recovery path after a failed publish -- the same
# benchmarks run and, if the numbers moved, CI lands the refreshed doc AND the
# regenerated master baseline CSV on the default branch in two tiers:
#   1. DIRECT PUSH with a GitHub App installation token (the built-in
#      GITHUB_TOKEN cannot push to a protected branch; github-actions[bot] is a
#      system account and is not a selectable bypass actor).
#   2. FALLBACK AUTO-MERGE PULL REQUEST when the direct push is rejected
#      (GH006): the same commit is pushed to a ci/perf-auto-update-* branch and
#      delivered via a PR opened with the App token, with squash auto-merge
#      requested. The refreshed numbers are therefore NEVER lost -- worst case
#      they wait in a visible PR for one human click.
# If the branch advances before this long benchmark run reaches the push step,
# the job warns and skips the stale artifacts. App-token pushes DO re-trigger
# workflows, so recursion is broken the simple way: the push trigger ignores
# docs/architecture/performance.md and docs/architecture/perf-baseline.csv below,
# so the auto-commit cannot re-run the benchmark. Fallback PRs do not match a
# workflow trigger, so they cannot run licensed benchmarks either. The committed
# numbers are therefore owned by CI, not by committed state, manual runs, or
# PR-body text.
#
# PREREQUISITE: a GitHub App (App ID in secrets.AUTO_COMMIT_APP_ID, private key in
# secrets.AUTO_COMMIT_APP_PRIVATE_KEY) with Contents: read and write PLUS Pull
# requests: read and write (for the fallback PR), installed on this repo and --
# for the tier-1 fast path -- allowed to bypass the master/main branch
# protection. Without the bypass the push is rejected with GH006 and tier 2
# takes over; if the secrets are absent entirely the commit job degrades to a
# logged no-op. See docs/runbooks/perf-numbers-auto-commit.md for the exact
# setup + click-paths.
on:
  push:
    branches:
      - master
      - main
    # Loop break: the commit-perf-doc job pushes a doc + baseline commit with a
    # GitHub App token, which (unlike the built-in GITHUB_TOKEN) DOES re-trigger
    # workflows. Ignoring BOTH the perf doc AND the regenerated baseline CSV here
    # means that auto-commit cannot re-run the benchmark. A normal code merge still
    # touches non-ignored paths and runs.
    paths-ignore:
      - docs/architecture/performance.md
      - docs/architecture/perf-baseline.csv
  workflow_dispatch:

# Serialize merge-path runs on the same ref so two post-merge push jobs from
# this workflow do not race each other. A separate freshness check still guards
# against unrelated default-branch pushes landing while the benchmarks run. We do
# NOT cancel in-progress runs -- that would abort an in-flight benchmark.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

# Top-level least-privilege. The default-branch refresh job (commit-perf-doc)
# pushes with a GitHub App token, so its own GITHUB_TOKEN needs only
# contents:read. It grants that scope on the job itself so the licensed Unity job
# never inherits write.
permissions:
  contents: read
  checks: write

jobs:
  runner-preflight:
    name: Self-hosted runner access preflight
    # Runs on GitHub-hosted infrastructure before the self-hosted matrix can
    # queue. The dedicated reader App makes missing inventory a hard failure.
    runs-on: ubuntu-latest
    timeout-minutes: 3
    permissions:
      contents: read
    concurrency:
      group: ${{ github.workflow }}-runner-preflight-${{ github.ref }}
      cancel-in-progress: true
    outputs:
      latest-version: ${{ steps.versions.outputs.latest-version }}
      unity-versions: ${{ steps.versions.outputs.unity-versions }}
      has-autocommit-app: ${{ steps.check-autocommit-app.outputs.has-app }}
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          fetch-depth: 1
          persist-credentials: false

      - name: Require an online performance runner
        uses: Ambiguous-Interactive/ambiguous-organization-build-lock/.github/actions/check-unity-runner-availability@59a2fa98224569e5a697f271a3ac4b866c53ac2c # v1.8.3
        with:
          reader-app-id: ${{ secrets.BUILD_LOCK_READER_APP_ID }}
          reader-app-private-key: ${{ secrets.BUILD_LOCK_READER_APP_PRIVATE_KEY }}
          required-label-sets: '[["self-hosted","Windows","RAM-64GB","fast"]]'

      - name: Resolve Unity version from canonical source
        id: versions
        # Single source of truth: .github/unity-versions.json. perf tracks the
        # LATEST entry only (last element of `all`); emitting it here means the
        # matrix leg, the artifact-download pattern, and render-perf-doc.js all
        # consume ONE value and cannot drift. See scripts/validate-unity-versions.js.
        run: |
          set -euo pipefail
          file=.github/unity-versions.json
          latest="$(jq -r '.all[-1]' "${file}")"
          {
            printf 'latest-version=%s\n' "${latest}"
            printf 'unity-versions=%s\n' "$(jq -c '[.all[-1]]' "${file}")"
          } >> "${GITHUB_OUTPUT}"

      - name: Check for the auto-commit GitHub App credentials
        id: check-autocommit-app
        # Gates the post-merge commit job so a repo that has not yet provisioned
        # the AUTO_COMMIT_APP_* GitHub App degrades to a logged no-op (the PR
        # comment still posts) instead of a red push-build. See
        # docs/runbooks/perf-numbers-auto-commit.md.
        env:
          AUTO_COMMIT_APP_ID: ${{ secrets.AUTO_COMMIT_APP_ID }}
          AUTO_COMMIT_APP_PRIVATE_KEY: ${{ secrets.AUTO_COMMIT_APP_PRIVATE_KEY }}
        run: |
          set -euo pipefail
          if [ -n "${AUTO_COMMIT_APP_ID:-}" ] && \
             [ -n "${AUTO_COMMIT_APP_PRIVATE_KEY:-}" ]; then
            echo "has-app=true" >> "${GITHUB_OUTPUT}"
          else
            if [ "${GITHUB_EVENT_NAME:-}" = "push" ] || [ "${GITHUB_EVENT_NAME:-}" = "workflow_dispatch" ]; then
              echo "::warning::AUTO_COMMIT_APP_* secrets are not set; skipping the perf doc auto-commit. See docs/runbooks/perf-numbers-auto-commit.md."
            fi
            echo "has-app=false" >> "${GITHUB_OUTPUT}"
          fi

  perf-benchmarks:
    name: Perf benchmarks ${{ matrix.unity-version }} ${{ matrix.test-mode }}
    needs:
      - runner-preflight
    # Licensed Unity runs only after protected code lands or through a controlled
    # default-branch dispatch; pull requests are not a workflow trigger.
    # NON-BLOCKING PlayMode leg. The Standalone leg is the throughput HEADLINE +
    # baseline source and MUST gate publishing; the PlayMode leg only supplies the
    # (best-effort) allocation counts. Marking the PlayMode leg continue-on-error
    # makes a flaky PlayMode failure report SUCCESS for the matrix-aggregating
    # `needs.perf-benchmarks.result`, so the downstream commit job (gated on
    # result == 'success') still publishes the Standalone headline +
    # baseline; that run simply omits the allocation/byte tables (no leg measured
    # them) until PlayMode is healthy again. `fail-fast: false` (below) still keeps a Standalone failure
    # from cancelling an in-flight PlayMode leg.
    continue-on-error: ${{ matrix.test-mode != 'standalone' }}
    # Pinned to ELI-MACHINE via the `fast` label (the only self-hosted Windows
    # runner carrying it). Keep in sync with the preflight REQUIRED_LABELS.
    runs-on: [self-hosted, Windows, RAM-64GB, fast]
    timeout-minutes: 660
    strategy:
      fail-fast: false
      matrix:
        # LATEST Unity version only -- the documented numbers track the newest
        # supported runtime. The single latest version is resolved from the
        # canonical source (.github/unity-versions.json) via runner-preflight, so
        # the matrix leg, the artifact-download pattern, and render-perf-doc.js all
        # consume ONE value and cannot drift. Single-entry matrix (not a bare
        # scalar) so the leg name still carries the version.
        unity-version: ${{ fromJSON(needs.runner-preflight.outputs.unity-versions) }}
        # BOTH legs publish. Standalone IL2CPP (Release player) is the throughput
        # HEADLINE -- the AOT backend shipped games run. The in-editor PlayMode
        # (Mono) leg supplies the REAL GC-allocation numbers: a Release player
        # strips the GC.Alloc profiler recorder, so the Standalone leg cannot measure
        # allocations at all (the renderer omits those memory columns), while the
        # editor's Mono backend can count them (allocation counts are build-config-independent,
        # so the Mono counts represent the shipped IL2CPP player). render-perf-doc.js
        # renders whatever scopes are present and sources each matrix from the scope
        # that measured it.
        test-mode:
          - standalone
          - playmode
    steps:
      - name: Enable Git long paths
        shell: pwsh
        env:
          GIT_CONFIG_GLOBAL: ${{ runner.temp }}/dxm-gitconfig
        run: git config --global core.longpaths true

      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        env:
          GIT_CONFIG_GLOBAL: ${{ runner.temp }}/dxm-gitconfig
        with:
          lfs: true
          persist-credentials: false

      - name: Print runner diagnostics
        # Composite action runs PowerShell internally; `shell: bash` on this
        # self-hosted Windows runner resolves to the WSL stub and fails:
        # never use plain `shell: bash` on self-hosted Windows runners.
        uses: ./.github/actions/print-self-hosted-runner-diagnostics
        with:
          matrix-note: "perf (organization lock wraps the Unity section)"
          requested-labels: "self-hosted, Windows, RAM-64GB, fast"

      - name: Cache Unity Library and package caches
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6
        env:
          PACKAGE_HASH: >-
            ${{ hashFiles(
              'package.json',
              'Runtime/**',
              'Editor/**',
              'Tests/**',
              'scripts/unity/run-ci-tests.ps1',
              'scripts/unity/lib/asmdef-discovery.js',
              '.github/actions/compute-unity-assemblies/action.yml',
              '.github/comparison-packages.json'
            ) }}
        with:
          path: |
            .artifacts/unity/projects/${{ matrix.unity-version }}-${{ matrix.test-mode }}/Library
            .artifacts/unity/cache/${{ matrix.unity-version }}
          key: Library-perf-${{ runner.os }}-${{ runner.arch }}-${{ matrix.unity-version }}-${{ matrix.test-mode }}-${{ env.PACKAGE_HASH }}

      - name: Setup Node.js
        uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38 # v6
        with:
          node-version: "22.18.0"

      # Single source of truth for the assembly include list. Perf benchmarks
      # OPT IN to the Benchmarks/Allocations assemblies via include-perf, exactly
      # as unity-benchmarks.yml does.
      - name: Compute benchmark assembly list
        id: compute
        uses: ./.github/actions/compute-unity-assemblies
        with:
          include-perf: "true"
          include-comparisons: "true"
          target: "${{ matrix.test-mode }}"

      - name: Validate Unity license secrets
        uses: ./.github/actions/validate-unity-license
        env:
          UNITY_SERIAL: ${{ secrets.UNITY_SERIAL }}
          UNITY_EMAIL: ${{ secrets.UNITY_EMAIL }}
          UNITY_PASSWORD: ${{ secrets.UNITY_PASSWORD }}

      # Capture privacy-safe machine specs for the doc/comment provenance line
      # (CPU/RAM/OS only -- collect-machine-specs.ps1 deliberately emits NO
      # hostname or runner name). Runs BEFORE the org lock so it never holds the
      # shared Unity seat, and writes into THIS leg's artifact dir so the existing
      # "Upload perf benchmark artifacts" step (which uploads the whole leg dir)
      # carries the specs to the doc/comment jobs. The script exits 0 even on
      # failure, so a probe error never reds the benchmark leg.
      - name: Collect machine specs
        shell: pwsh
        run: |
          $artifactsPath = '.artifacts/unity/perf/${{ matrix.unity-version }}-${{ matrix.test-mode }}'
          New-Item -ItemType Directory -Force -Path $artifactsPath | Out-Null
          ./scripts/unity/collect-machine-specs.ps1 `
            -OutputJson (Join-Path $artifactsPath 'machine-specs.json') `
            -OutputSummary (Join-Path $artifactsPath 'machine-specs.txt')

      # Editor install/repair does NOT require the paid Unity seat, so it runs
      # BEFORE the org lock. The Standalone (IL2CPP) leg builds a real IL2CPP
      # player, so it provisions StandaloneWindowsIl2Cpp (Windows Build Support
      # with the IL2CPP scripting backend). The PlayMode leg runs IN-EDITOR (Mono)
      # for allocation capture and builds no player, so it provisions EditorOnly
      # -- matching run-ci-tests.ps1's own 'EditorOnly' choice for a non-standalone
      # mode. Skip provisioning, the org lock, and the run when the
      # compute step resolved an empty assembly list, so an empty discovery never
      # takes the paid Unity seat / org lock only to fail late at verify. The
      # verify step runs only after compute succeeds and is told via
      # expected-empty. Mirrors unity-tests.yml. The perf list is structurally
      # non-empty, so this is defense-in-depth and uniformity with the required
      # workflows.
      - name: Provision Unity Editor
        if: ${{ steps.compute.outputs.is-empty != 'true' }}
        timeout-minutes: 180
        shell: pwsh
        run: |
          $artifactsPath = '.artifacts/unity/perf/${{ matrix.unity-version }}-${{ matrix.test-mode }}'
          $diagnosticsPath = Join-Path $artifactsPath 'provisioning'
          $diagnosticsFile = Join-Path $diagnosticsPath 'ensure-editor-summary.json'
          New-Item -ItemType Directory -Force -Path $diagnosticsPath | Out-Null
          $provisioningProfile = if ('${{ matrix.test-mode }}' -eq 'standalone') { 'StandaloneWindowsIl2Cpp' } else { 'EditorOnly' }
          $editor = ./scripts/unity/ensure-editor.ps1 `
            -UnityVersion '${{ matrix.unity-version }}' `
            -CiManagedOnly `
            -RequireHealthyExisting `
            -ProvisioningProfile $provisioningProfile `
            -DiagnosticsPath $diagnosticsFile
          "UNITY_EDITOR_PATH=$editor" | Out-File -FilePath $env:GITHUB_ENV -Append

      - name: Upload Unity provisioning diagnostics
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: perf-provisioning-${{ matrix.unity-version }}-${{ matrix.test-mode }}
          path: .artifacts/unity/perf/${{ matrix.unity-version }}-${{ matrix.test-mode }}/provisioning
          if-no-files-found: warn
          retention-days: 14

      - name: Acquire organization Unity lock
        id: acquire_lock
        if: ${{ steps.compute.outputs.is-empty != 'true' }}
        uses: Ambiguous-Interactive/ambiguous-organization-build-lock/.github/actions/acquire-build-lock@59a2fa98224569e5a697f271a3ac4b866c53ac2c # v1.8.3
        with:
          lock-name: wallstop-organization-builds
          holder-id-suffix: perf-${{ matrix.unity-version }}-${{ matrix.test-mode }}
          runner-id: ${{ runner.name }}
          timeout-minutes: "300"
        env:
          BUILD_LOCK_APP_ID: ${{ secrets.BUILD_LOCK_APP_ID }}
          BUILD_LOCK_APP_PRIVATE_KEY: ${{ secrets.BUILD_LOCK_APP_PRIVATE_KEY }}

      - name: Require acquired Unity lock
        if: ${{ steps.compute.outputs.is-empty != 'true' && steps.acquire_lock.outputs.acquired != 'true' }}
        shell: pwsh
        run: exit 1

      - name: Run Unity Test Runner
        id: run_tests
        if: ${{ steps.compute.outputs.is-empty != 'true' && steps.acquire_lock.outputs.acquired == 'true' }}
        # 180 (not 120): the Standalone leg builds a COLD IL2CPP player, which is
        # far slower than a Mono build. The PlayMode leg runs IN-EDITOR (Mono) with
        # no player build and is faster, so 180 is generous for it too. Stays
        # strictly below the job-level timeout (660) so the step clock
        # fires first and releases the shared Unity seat. Must stay >= the
        # validator's RUN_BUDGET (120).
        timeout-minutes: 180
        shell: pwsh
        env:
          UNITY_SERIAL: ${{ secrets.UNITY_SERIAL }}
          UNITY_EMAIL: ${{ secrets.UNITY_EMAIL }}
          UNITY_PASSWORD: ${{ secrets.UNITY_PASSWORD }}
          UNITY_ACCELERATOR_ENDPOINT: ${{ secrets.UNITY_ACCELERATOR_ENDPOINT }}
          DX_PERF_COMMIT: ${{ github.sha }}
          DXM_UNITY_TEST_CATEGORY: "PerfBench;Comparison"
        run: |
          # HASHTABLE splat (not an array): array splatting passes elements
          # POSITIONALLY, so '-IncludeComparisons' would bind to $RepoRoot. A
          # hashtable binds by parameter name. run-ci-tests.ps1 strips
          # BuildOptions.Development from the test player UNCONDITIONALLY (the
          # Unity Test Framework injects it by default; Release is the runner's
          # contract and -ReleasePlayerBuild is a kept-for-clarity no-op), so the
          # published numbers come from a true Release IL2CPP player
          # (Release C++ config, isDebugBuild=false).
          $extra = @{
              IncludeComparisons = $true
              ReleaseCodeOptimization = $true
              ReleasePlayerBuild = $true
              StandaloneScriptingBackend = 'IL2CPP'
          }
          ./scripts/unity/run-ci-tests.ps1 `
            -UnityVersion '${{ matrix.unity-version }}' `
            -TestMode '${{ matrix.test-mode }}' `
            -AssemblyNames $env:DXM_TEST_ASSEMBLIES `
            -ArtifactsPath '.artifacts/unity/perf/${{ matrix.unity-version }}-${{ matrix.test-mode }}' `
            @extra

      - name: Return Unity license
        id: return_unity_license
        if: always()
        timeout-minutes: 5
        continue-on-error: true
        uses: ./.github/actions/return-unity-license
        with:
          prior-return-log-path: ${{ runner.temp }}/unity-return-${{ matrix.unity-version }}-${{ matrix.test-mode }}.log
          evidence-paths: |
            ${{ runner.temp }}/unity-activate-${{ matrix.unity-version }}-${{ matrix.test-mode }}.log
            .artifacts/unity/perf/${{ matrix.unity-version }}-${{ matrix.test-mode }}
        env:
          UNITY_EMAIL: ${{ secrets.UNITY_EMAIL }}
          UNITY_PASSWORD: ${{ secrets.UNITY_PASSWORD }}

      - name: Release organization Unity lock
        if: always()
        uses: Ambiguous-Interactive/ambiguous-organization-build-lock/.github/actions/release-build-lock@59a2fa98224569e5a697f271a3ac4b866c53ac2c # v1.8.3
        with:
          lock-name: wallstop-organization-builds
          holder-id-suffix: perf-${{ matrix.unity-version }}-${{ matrix.test-mode }}
          runner-id: ${{ runner.name }}
          resource-cleanup-status: ${{ steps.return_unity_license.outputs.resource-cleanup-status }}
          resource-health: ${{ steps.return_unity_license.outputs.resource-health }}
          resource-reason: ${{ steps.return_unity_license.outputs.resource-reason }}
        env:
          BUILD_LOCK_APP_ID: ${{ secrets.BUILD_LOCK_APP_ID }}
          BUILD_LOCK_APP_PRIVATE_KEY: ${{ secrets.BUILD_LOCK_APP_PRIVATE_KEY }}

      - name: Capture exact standalone player size
        if: ${{ matrix.test-mode == 'standalone' && steps.run_tests.outcome == 'success' }}
        shell: pwsh
        run: |
          $playerDir = '.artifacts/unity/projects/${{ matrix.unity-version }}-standalone/Build/DxmTestPlayer'
          $playerExe = Join-Path $playerDir 'DxmTestPlayer.exe'
          if (-not (Test-Path -LiteralPath $playerExe -PathType Leaf)) {
            throw "Validated standalone player was not found at $playerExe"
          }
          $files = @(Get-ChildItem -LiteralPath $playerDir -File -Recurse -Force)
          [long]$totalBytes = ($files | Measure-Object -Property Length -Sum).Sum
          $manifest = [ordered]@{
            commit = '${{ github.sha }}'
            unityVersion = '${{ matrix.unity-version }}'
            scriptingBackend = 'IL2CPP'
            codeOptimization = 'Release'
            il2CppConfiguration = 'Release'
            apiCompatibility = '.NET Standard 2.1'
            totalBytes = $totalBytes
            executableBytes = (Get-Item -LiteralPath $playerExe).Length
            fileCount = $files.Count
          }
          $artifactsPath = '.artifacts/unity/perf/${{ matrix.unity-version }}-standalone'
          $manifest | ConvertTo-Json | Set-Content -LiteralPath (Join-Path $artifactsPath 'player-size.json') -Encoding utf8
          "totalBytes=$totalBytes executableBytes=$($manifest.executableBytes) fileCount=$($files.Count)" |
            Set-Content -LiteralPath (Join-Path $artifactsPath 'player-size.txt') -Encoding utf8
          Write-Host "Exact standalone player size: $totalBytes bytes across $($files.Count) files."

      - name: Dump Unity log tail on failure or cancellation
        if: ${{ failure() || cancelled() }}
        uses: ./.github/actions/dump-unity-log-tail
        with:
          results-dir: .artifacts/unity/perf/${{ matrix.unity-version }}-${{ matrix.test-mode }}
          label: Perf ${{ matrix.unity-version }} ${{ matrix.test-mode }}

      - name: Verify tests actually ran
        if: >-
          ${{
            !cancelled() &&
            steps.compute.outcome == 'success' &&
            (steps.compute.outputs.is-empty == 'true' || steps.run_tests.outcome != 'skipped')
          }}
        uses: ./.github/actions/verify-unity-results
        with:
          results-dir: .artifacts/unity/perf/${{ matrix.unity-version }}-${{ matrix.test-mode }}
          label: Perf ${{ matrix.unity-version }} ${{ matrix.test-mode }}
          expected-empty: ${{ steps.compute.outputs.is-empty }}

      - name: Upload perf benchmark artifacts
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: perf-${{ matrix.unity-version }}-${{ matrix.test-mode }}
          path: .artifacts/unity/perf/${{ matrix.unity-version }}-${{ matrix.test-mode }}
          if-no-files-found: warn
          retention-days: 14

  commit-perf-doc:
    name: Commit refreshed perf doc to the default branch
    needs:
      - runner-preflight
      - perf-benchmarks
    # DEFAULT-BRANCH REFRESH path: after a PR merges (push event) -- or on a
    # manual workflow_dispatch from the default branch, which is the supported
    # RECOVERY path when an earlier auto-commit failed -- re-render the doc from
    # the just-benchmarked code, regenerate the master baseline CSV from the same
    # run, and if either moved, land them on the default branch. The landing is
    # attempted in two tiers:
    #   1. DIRECT PUSH with a GitHub App installation token (the built-in
    #      GITHUB_TOKEN cannot push to a protected branch). Requires the App to
    #      be a branch-protection/ruleset bypass actor.
    #   2. FALLBACK PULL REQUEST: if the direct push is rejected (GH006 --
    #      bypass not granted, or required status checks on a classic rule), the
    #      job pushes the commit to a ci/perf-auto-update-* branch, opens a PR
    #      with the App token, and enables squash auto-merge. The numbers are
    #      then NEVER lost: worst case the PR waits for a human merge (which can
    #      require an admin if a required check never reports on doc-only
    #      diffs -- see the runbook's fallback prerequisites). No pull_request
    #      trigger exists, so the fallback PR cannot run licensed benchmarks.
    # Recursion is broken by the push trigger's paths-ignore on the perf doc +
    # baseline, not by token identity, so the doc + baseline auto-commit cannot
    # re-run the benchmark -- no loop guard needed. Gated on a clean benchmark
    # AND the App credentials being present (otherwise this job degrades to a
    # logged no-op); stale benchmark artifacts also warn and skip if another
    # merge advanced the branch first. See
    # docs/runbooks/perf-numbers-auto-commit.md.
    if: >-
      ${{
        (
          github.event_name == 'push' ||
          (
            github.event_name == 'workflow_dispatch' &&
            github.ref == format('refs/heads/{0}', github.event.repository.default_branch)
          )
        ) &&
        needs.perf-benchmarks.result == 'success' &&
        needs.runner-preflight.outputs.has-autocommit-app == 'true'
      }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    # The push/PR is authenticated by the GitHub App installation token (minted
    # below), NOT the job's GITHUB_TOKEN, so contents:read is all this job's own
    # token needs (checkout fallback + artifact download). The fallback PR is
    # also created with the App token, so no pull-requests scope is needed here
    # either -- but the App itself must hold Contents AND Pull requests
    # read-and-write (see the runbook).
    permissions:
      contents: read
    env:
      LATEST_VERSION: ${{ needs.runner-preflight.outputs.latest-version }}
      PERF_DOC: docs/architecture/performance.md
      # The committed master baseline that the regression gate + PR delta comment
      # compare against. Regenerated from the real post-merge run and committed
      # alongside performance.md so the seeded bootstrap baseline becomes REAL
      # after the first master push. Added to the push trigger's paths-ignore so
      # this auto-commit cannot re-trigger the benchmark workflow.
      PERF_BASELINE: docs/architecture/perf-baseline.csv
    steps:
      - name: Generate auto-commit GitHub App token
        id: app-token
        # The App must have Contents + Pull requests read-and-write, be installed
        # on this repo, and (for the fast path) be allowed to bypass the
        # master/main branch protection. The job `if` above already proved both
        # secrets are present. The action's v3 metadata requires app-id; keep
        # this name aligned with actionlint instead of using legacy aliases.
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3
        with:
          app-id: ${{ secrets.AUTO_COMMIT_APP_ID }}
          private-key: ${{ secrets.AUTO_COMMIT_APP_PRIVATE_KEY }}

      - name: Checkout default branch
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          token: ${{ steps.app-token.outputs.token }}
          persist-credentials: false

      - name: Check default branch is still current
        id: default-branch
        env:
          GH_FETCH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          set -euo pipefail
          auth_header="$(printf 'x-access-token:%s' "${GH_FETCH_TOKEN}" | base64 | tr -d '\n')"
          git -c "http.https://github.com/.extraheader=AUTHORIZATION: basic ${auth_header}" \
            fetch --no-tags --depth=1 origin \
            "+refs/heads/${GITHUB_REF_NAME}:refs/remotes/origin/${GITHUB_REF_NAME}"
          latest_sha="$(git rev-parse "refs/remotes/origin/${GITHUB_REF_NAME}")"
          if [ "${latest_sha}" != "${GITHUB_SHA}" ]; then
            message="Default branch ${GITHUB_REF_NAME} advanced from ${GITHUB_SHA} to ${latest_sha}; "
            message+="skipping the perf doc auto-commit for stale benchmark artifacts. "
            message+="A newer push run will publish current numbers."
            echo "::warning::${message}"
            echo "fresh=false" >> "${GITHUB_OUTPUT}"
            exit 0
          fi
          echo "fresh=true" >> "${GITHUB_OUTPUT}"

      - name: Setup Node.js
        if: steps.default-branch.outputs.fresh == 'true'
        uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38 # v6
        with:
          node-version: "22.18.0"
          cache: npm
          cache-dependency-path: package.json

      - name: Install dependencies
        if: steps.default-branch.outputs.fresh == 'true'
        run: |
          if [ -f package-lock.json ]; then
            npm ci
          else
            npm i --no-audit --no-fund
          fi

      - name: Download perf benchmark artifacts
        if: steps.default-branch.outputs.fresh == 'true'
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          pattern: perf-${{ env.LATEST_VERSION }}-*
          path: .artifacts/perf-download

      - name: Render dispatch-throughput table from this run
        id: render
        if: steps.default-branch.outputs.fresh == 'true'
        run: |
          set -euo pipefail
          inputs=()
          while IFS= read -r -d '' file; do
            inputs+=(--input "${file}")
          done < <(find .artifacts/perf-download \
            -type f \( -name 'unity.log' -o -name 'results.xml' \) -print0)
          if [ "${#inputs[@]}" -eq 0 ]; then
            echo "::error::No unity.log/results.xml found for ${LATEST_VERSION}."
            exit 1
          fi
          # Embed the real runner provenance in the committed doc's "Runner:" line
          # from the privacy-safe machine-specs JSON the perf leg uploaded (glob;
          # first match). render-perf-doc.js falls back to a neutral description
          # when it is absent, so a missing probe never blocks the commit.
          machine_specs_json="$(find .artifacts/perf-download \
            -type f -name 'machine-specs.json' -print 2>/dev/null | sort | head -n1)"
          machine_specs_args=()
          if [ -n "${machine_specs_json}" ]; then
            machine_specs_args=(--machine-specs "${machine_specs_json}")
          fi
          node scripts/unity/render-perf-doc.js \
            "${inputs[@]}" \
            --doc "${PERF_DOC}" \
            --unity-version "${LATEST_VERSION}" \
            "${machine_specs_args[@]}"
          npx prettier --write "${PERF_DOC}"
          # Regenerate the committed master baseline from the SAME real run so the
          # regression gate + PR delta comment compare against REAL numbers after
          # the first master push (the committed seed is only a bootstrap).
          # --replace overwrites the existing rows with this run's rows. --scope
          # Standalone keeps the committed baseline Standalone-only even though the
          # inputs now also carry the in-editor PlayMode (Mono) leg's rows -- the
          # regression gate is Standalone-scoped (it compares --scope Standalone),
          # so the baseline must stay Standalone-scoped too.
          node scripts/unity/extract-perf-baseline.js \
            "${inputs[@]}" \
            --output "${PERF_BASELINE}" \
            --replace \
            --scope Standalone
          # The doc OR the baseline moving counts as a change to commit. Check both
          # tracked paths so a baseline-only refresh is still committed.
          if git diff --quiet -- "${PERF_DOC}" "${PERF_BASELINE}"; then
            echo "changed=false" >> "${GITHUB_OUTPUT}"
          else
            echo "changed=true" >> "${GITHUB_OUTPUT}"
          fi

      - name: Verify rendered doc passes the required prettier and markdownlint gates
        if: steps.default-branch.outputs.fresh == 'true' && steps.render.outputs.changed == 'true'
        # Belt-and-suspenders, now load-bearing: this push lands DIRECTLY on the
        # default branch, where the required prettier AND markdownlint workflows
        # run on the resulting commit. The perf doc is the only file in this push
        # and it is machine-generated, so verify both gates HERE and fail loudly
        # rather than push a doc that reds a required check on master (prettier
        # alone does not enforce markdownlint rules such as MD001 heading-increment
        # -- the renderer's headings must sit correctly under the doc's h2 parent).
        run: |
          npx prettier --check "${PERF_DOC}"
          npx markdownlint-cli2 "${PERF_DOC}"

      - name: Commit and push refreshed perf doc
        if: steps.default-branch.outputs.fresh == 'true' && steps.render.outputs.changed == 'true'
        env:
          GH_PUSH_TOKEN: ${{ steps.app-token.outputs.token }}
          FALLBACK_BRANCH_PREFIX: ci/perf-auto-update
        run: |
          set -euo pipefail
          auth_header="$(printf 'x-access-token:%s' "${GH_PUSH_TOKEN}" | base64 | tr -d '\n')"
          git -c "http.https://github.com/.extraheader=AUTHORIZATION: basic ${auth_header}" \
            fetch --no-tags --depth=1 origin \
            "+refs/heads/${GITHUB_REF_NAME}:refs/remotes/origin/${GITHUB_REF_NAME}"
          latest_sha="$(git rev-parse "refs/remotes/origin/${GITHUB_REF_NAME}")"
          if [ "${latest_sha}" != "${GITHUB_SHA}" ]; then
            message="Default branch ${GITHUB_REF_NAME} advanced from ${GITHUB_SHA} to ${latest_sha}; "
            message+="skipping the perf doc auto-commit for stale benchmark artifacts. "
            message+="A newer push run will publish current numbers."
            echo "::warning::${message}"
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -- "${PERF_DOC}"
          # Stage the regenerated baseline in the SAME commit so the gate + delta
          # baselines become real on master. paths-ignore covers both files, so
          # this commit cannot re-trigger the benchmark workflow.
          git add -- "${PERF_BASELINE}"
          if git diff --cached --quiet -- "${PERF_DOC}" "${PERF_BASELINE}"; then
            echo "No staged perf doc/baseline changes remain; nothing to commit."
            exit 0
          fi
          git commit -m "docs(perf): auto-update dispatch throughput numbers"

          # Best-effort: close superseded fallback PRs from earlier failed runs.
          # Their rendered numbers are stale the moment a newer run lands (or is
          # about to land) fresher ones. Never let cleanup fail the job.
          close_stale_fallback_prs() {
            keep_branch="${1:-}"
            GH_TOKEN="${GH_PUSH_TOKEN}" gh pr list \
              --repo "${GITHUB_REPOSITORY}" \
              --state open \
              --json number,headRefName \
              --jq ".[] | select(.headRefName | startswith(\"${FALLBACK_BRANCH_PREFIX}\")) | select(.headRefName != \"${keep_branch}\") | .number" \
              2>/dev/null | while read -r stale_pr; do
                echo "Closing superseded perf fallback PR #${stale_pr}."
                GH_TOKEN="${GH_PUSH_TOKEN}" gh pr close "${stale_pr}" \
                  --repo "${GITHUB_REPOSITORY}" --delete-branch 2>/dev/null || true
              done || true
          }

          # TIER 1: direct push. Works when the App is a branch-protection /
          # ruleset bypass actor (the documented fast path).
          set +e
          git -c "http.https://github.com/.extraheader=AUTHORIZATION: basic ${auth_header}" \
            push origin "HEAD:${GITHUB_REF_NAME}" 2>&1 | tee "${RUNNER_TEMP}/perf-push.log"
          push_status=${PIPESTATUS[0]}
          set -e
          if [ "${push_status}" -eq 0 ]; then
            close_stale_fallback_prs
            exit 0
          fi

          git -c "http.https://github.com/.extraheader=AUTHORIZATION: basic ${auth_header}" \
            fetch --no-tags --depth=1 origin \
            "+refs/heads/${GITHUB_REF_NAME}:refs/remotes/origin/${GITHUB_REF_NAME}"
          latest_after_push="$(git rev-parse "refs/remotes/origin/${GITHUB_REF_NAME}")"
          if [ "${latest_after_push}" != "${GITHUB_SHA}" ]; then
            message="Default branch ${GITHUB_REF_NAME} advanced from ${GITHUB_SHA} "
            message+="to ${latest_after_push} during the perf doc push; skipping stale "
            message+="benchmark artifacts. A newer push run will publish current numbers."
            echo "::warning::${message}"
            exit 0
          fi

          if grep -q "GH006" "${RUNNER_TEMP}/perf-push.log"; then
            message="Direct perf doc push was rejected by branch protection (GH006): the "
            message+="auto-commit App is not a bypass actor for ${GITHUB_REF_NAME} (or a classic "
            message+="rule requires status checks, which classic bypass cannot waive). Falling "
            message+="back to an auto-merge pull request. Fix the bypass per "
            message+="docs/runbooks/perf-numbers-auto-commit.md to restore the fast path."
            echo "::warning::${message}"
          else
            echo "::warning::Direct perf doc push failed (exit ${push_status}); falling back to a pull request."
          fi

          # TIER 2: fallback pull request. Push the SAME commit to a unique
          # ci/perf-auto-update-* branch, open a PR with the App token, and enable
          # squash auto-merge. No pull_request trigger exists, so this PR cannot
          # run the benchmark. Superseded
          # fallback PRs are closed AFTER the replacement exists, so a failure
          # here never destroys the only pending copy of valid (if stale) numbers.
          fallback_branch="${FALLBACK_BRANCH_PREFIX}-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}"
          git -c "http.https://github.com/.extraheader=AUTHORIZATION: basic ${auth_header}" \
            push origin "HEAD:refs/heads/${fallback_branch}"

          pr_body_file="${RUNNER_TEMP}/perf-pr-body.md"
          {
            echo "Automated fallback: the Performance Numbers workflow could not push the"
            echo "refreshed \`${PERF_DOC}\` + \`${PERF_BASELINE}\` directly to"
            echo "\`${GITHUB_REF_NAME}\` (branch protection rejected the App push), so the"
            echo "same commit is delivered as a pull request instead."
            echo
            echo "- Measured commit: ${GITHUB_SHA}"
            echo "- Run: ${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
            echo "- Auto-merge (squash) is requested; if it does not complete, merge manually."
            echo
            echo "To restore the direct-push fast path, grant the auto-commit App bypass on"
            echo "the default branch protection: see docs/runbooks/perf-numbers-auto-commit.md."
          } > "${pr_body_file}"

          set +e
          pr_create_err="${RUNNER_TEMP}/perf-pr-create.err"
          pr_create_out="$(GH_TOKEN="${GH_PUSH_TOKEN}" gh pr create \
            --repo "${GITHUB_REPOSITORY}" \
            --base "${GITHUB_REF_NAME}" \
            --head "${fallback_branch}" \
            --title "docs(perf): auto-update dispatch throughput numbers" \
            --body-file "${pr_body_file}" 2>"${pr_create_err}")"
          pr_create_status=$?
          set -e
          # gh prints the PR URL on stdout, but keep this robust against extra
          # notice lines: extract the canonical /pull/<n> URL explicitly.
          pr_url="$(printf '%s\n' "${pr_create_out}" \
            | grep -Eo 'https://[^[:space:]]+/pull/[0-9]+' | tail -n1 || true)"
          if [ "${pr_create_status}" -ne 0 ] || [ -z "${pr_url}" ]; then
            compare_url="${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/compare/${GITHUB_REF_NAME}...${fallback_branch}"
            message="Fallback PR creation failed (the App likely lacks Pull requests: write -- "
            message+="see docs/runbooks/perf-numbers-auto-commit.md). The refreshed numbers are "
            message+="preserved on branch ${fallback_branch}; open the PR manually: ${compare_url}"
            echo "::error::${message}"
            echo "gh stdout: ${pr_create_out}"
            cat "${pr_create_err}" || true
            exit 1
          fi
          echo "Fallback PR created: ${pr_url}"
          close_stale_fallback_prs "${fallback_branch}"

          set +e
          GH_TOKEN="${GH_PUSH_TOKEN}" gh pr merge "${pr_url}" \
            --repo "${GITHUB_REPOSITORY}" --squash --auto --delete-branch
          automerge_status=$?
          set -e
          if [ "${automerge_status}" -ne 0 ]; then
            # Enabling auto-merge fails when the PR is ALREADY mergeable ("clean
            # status", e.g. no required checks) and when repo auto-merge is
            # disabled. Try one direct squash merge to cover the first case
            # before settling for the manual-merge warning.
            set +e
            GH_TOKEN="${GH_PUSH_TOKEN}" gh pr merge "${pr_url}" \
              --repo "${GITHUB_REPOSITORY}" --squash --delete-branch
            direct_merge_status=$?
            set -e
            if [ "${direct_merge_status}" -eq 0 ]; then
              echo "Fallback PR squash-merged directly: ${pr_url}"
            else
              message="Auto-merge could not be enabled on the fallback PR (repo may have "
              message+="auto-merge disabled) and a direct merge was refused (checks pending "
              message+="or branch protection). The refreshed numbers are waiting for a manual "
              message+="merge: ${pr_url}"
              echo "::warning::${message}"
            fi
          else
            echo "Auto-merge (squash) enabled on ${pr_url}; it lands once required checks pass."
          fi
          message="Perf numbers were delivered via fallback PR instead of a direct push: ${pr_url} "
          message+="-- grant the auto-commit App branch-protection bypass to restore the fast path "
          message+="(docs/runbooks/perf-numbers-auto-commit.md)."
          echo "::warning::${message}"
