name: Validate Banner

on:
  pull_request:
    paths:
      - "docs/images/DxMessaging-banner.svg"
      - "scripts/sync-banner-version.js"
      - "package.json"
      - "Tests/**"
      - "SourceGenerators/**"
      - ".github/workflows/validate-banner.yml"
  push:
    branches:
      - main
      - master
    paths:
      - "docs/images/DxMessaging-banner.svg"
      - "scripts/sync-banner-version.js"
      - "package.json"
      - "Tests/**"
      - "SourceGenerators/**"
      - ".github/workflows/validate-banner.yml"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  validate-banner:
    name: Validate banner SVG
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      # No npm cache / install: sync-banner-version.js uses only node builtins.
      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22.18.0"

      - name: Regenerate banner and verify it is committed
        run: |
          node scripts/sync-banner-version.js
          git diff --exit-code docs/images/DxMessaging-banner.svg
