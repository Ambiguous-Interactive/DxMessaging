name: Unity GameCI Experiment

on:
  workflow_dispatch:
    inputs:
      unity-version:
        description: "Unity version to test through GameCI normal project mode."
        required: false
        default: "2022.3.45f1"
        type: string
      test-mode:
        description: "Test mode to run through GameCI normal project mode."
        required: false
        default: "editmode"
        type: choice
        options:
          - editmode
          - playmode
          - standalone

permissions:
  contents: read
  checks: write

jobs:
  runner-preflight:
    name: Self-hosted runner access preflight
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - name: Require an online Unity runner
        uses: Ambiguous-Interactive/ambiguous-organization-build-lock/.github/actions/check-unity-runner-availability@59a2fa98224569e5a697f271a3ac4b866c53ac2c # v1.8.3
        with:
          reader-app-id: ${{ secrets.BUILD_LOCK_READER_APP_ID }}
          reader-app-private-key: ${{ secrets.BUILD_LOCK_READER_APP_PRIVATE_KEY }}
          required-label-sets: '[["self-hosted","Windows","RAM-64GB"]]'

  game-ci-experiment:
    name: GameCI ${{ inputs.unity-version }} ${{ inputs.test-mode }}
    needs: runner-preflight
    runs-on: [self-hosted, Windows, RAM-64GB]
    timeout-minutes: 660
    continue-on-error: true
    steps:
      - name: Enable Git long paths
        shell: pwsh
        env:
          GIT_CONFIG_GLOBAL: ${{ runner.temp }}/dxm-gitconfig
        run: git config --global core.longpaths true

      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        env:
          GIT_CONFIG_GLOBAL: ${{ runner.temp }}/dxm-gitconfig
        with:
          lfs: true
          persist-credentials: false

      - name: Print runner diagnostics
        uses: ./.github/actions/print-self-hosted-runner-diagnostics
        with:
          matrix-note: "GameCI compatibility experiment (non-required)"

      - name: Setup Node.js
        uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38 # v6
        with:
          node-version: "22.18.0"

      - name: Compute test assembly list
        id: compute
        uses: ./.github/actions/compute-unity-assemblies
        with:
          target: "${{ inputs.test-mode }}"
          runtime-only: "${{ inputs.test-mode == 'standalone' && 'true' || 'false' }}"

      # Skip provisioning, the ephemeral-project generation, the org lock, and
      # the GameCI run when the compute step resolved an empty assembly list, so
      # an empty discovery never takes the paid Unity seat / org lock only to
      # fail late at verify. Mirrors unity-tests.yml. The list is structurally
      # non-empty for the supported inputs, so this is defense-in-depth.
      - name: Provision Unity Editor
        if: ${{ steps.compute.outputs.is-empty != 'true' }}
        timeout-minutes: 180
        shell: pwsh
        run: |
          $artifactsPath = '.artifacts/unity/game-ci/${{ inputs.unity-version }}-${{ inputs.test-mode }}'
          $diagnosticsPath = Join-Path $artifactsPath 'provisioning'
          $diagnosticsFile = Join-Path $diagnosticsPath 'ensure-editor-summary.json'
          New-Item -ItemType Directory -Force -Path $diagnosticsPath | Out-Null
          $provisioningProfile = if ('${{ inputs.test-mode }}' -eq 'standalone') {
            'StandaloneWindowsIl2Cpp'
          } else {
            'EditorOnly'
          }
          $editor = ./scripts/unity/ensure-editor.ps1 `
            -UnityVersion '${{ inputs.unity-version }}' `
            -CiManagedOnly `
            -RequireHealthyExisting `
            -ProvisioningProfile $provisioningProfile `
            -DiagnosticsPath $diagnosticsFile
          "UNITY_EDITOR_PATH=$editor" | Out-File -FilePath $env:GITHUB_ENV -Append

      - name: Upload Unity provisioning diagnostics
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: unity-game-ci-provisioning-${{ inputs.unity-version }}-${{ inputs.test-mode }}
          path: .artifacts/unity/game-ci/${{ inputs.unity-version }}-${{ inputs.test-mode }}/provisioning
          if-no-files-found: warn
          retention-days: 14

      - name: Generate ephemeral Unity project
        if: ${{ steps.compute.outputs.is-empty != 'true' }}
        shell: pwsh
        run: |
          ./scripts/unity/run-ci-tests.ps1 `
            -UnityVersion '${{ inputs.unity-version }}' `
            -TestMode '${{ inputs.test-mode }}' `
            -AssemblyNames $env:DXM_TEST_ASSEMBLIES `
            -ArtifactsPath '.artifacts/unity/game-ci/${{ inputs.unity-version }}-${{ inputs.test-mode }}' `
            -ProjectPath '.artifacts/unity/game-ci-projects/${{ inputs.unity-version }}-${{ inputs.test-mode }}' `
            -ReleaseCodeOptimization `
            -ReleasePlayerBuild `
            -GenerateOnly

      - name: Validate Unity license secrets
        uses: ./.github/actions/validate-unity-license
        env:
          UNITY_SERIAL: ${{ secrets.UNITY_SERIAL }}
          UNITY_EMAIL: ${{ secrets.UNITY_EMAIL }}
          UNITY_PASSWORD: ${{ secrets.UNITY_PASSWORD }}

      - name: Acquire organization Unity lock
        if: ${{ steps.compute.outputs.is-empty != 'true' }}
        uses: Ambiguous-Interactive/ambiguous-organization-build-lock/.github/actions/acquire-build-lock@6b2147a1d158c770f213d216f4eea0c313be370a # issue #52 reviewed acquire
        with:
          lock-name: wallstop-organization-builds
          holder-id-suffix: game-ci-experiment
          runner-id: ${{ runner.name }}
          timeout-minutes: "300"
        env:
          BUILD_LOCK_APP_ID: ${{ secrets.BUILD_LOCK_APP_ID }}
          BUILD_LOCK_APP_PRIVATE_KEY: ${{ secrets.BUILD_LOCK_APP_PRIVATE_KEY }}

      - name: Run GameCI normal project mode
        id: game_ci
        if: ${{ steps.compute.outputs.is-empty != 'true' }}
        timeout-minutes: 120
        # game-ci reads UNITY_SERIAL/UNITY_EMAIL/UNITY_PASSWORD from env for
        # classic serial activation (the unityLicensingServer input is retired
        # now that this repo moved off the floating-license server).
        env:
          UNITY_SERIAL: ${{ secrets.UNITY_SERIAL }}
          UNITY_EMAIL: ${{ secrets.UNITY_EMAIL }}
          UNITY_PASSWORD: ${{ secrets.UNITY_PASSWORD }}
        uses: game-ci/unity-test-runner@0ff419b913a3630032cbe0de48a0099b5a9f0ed9 # v4
        with:
          packageMode: false
          projectPath: .artifacts/unity/game-ci-projects/${{ inputs.unity-version }}-${{ inputs.test-mode }}
          unityVersion: ${{ inputs.unity-version }}
          testMode: ${{ inputs.test-mode }}
          customParameters: -nographics -releaseCodeOptimization -assemblyNames "${{ env.DXM_TEST_ASSEMBLIES }}"
          artifactsPath: .artifacts/unity/game-ci/${{ inputs.unity-version }}-${{ inputs.test-mode }}
          checkName: GameCI experiment ${{ inputs.unity-version }} ${{ inputs.test-mode }}
          githubToken: ${{ secrets.GITHUB_TOKEN }}

      # GameCI attempts its own best-effort return-license. This independent
      # backstop uses the editor path exported by Provision Unity Editor above,
      # so it reports safe only when that local return succeeds (or proves the
      # activation already absent); otherwise lifecycle release quarantines the
      # runner's slot for same-runner recovery.
      - name: Return Unity license
        id: return_unity_license
        if: always()
        timeout-minutes: 5
        continue-on-error: true
        uses: ./.github/actions/return-unity-license
        with:
          evidence-paths: .artifacts/unity/game-ci/${{ inputs.unity-version }}-${{ inputs.test-mode }}
        env:
          UNITY_EMAIL: ${{ secrets.UNITY_EMAIL }}
          UNITY_PASSWORD: ${{ secrets.UNITY_PASSWORD }}

      - name: Release organization Unity lock
        if: always()
        uses: Ambiguous-Interactive/ambiguous-organization-build-lock/.github/actions/release-build-lock@59a2fa98224569e5a697f271a3ac4b866c53ac2c # v1.8.3
        with:
          lock-name: wallstop-organization-builds
          holder-id-suffix: game-ci-experiment
          runner-id: ${{ runner.name }}
          resource-cleanup-status: ${{ steps.return_unity_license.outputs.resource-cleanup-status }}
          resource-health: ${{ steps.return_unity_license.outputs.resource-health }}
          resource-reason: ${{ steps.return_unity_license.outputs.resource-reason }}
        env:
          BUILD_LOCK_APP_ID: ${{ secrets.BUILD_LOCK_APP_ID }}
          BUILD_LOCK_APP_PRIVATE_KEY: ${{ secrets.BUILD_LOCK_APP_PRIVATE_KEY }}

      - name: Dump Unity log tail on failure or cancellation
        if: ${{ failure() || cancelled() }}
        uses: ./.github/actions/dump-unity-log-tail
        with:
          results-dir: .artifacts/unity/game-ci/${{ inputs.unity-version }}-${{ inputs.test-mode }}
          label: GameCI experiment ${{ inputs.unity-version }} ${{ inputs.test-mode }}

      - name: Verify tests actually ran
        if: >-
          ${{
            !cancelled() &&
            steps.compute.outcome == 'success' &&
            (steps.compute.outputs.is-empty == 'true' || steps.game_ci.outcome != 'skipped')
          }}
        uses: ./.github/actions/verify-unity-results
        with:
          results-dir: .artifacts/unity/game-ci/${{ inputs.unity-version }}-${{ inputs.test-mode }}
          label: GameCI experiment ${{ inputs.unity-version }} ${{ inputs.test-mode }}
          expected-empty: ${{ steps.compute.outputs.is-empty }}

      - name: Upload GameCI experiment artifacts
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: unity-game-ci-experiment-${{ inputs.unity-version }}-${{ inputs.test-mode }}
          path: |
            .artifacts/unity/game-ci/
            .artifacts/unity/game-ci-projects/
          if-no-files-found: warn
          retention-days: 14
