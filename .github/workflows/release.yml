name: Release

on:
  push:
    tags:
      - "v[0-9]*.[0-9]*.[0-9]*"

concurrency:
  group: release-${{ github.ref_name }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  verify-tag:
    name: Verify release tag
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      package-version: ${{ steps.verify.outputs.package-version }}
      tag: ${{ steps.verify.outputs.tag }}
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Verify semver tag matches package.json
        id: verify
        run: |
          set -euo pipefail
          tag="${GITHUB_REF_NAME}"
          if ! printf '%s\n' "${tag}" | grep -Eq '^v[0-9]+\.[0-9]+\.[0-9]+$'; then
            echo "::error::Release tags must use vX.Y.Z semver format."
            exit 1
          fi
          PACKAGE_VERSION="$(jq -r '.version // empty' package.json)"
          if [ -z "${PACKAGE_VERSION}" ]; then
            echo "::error::package.json version is missing."
            exit 1
          fi
          if [ "${tag}" != "v${PACKAGE_VERSION}" ]; then
            echo "::error::Tag ${tag} does not match package.json version v${PACKAGE_VERSION}."
            exit 1
          fi
          # package.json advertises changelogUrl; never publish a version that
          # CHANGELOG.md does not mention. Use fixed-string heading checks so
          # semver punctuation cannot alter regex matching semantics.
          if ! grep -Fqx "## [${PACKAGE_VERSION}]" CHANGELOG.md \
            && ! grep -Fqx "## ${PACKAGE_VERSION}" CHANGELOG.md; then
            echo "::error::CHANGELOG.md has no exact heading for ${PACKAGE_VERSION}."
            exit 1
          fi
          {
            echo "package-version=${PACKAGE_VERSION}"
            echo "tag=${tag}"
          } >> "${GITHUB_OUTPUT}"

  validate:
    name: Validate package
    needs: verify-tag
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      attestations: write
      contents: read
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: "22.18.0"

      - name: Setup .NET
        # validate:all runs check:analyzers, which builds the source
        # generators against the SDK pinned in SourceGenerators/global.json.
        uses: actions/setup-dotnet@26b0ec14cb23fa6904739307f278c14f94c95bf1 # v5
        with:
          global-json-file: SourceGenerators/global.json

      - name: Install Node dependencies
        run: |
          set -euo pipefail
          if [ -f package-lock.json ]; then
            npm ci
          else
            npm i --no-audit --no-fund
          fi

      - name: Run release validation
        run: |
          set -euo pipefail
          node --test scripts/
          npm run validate:all

      - name: Pack npm package
        id: pack
        run: |
          set -euo pipefail
          mkdir -p .artifacts/release
          # npm pack ignores --provenance (provenance is a publish-only
          # feature); the artifact is attested by the attest-build-provenance
          # step below.
          pack_json="$(npm pack --json)"
          package_file="$(printf '%s' "${pack_json}" | jq -r '.[0].filename')"
          mv "${package_file}" ".artifacts/release/${package_file}"
          (cd .artifacts/release && sha256sum "${package_file}" > "${package_file}.sha256")
          echo "package-file=${package_file}" >> "${GITHUB_OUTPUT}"

      - name: Generate the GitHub Release notes from CHANGELOG.md
        # The published release body is the matching `## [version]` CHANGELOG
        # section plus an install footer, built by the SINGLE shared extractor
        # that release-prepare.yml and release-drafter.yml also call. Never a
        # stub: shipping `Release vX.Y.Z` with no changelog was a v3.1.0 defect.
        # --version takes the bare package version (the `## [X.Y.Z]` heading has
        # no `v`), not the tag. verify-tag already proved the heading exists.
        env:
          PACKAGE_VERSION: ${{ needs.verify-tag.outputs.package-version }}
        run: |
          set -euo pipefail
          node scripts/release/release-notes.js \
            --version "${PACKAGE_VERSION}" \
            --footer \
            --out .artifacts/release/release-notes.md

      - name: Verify tarball packaging invariants (issue 204 guard)
        # Centralized validator checks tarball contents for forbidden
        # build-artifact paths and Unity .meta pairing invariants.
        env:
          PACKAGE_FILE: ${{ steps.pack.outputs.package-file }}
        run: |
          set -euo pipefail
          node scripts/validate-npm-meta.js --tarball ".artifacts/release/${PACKAGE_FILE}"

      - name: Upload release artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: release-package
          path: .artifacts/release/
          if-no-files-found: error
          # Artifacts are immutable per name within a run; a "re-run all jobs"
          # recovery would 409 against the first attempt's upload without this.
          overwrite: true

      - name: Attest release package
        uses: actions/attest-build-provenance@0f67c3f4856b2e3261c31976d6725780e5e4c373 # v4
        with:
          subject-path: .artifacts/release/*.tgz

  runner-preflight:
    name: Self-hosted runner access preflight
    # See docs/runbooks/unity-runners-after-transfer.md for the design
    # contract. CRITICAL: this preflight must NEVER make CI more broken
    # than the no-preflight baseline -- if both runner-inventory endpoints
    # return 403/404, soft-pass with a ::warning::.
    needs: verify-tag
    runs-on: ubuntu-latest
    timeout-minutes: 3
    permissions:
      actions: read
      # NOTE: `administration: read` is NOT a valid permissions key for
      # workflow GITHUB_TOKEN (per actionlint and the GitHub docs schema).
      # Listing self-hosted runners requires admin:org (org-scope) OR a
      # fine-grained PAT with repo "Administration: read" -- neither of
      # which the default GITHUB_TOKEN can carry. The soft-pass path in
      # the run script below is the supported coverage when the token
      # is unscoped. See docs/runbooks/unity-runners-after-transfer.md.
    concurrency:
      group: ${{ github.workflow }}-runner-preflight-${{ github.ref }}
      cancel-in-progress: true
    steps:
      - name: Probe self-hosted runner availability
        env:
          GH_TOKEN: ${{ secrets.RUNNER_AUDIT_PAT || secrets.GITHUB_TOKEN }}
          REQUIRED_LABELS: "self-hosted,Windows,RAM-64GB"
        # gh api --paginate | jq -s pattern mirrors stuck-job-watchdog.yml.
        run: |
          set -euo pipefail
          echo "::group::Runner-access preflight"
          echo "Required labels: ${REQUIRED_LABELS}"
          IFS=',' read -r -a required <<< "${REQUIRED_LABELS}"
          runners_json="$(mktemp)"
          runners_scope=""
          if gh api --paginate \
              "orgs/${GITHUB_REPOSITORY_OWNER}/actions/runners?per_page=100" \
              2>/dev/null \
              | jq -s '[.[] | (.runners // [])[]]' > "${runners_json}" 2>/dev/null; then
            runners_scope="org"
          else
            if gh api --paginate \
                "repos/${GITHUB_REPOSITORY}/actions/runners?per_page=100" \
                2>/dev/null \
                | jq -s '[.[] | (.runners // [])[]]' > "${runners_json}" 2>/dev/null; then
              runners_scope="repo"
            fi
          fi
          if [ -z "${runners_scope}" ]; then
            org_url="orgs/${GITHUB_REPOSITORY_OWNER}/actions/runners"
            repo_url="repos/${GITHUB_REPOSITORY}/actions/runners"
            {
              echo "::warning::Runner inventory unavailable from both ${org_url}"
              echo "::warning::and ${repo_url} (likely 403: GITHUB_TOKEN lacks admin:org"
              echo "::warning::or administration:read)."
              echo "::warning::See docs/runbooks/unity-runners-after-transfer.md"
              echo "::warning::for how to plumb a RUNNER_AUDIT_PAT secret to upgrade"
              echo "::warning::this soft-pass to a hard-pass."
            }
            echo "Soft pass: skipping runner inventory check."
            echo "::endgroup::"
            exit 0
          fi
          echo "Runner inventory scope: ${runners_scope}"
          total="$(jq 'length' < "${runners_json}")"
          echo "Visible runners (${runners_scope} scope): ${total}"
          matched="$(jq --argjson labels "$(printf '%s\n' "${required[@]}" | jq -R . | jq -s .)" '
            [ .[]
              | select(.status == "online")
              | select(($labels | all(. as $l | (.labels // []) | map(.name) | index($l) | type == "number")))
            ] | length
          ' < "${runners_json}")"
          echo "Runners satisfying ${REQUIRED_LABELS}: ${matched}"
          if [ "${matched}" -lt 1 ]; then
            {
              echo "::error::No online self-hosted runner satisfies the required labels (${REQUIRED_LABELS})."
              echo "The release would block forever on unity-checks."
              echo "See docs/runbooks/unity-runners-after-transfer.md for the post-transfer runner-group ACL fix."
            }
            jq '[ .[] | {name, status, busy, labels: [(.labels // [])[].name]} ]' \
              < "${runners_json}"
            exit 1
          fi
          echo "::endgroup::"

  unity-checks:
    name: Trusted Unity release checks
    needs:
      - verify-tag
      - runner-preflight
    runs-on: [self-hosted, Windows, RAM-64GB]
    environment: unity-license
    # Workflow-level permissions are `contents: read` (no checks: write), so
    # this job needs its own checks: write or game-ci's check-run creation
    # 403s and the release Unity gate silently stops failing on red tests.
    permissions:
      contents: read
      checks: write
    timeout-minutes: 660
    steps:
      - name: Enable Git long paths
        shell: pwsh
        env:
          GIT_CONFIG_GLOBAL: ${{ runner.temp }}/dxm-gitconfig
        run: git config --global core.longpaths true

      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        env:
          GIT_CONFIG_GLOBAL: ${{ runner.temp }}/dxm-gitconfig
        with:
          lfs: true
          persist-credentials: false

      - name: Print runner diagnostics
        # Composite action runs PowerShell internally; `shell: bash` on this
        # self-hosted Windows runner resolved to the WSL stub at
        # C:\Windows\System32\bash.exe and failed with "Windows Subsystem
        # for Linux has no installed distributions." See FIX #4 sweep
        # report in the dev/wallstop/swap branch: never use plain
        # `shell: bash` on self-hosted Windows runners.
        uses: ./.github/actions/print-self-hosted-runner-diagnostics

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: "22.18.0"

      # Single source of truth for the assembly include list: the canonical
      # asmdef-discovery.js module. Extracted into a composite action shared by
      # all three Unity workflows; shell: pwsh is enforced inside the composite.
      - name: Compute test assembly list
        id: compute
        uses: ./.github/actions/compute-unity-assemblies
        with:
          target: editmode

      - name: Validate Unity license secrets
        uses: ./.github/actions/validate-unity-license
        env:
          UNITY_SERIAL: ${{ secrets.UNITY_SERIAL }}
          UNITY_EMAIL: ${{ secrets.UNITY_EMAIL }}
          UNITY_PASSWORD: ${{ secrets.UNITY_PASSWORD }}

      # Skip provisioning, the org lock, and the run when no DxMessaging test
      # assembly matched (compute resolved an empty list). The verify step runs
      # only after compute succeeds and is told the run was an expected skip via
      # expected-empty. Mirrors unity-tests.yml. For the current asmdef set this
      # never triggers; it is the robustness path for an empty target.
      - name: Provision Unity Editor
        if: ${{ steps.compute.outputs.is-empty != 'true' }}
        timeout-minutes: 180
        shell: pwsh
        run: |
          $artifactsPath = '.artifacts/unity/release-editmode'
          $diagnosticsPath = Join-Path $artifactsPath 'provisioning'
          $diagnosticsFile = Join-Path $diagnosticsPath 'ensure-editor-summary.json'
          New-Item -ItemType Directory -Force -Path $diagnosticsPath | Out-Null
          $editor = ./scripts/unity/ensure-editor.ps1 `
            -UnityVersion '2022.3.45f1' `
            -CiManagedOnly `
            -RequireHealthyExisting `
            -ProvisioningProfile EditorOnly `
            -DiagnosticsPath $diagnosticsFile
          "UNITY_EDITOR_PATH=$editor" | Out-File -FilePath $env:GITHUB_ENV -Append

      - name: Upload Unity provisioning diagnostics
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: unity-release-provisioning-editmode
          path: .artifacts/unity/release-editmode/provisioning
          if-no-files-found: warn
          retention-days: 14

      - name: Acquire organization Unity lock
        if: ${{ steps.compute.outputs.is-empty != 'true' }}
        uses: Ambiguous-Interactive/ambiguous-organization-build-lock/.github/actions/acquire-build-lock@cfdcf6e67d7720824d21c37aa6a8b9e70dbdd2af
        with:
          lock-name: wallstop-organization-builds
          holder-id-suffix: release-editmode
          runner-id: ${{ runner.name }}
          timeout-minutes: "300"
        env:
          BUILD_LOCK_APP_ID: ${{ secrets.BUILD_LOCK_APP_ID }}
          BUILD_LOCK_APP_PRIVATE_KEY: ${{ secrets.BUILD_LOCK_APP_PRIVATE_KEY }}

      - name: Run Unity Test Runner
        id: run_tests
        if: ${{ steps.compute.outputs.is-empty != 'true' }}
        timeout-minutes: 120
        shell: pwsh
        env:
          UNITY_SERIAL: ${{ secrets.UNITY_SERIAL }}
          UNITY_EMAIL: ${{ secrets.UNITY_EMAIL }}
          UNITY_PASSWORD: ${{ secrets.UNITY_PASSWORD }}
          UNITY_ACCELERATOR_ENDPOINT: ${{ secrets.UNITY_ACCELERATOR_ENDPOINT }}
          DXM_UNITY_TEST_CATEGORY: "!Stress;!Performance;!Allocation;!MemoryReclaim;!UnityRuntime;!PerfBench;!PerfGate;!PerfBaseline"
        run: |
          ./scripts/unity/run-ci-tests.ps1 `
            -UnityVersion '2022.3.45f1' `
            -TestMode 'editmode' `
            -AssemblyNames $env:DXM_TEST_ASSEMBLIES `
            -ArtifactsPath '.artifacts/unity/release-editmode' `
            -ReleaseCodeOptimization `
            -ReleasePlayerBuild

      - name: Return Unity license
        id: return_unity_license
        if: always()
        timeout-minutes: 5
        continue-on-error: true
        uses: ./.github/actions/return-unity-license
        with:
          prior-return-log-path: ${{ runner.temp }}/unity-return-2022.3.45f1-editmode.log
          prior-command-succeeded: ${{ steps.run_tests.outcome == 'success' }}
          evidence-paths: |
            ${{ runner.temp }}/unity-activate-2022.3.45f1-editmode.log
            .artifacts/unity/release-editmode
        env:
          UNITY_EMAIL: ${{ secrets.UNITY_EMAIL }}
          UNITY_PASSWORD: ${{ secrets.UNITY_PASSWORD }}

      - name: Release organization Unity lock
        if: always()
        uses: Ambiguous-Interactive/ambiguous-organization-build-lock/.github/actions/release-build-lock@cfdcf6e67d7720824d21c37aa6a8b9e70dbdd2af
        with:
          lock-name: wallstop-organization-builds
          holder-id-suffix: release-editmode
          runner-id: ${{ runner.name }}
          resource-cleanup-status: ${{ steps.return_unity_license.outputs.resource-cleanup-status }}
          resource-health: ${{ steps.return_unity_license.outputs.resource-health }}
          resource-reason: ${{ steps.return_unity_license.outputs.resource-reason }}
        env:
          BUILD_LOCK_APP_ID: ${{ secrets.BUILD_LOCK_APP_ID }}
          BUILD_LOCK_APP_PRIVATE_KEY: ${{ secrets.BUILD_LOCK_APP_PRIVATE_KEY }}

      # CANCELLATION + TIMEOUT DIAGNOSTIC: when Unity 2022 hangs in csc the
      # runner step times out (or the operator cancels), and the verify
      # step below skips -- so its catastrophic-pattern scan never fires
      # either. This step covers both
      # failure() AND cancelled() so the operator has SOMETHING to look at
      # in the GitHub summary; matches unity-tests.yml / unity-benchmarks.yml.
      - name: Dump Unity log tail on failure or cancellation
        if: ${{ failure() || cancelled() }}
        uses: ./.github/actions/dump-unity-log-tail
        with:
          results-dir: .artifacts/unity/release-editmode
          label: Unity release editmode

      # CLASS GUARD: Unity can fail before NUnit writes results. The shared
      # composite fails unless a results XML exists AND reports total > 0.
      # Gated with !cancelled() (NOT always()) so a user-initiated cancel
      # does not race against this step and emit a misleading "tests did not
      # run" annotation. Also skips when setup/provisioning/lock work failed
      # before the Unity run step attempted; that earlier failure remains the
      # actionable signal. Matches unity-tests.yml and unity-benchmarks.yml.
      - name: Verify tests actually ran
        if: >-
          ${{
            !cancelled() &&
            steps.compute.outcome == 'success' &&
            (steps.compute.outputs.is-empty == 'true' || steps.run_tests.outcome != 'skipped')
          }}
        uses: ./.github/actions/verify-unity-results
        with:
          results-dir: .artifacts/unity/release-editmode
          label: Unity release editmode
          expected-empty: ${{ steps.compute.outputs.is-empty }}

      - name: Upload release Unity artifacts
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: unity-release-editmode
          path: .artifacts/unity/release-editmode
          if-no-files-found: warn
          retention-days: 14

  unitypackage:
    name: Export .unitypackage
    # Runs AFTER unity-checks so the licensed editmode gate has already proven
    # the payload compiles before we spend another licensed editor session on
    # the export. REQUIRED, release-blocking: publish needs this job, so a failed
    # export blocks the whole release (including the irreversible npm publish);
    # the release is atomic and never ships without the .unitypackage.
    needs:
      - verify-tag
      - runner-preflight
      - unity-checks
    runs-on: [self-hosted, Windows, RAM-64GB]
    environment: unity-license
    permissions:
      contents: read
    timeout-minutes: 660
    steps:
      - name: Enable Git long paths
        shell: pwsh
        env:
          GIT_CONFIG_GLOBAL: ${{ runner.temp }}/dxm-gitconfig
        run: git config --global core.longpaths true

      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        env:
          GIT_CONFIG_GLOBAL: ${{ runner.temp }}/dxm-gitconfig
        with:
          lfs: true
          persist-credentials: false

      - name: Print runner diagnostics
        # Composite action runs PowerShell internally; never use plain
        # `shell: bash` on self-hosted Windows runners (see unity-checks).
        uses: ./.github/actions/print-self-hosted-runner-diagnostics

      - name: Setup Node.js
        # export-unitypackage.ps1 stages the payload with `npm pack`, so the
        # shipped bytes are identical to the npm/UPM artifact.
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: "22.18.0"

      - name: Validate Unity license secrets
        uses: ./.github/actions/validate-unity-license
        env:
          UNITY_SERIAL: ${{ secrets.UNITY_SERIAL }}
          UNITY_EMAIL: ${{ secrets.UNITY_EMAIL }}
          UNITY_PASSWORD: ${{ secrets.UNITY_PASSWORD }}

      # Editor install/repair does NOT take the paid Unity seat, so it runs
      # BEFORE the org lock (mirrors unity-checks). The export only needs the
      # editor itself; EditorOnly is the same profile unity-checks provisions,
      # so on the runner that ran unity-checks this is a fast health check.
      - name: Provision Unity Editor
        timeout-minutes: 180
        shell: pwsh
        run: |
          $artifactsPath = '.artifacts/unity/release-unitypackage'
          $diagnosticsPath = Join-Path $artifactsPath 'provisioning'
          $diagnosticsFile = Join-Path $diagnosticsPath 'ensure-editor-summary.json'
          New-Item -ItemType Directory -Force -Path $diagnosticsPath | Out-Null
          $editor = ./scripts/unity/ensure-editor.ps1 `
            -UnityVersion '2022.3.45f1' `
            -CiManagedOnly `
            -RequireHealthyExisting `
            -ProvisioningProfile EditorOnly `
            -DiagnosticsPath $diagnosticsFile
          "UNITY_EDITOR_PATH=$editor" | Out-File -FilePath $env:GITHUB_ENV -Append

      - name: Upload Unity provisioning diagnostics
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: unity-release-provisioning-unitypackage
          path: .artifacts/unity/release-unitypackage/provisioning
          if-no-files-found: warn
          retention-days: 14
          # The documented recovery for a failed export is re-running this
          # job; the if: always() uploads from the failed attempt would 409
          # against immutable artifact names without overwrite.
          overwrite: true

      - name: Acquire organization Unity lock
        uses: Ambiguous-Interactive/ambiguous-organization-build-lock/.github/actions/acquire-build-lock@cfdcf6e67d7720824d21c37aa6a8b9e70dbdd2af
        with:
          lock-name: wallstop-organization-builds
          holder-id-suffix: release-unitypackage
          runner-id: ${{ runner.name }}
          timeout-minutes: "300"
        env:
          BUILD_LOCK_APP_ID: ${{ secrets.BUILD_LOCK_APP_ID }}
          BUILD_LOCK_APP_PRIVATE_KEY: ${{ secrets.BUILD_LOCK_APP_PRIVATE_KEY }}

      - name: Export the .unitypackage
        id: export_unitypackage
        timeout-minutes: 120
        shell: pwsh
        env:
          UNITY_SERIAL: ${{ secrets.UNITY_SERIAL }}
          UNITY_EMAIL: ${{ secrets.UNITY_EMAIL }}
          UNITY_PASSWORD: ${{ secrets.UNITY_PASSWORD }}
          PACKAGE_VERSION: ${{ needs.verify-tag.outputs.package-version }}
        run: |
          $dist = '.artifacts/unity/release-unitypackage-dist'
          New-Item -ItemType Directory -Force -Path $dist | Out-Null
          $output = Join-Path $dist "com.wallstop-studios.dxmessaging-$env:PACKAGE_VERSION.unitypackage"
          ./scripts/unity/export-unitypackage.ps1 `
            -UnityVersion '2022.3.45f1' `
            -OutputPath $output `
            -ArtifactsPath '.artifacts/unity/release-unitypackage'

      - name: Return Unity license
        id: return_unity_license
        if: always()
        timeout-minutes: 5
        continue-on-error: true
        uses: ./.github/actions/return-unity-license
        with:
          prior-return-log-path: ${{ runner.temp }}/unity-return-2022.3.45f1-unitypackage.log
          prior-command-succeeded: ${{ steps.export_unitypackage.outcome == 'success' }}
          evidence-paths: |
            ${{ runner.temp }}/unity-activate-2022.3.45f1-unitypackage.log
            .artifacts/unity/release-unitypackage
        env:
          UNITY_EMAIL: ${{ secrets.UNITY_EMAIL }}
          UNITY_PASSWORD: ${{ secrets.UNITY_PASSWORD }}

      - name: Release organization Unity lock
        if: always()
        uses: Ambiguous-Interactive/ambiguous-organization-build-lock/.github/actions/release-build-lock@cfdcf6e67d7720824d21c37aa6a8b9e70dbdd2af
        with:
          lock-name: wallstop-organization-builds
          holder-id-suffix: release-unitypackage
          runner-id: ${{ runner.name }}
          resource-cleanup-status: ${{ steps.return_unity_license.outputs.resource-cleanup-status }}
          resource-health: ${{ steps.return_unity_license.outputs.resource-health }}
          resource-reason: ${{ steps.return_unity_license.outputs.resource-reason }}
        env:
          BUILD_LOCK_APP_ID: ${{ secrets.BUILD_LOCK_APP_ID }}
          BUILD_LOCK_APP_PRIVATE_KEY: ${{ secrets.BUILD_LOCK_APP_PRIVATE_KEY }}

      - name: Dump Unity log tail on failure or cancellation
        if: ${{ failure() || cancelled() }}
        uses: ./.github/actions/dump-unity-log-tail
        with:
          results-dir: .artifacts/unity/release-unitypackage
          label: Unity release unitypackage export

      - name: Upload the .unitypackage artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: release-unitypackage
          path: .artifacts/unity/release-unitypackage-dist/
          if-no-files-found: error
          retention-days: 14
          overwrite: true

      - name: Upload export diagnostics
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: unity-release-unitypackage
          path: .artifacts/unity/release-unitypackage
          if-no-files-found: warn
          retention-days: 14
          overwrite: true

  publish:
    name: Publish npm package and GitHub Release
    needs:
      - verify-tag
      - validate
      - unity-checks
      - unitypackage
    # ATOMIC RELEASE: the .unitypackage is a REQUIRED asset, so publish runs only
    # when every upstream job -- including unitypackage -- succeeds (default
    # needs-gating; no always() escape hatch). A failed export therefore blocks
    # the IRREVERSIBLE npm publish too, so neither npm nor the GitHub Release can
    # advertise a version whose .unitypackage is missing (the v3.1.0 failure
    # mode). Recovery is to fix the export and re-run: the npm publish step below
    # is re-runnable (it skips a version already on the registry).
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      attestations: write
      contents: write
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: "22.18.0"
          registry-url: "https://registry.npmjs.org"

      - name: Download release package
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: release-package
          path: .artifacts/release

      - name: Download the .unitypackage artifact
        # Guaranteed present: publish only runs when the unitypackage job
        # succeeded (job-level needs), so this never blocks the npm publish.
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: release-unitypackage
          path: .artifacts/unitypackage

      - name: Stage the .unitypackage release asset
        id: unitypackage_asset
        # The .unitypackage is a REQUIRED asset, so a missing or empty file here
        # is a HARD error -- never a silent downgrade to a tgz-only release.
        run: |
          set -euo pipefail
          mapfile -t unitypackage_files < <(find .artifacts/unitypackage -maxdepth 1 -type f -name '*.unitypackage' | sort)
          if [ "${#unitypackage_files[@]}" -lt 1 ] || [ ! -s "${unitypackage_files[0]}" ]; then
            echo "::error::No non-empty .unitypackage was found in the export artifact; refusing to publish an incomplete release."
            exit 1
          fi
          unitypackage_file="${unitypackage_files[0]}"
          # Same checksum pattern as the npm tarball in the validate job.
          (cd .artifacts/unitypackage && sha256sum "$(basename "${unitypackage_file}")" > "$(basename "${unitypackage_file}").sha256")
          {
            echo "unitypackage-file=${unitypackage_file}"
            echo "unitypackage-checksum=${unitypackage_file}.sha256"
          } >> "${GITHUB_OUTPUT}"

      - name: Validate downloaded release package
        id: release_package
        run: |
          set -euo pipefail
          pkg="$(jq -r .name package.json)"
          ver="${{ needs.verify-tag.outputs.package-version }}"
          node scripts/validate-npm-meta.js \
            --release-dir .artifacts/release \
            --expected-name "${pkg}" \
            --expected-version "${ver}"
          mapfile -t package_files < <(find .artifacts/release -maxdepth 1 -type f -name '*.tgz' | sort)
          package_file="${package_files[0]}"
          checksum_file="${package_file}.sha256"
          {
            echo "package-file=${package_file}"
            echo "checksum-file=${checksum_file}"
          } >> "${GITHUB_OUTPUT}"

      - name: Assemble the Asset Store submission staging artifact
        # There is NO sanctioned CLI/API for Unity Asset Store uploads
        # (re-verified 2026-06-22): this tested generator STAGES the
        # submission inputs, listing copy, store media, manifest, and manual
        # checklists. It runs before npm publish so missing store collateral
        # fails before the irreversible registry action.
        run: |
          set -euo pipefail
          node scripts/release/asset-store-submission.js \
            --out .artifacts/asset-store-submission \
            --package-file "${{ steps.release_package.outputs.package-file }}" \
            --package-checksum "${{ steps.release_package.outputs.checksum-file }}" \
            --unitypackage-file "${{ steps.unitypackage_asset.outputs.unitypackage-file }}" \
            --unitypackage-checksum "${{ steps.unitypackage_asset.outputs.unitypackage-checksum }}" \
            --tag "${{ needs.verify-tag.outputs.tag }}"

      # ORDERING INVARIANT: a published GitHub Release must never exist without
      # the matching npm version. The IRREVERSIBLE npm publish runs FIRST; the
      # GitHub Release is created/finalized only AFTER it succeeds. If the npm
      # publish failed and the GitHub Release ran first, a non-draft Release
      # would advertise a version that npm never received.
      - name: Publish to npm with provenance
        run: |
          set -euo pipefail
          npx --yes --package=npm@^11.5.1 npm --version
          package_file="${{ steps.release_package.outputs.package-file }}"
          # Make publish safely RE-RUNNABLE: if this exact name@version is
          # already on the registry (a prior run published it before failing
          # downstream), skip the publish instead of failing on the
          # immutable-version error. The GitHub Release step still runs after.
          pkg="$(jq -r .name package.json)"
          ver="${{ needs.verify-tag.outputs.package-version }}"
          if npx --yes --package=npm@^11.5.1 npm view "${pkg}@${ver}" version \
              >/dev/null 2>&1; then
            echo "::notice::${pkg}@${ver} is already on the npm registry; skipping publish."
          else
            npx --yes --package=npm@^11.5.1 npm publish "${package_file}" --provenance --access public
          fi

      # Runs only AFTER npm publish above succeeds (or confirmed the version
      # already exists), preserving the ordering invariant: no published
      # GitHub Release without the matching npm version. The required
      # .unitypackage (+ .sha256) always rides along (guaranteed by Stage).
      - name: Create or update GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          UNITYPACKAGE_FILE: ${{ steps.unitypackage_asset.outputs.unitypackage-file }}
          UNITYPACKAGE_CHECKSUM: ${{ steps.unitypackage_asset.outputs.unitypackage-checksum }}
        run: |
          set -euo pipefail
          tag="${{ needs.verify-tag.outputs.tag }}"
          package_file="${{ steps.release_package.outputs.package-file }}"
          checksum_file="${{ steps.release_package.outputs.checksum-file }}"
          # The .unitypackage (+ .sha256) is guaranteed by the Stage step above.
          assets=("${package_file}" "${checksum_file}" "${UNITYPACKAGE_FILE}" "${UNITYPACKAGE_CHECKSUM}")
          if gh release view "${tag}" >/dev/null 2>&1; then
            gh release upload "${tag}" \
              "${assets[@]}" \
              --clobber
            gh release edit "${tag}" \
              --title "${tag}" \
              --notes-file .artifacts/release/release-notes.md \
              --draft=false
          else
            gh release create "${tag}" \
              "${assets[@]}" \
              --title "${tag}" \
              --notes-file .artifacts/release/release-notes.md \
              --verify-tag
          fi

      - name: Verify the published Release has every expected asset
        # Closes the v3.1.0 failure mode for good: assert the published release
        # carries all four assets (tgz + .sha256, unitypackage + .sha256). Runs
        # after npm publish + release creation, so a missing asset fails the run
        # LOUDLY instead of shipping a silently-incomplete release.
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PACKAGE_FILE: ${{ steps.release_package.outputs.package-file }}
          CHECKSUM_FILE: ${{ steps.release_package.outputs.checksum-file }}
          UNITYPACKAGE_FILE: ${{ steps.unitypackage_asset.outputs.unitypackage-file }}
          UNITYPACKAGE_CHECKSUM: ${{ steps.unitypackage_asset.outputs.unitypackage-checksum }}
        run: |
          set -euo pipefail
          tag="${{ needs.verify-tag.outputs.tag }}"
          expected=(
            "$(basename "${PACKAGE_FILE}")"
            "$(basename "${CHECKSUM_FILE}")"
            "$(basename "${UNITYPACKAGE_FILE}")"
            "$(basename "${UNITYPACKAGE_CHECKSUM}")"
          )
          published="$(gh release view "${tag}" --json assets --jq '.assets[].name')"
          missing=()
          for name in "${expected[@]}"; do
            if ! printf '%s\n' "${published}" | grep -Fqx "${name}"; then
              missing+=("${name}")
            fi
          done
          if [ "${#missing[@]}" -gt 0 ]; then
            echo "::error::Release ${tag} is missing expected assets: ${missing[*]}"
            exit 1
          fi
          echo "::notice::Release ${tag} has all ${#expected[@]} expected assets."

      - name: Upload the Asset Store submission staging artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: asset-store-submission
          path: .artifacts/asset-store-submission/
          if-no-files-found: error
          # overwrite: the documented unitypackage-failure recovery is a workflow
          # re-run, and attempt 1 already uploaded this artifact; without
          # overwrite the re-run 409s here AFTER npm publish + the GitHub
          # release succeeded, leaving a misleading red run.
          overwrite: true
          retention-days: 30
