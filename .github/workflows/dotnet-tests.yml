name: dotnet-tests

on:
  push:
    branches:
      - main
      - master
      - develop
    paths:
      - "**/*.cs"
      - "**/*.csproj"
      - "**/*.sln"
      - ".github/workflows/dotnet-tests.yml"
      - "Editor/Analyzers/**"
      - "SourceGenerators/**"
      - "SourceGenerators/global.json"
      - ".config/dotnet-tools.json"
  # No pull_request paths filter: the workflow must always start so its required
  # check reports on every PR shape. The `changes` job decides whether to do the
  # real work; when nothing relevant changed it skips to success. See
  # docs/runbooks/required-checks.md.
  pull_request:
    branches:
      - main
      - master
      - develop
  workflow_dispatch:

jobs:
  changes:
    name: Detect .NET-affecting changes
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
      pull-requests: read
    outputs:
      relevant: ${{ steps.filter.outputs.relevant }}
    steps:
      - name: Determine whether relevant files changed
        id: filter
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if [ "${{ github.event_name }}" != "pull_request" ]; then
            echo "relevant=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          if ! files="$(gh api \
            "repos/${{ github.repository }}/pulls/${{ github.event.pull_request.number }}/files" \
            --paginate --jq '.[].filename')"; then
            echo "relevant=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          if printf '%s\n' "$files" | grep -qE '(\.cs$|\.csproj$|\.sln$|^\.github/workflows/dotnet-tests\.yml$|^Editor/Analyzers/|^SourceGenerators/|^\.config/dotnet-tools\.json$)'; then
            echo "relevant=true" >> "$GITHUB_OUTPUT"
          else
            echo "relevant=false" >> "$GITHUB_OUTPUT"
          fi

  test:
    name: dotnet tests
    needs: changes
    if: ${{ always() && (needs.changes.result != 'success' || needs.changes.outputs.relevant != 'false') }}
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Validate change detection
        if: ${{ needs.changes.result != 'success' || (needs.changes.outputs.relevant != 'true' && needs.changes.outputs.relevant != 'false') }}
        run: |
          echo "::error::Change detection concluded '${{ needs.changes.result }}' with relevant='${{ needs.changes.outputs.relevant }}'."
          echo "::error::Required gates only skip after successful detection emits relevant=false."
          exit 1

      - name: Checkout
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          global-json-file: SourceGenerators/global.json

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22.18.0"

      - name: Install reportgenerator tool
        run: |
          dotnet tool install --global dotnet-reportgenerator-globaltool
          echo "$HOME/.dotnet/tools" >> "$GITHUB_PATH"

      - name: Restore
        working-directory: SourceGenerators
        run: >
          dotnet restore
          WallstopStudios.DxMessaging.SourceGenerators.Tests/WallstopStudios.DxMessaging.SourceGenerators.Tests.csproj
          /p:CopyAnalyzerPayload=false

      - name: Run generator diagnostics tests
        working-directory: SourceGenerators
        run: >
          dotnet test
          WallstopStudios.DxMessaging.SourceGenerators.Tests/WallstopStudios.DxMessaging.SourceGenerators.Tests.csproj
          --configuration Release
          /p:CopyAnalyzerPayload=false
          --collect:"XPlat Code Coverage"

      - name: Verify committed analyzer payload is current
        run: npm run check:analyzers

      - name: Generate coverage summary
        run: |
          mkdir -p artifacts/coverage
          # SourceGenerators/Directory.Build.props redirects test output to
          # .artifacts/$(MSBuildProjectName)/TestResults/, i.e.
          # .artifacts/WallstopStudios.DxMessaging.SourceGenerators.Tests/TestResults/...
          # A glob hardcoding ".artifacts/SourceGenerators.Tests/..." misses the
          # MSBuildProjectName prefix and reportgenerator fails with "found no
          # matching files". Match any redirected TestResults coverage file so a
          # future project rename cannot silently break the summary again.
          reportgenerator \
            -reports:".artifacts/**/TestResults/**/coverage.cobertura.xml" \
            -targetdir:"artifacts/coverage" \
            -reporttypes:"TextSummary;HtmlSummary;Cobertura"
          cat artifacts/coverage/Summary.txt

      - name: Upload coverage report
        uses: actions/upload-artifact@v7
        with:
          name: generator-coverage
          path: artifacts/coverage

      - name: Check for TODO/FIXME markers
        shell: bash
        run: |
          set -uo pipefail
          if rg --files-with-matches "(TODO|FIXME)" \
                --hidden \
                --no-ignore \
                -g '!.git/**' \
                -g '!.artifacts/**' \
                -g '!node_modules/**' \
                -g '!Tests/**/TestResults/**' \
                -g '!PLAN.md' \
                -g '!.vs/**'; then
            echo "::error::Found TODO/FIXME markers in the repository. Please resolve or suppress them."
            exit 1
          else
            echo "No TODO/FIXME markers detected."
          fi
