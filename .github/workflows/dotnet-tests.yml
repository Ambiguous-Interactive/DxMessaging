name: dotnet-tests

on:
  push:
    branches:
      - master
      - main
      - develop
    paths:
      - "**/*.cs"
      - "**/*.csproj"
      - "**/*.sln"
      - ".github/workflows/dotnet-tests.yml"
      - "Editor/Analyzers/**"
      - "SourceGenerators/**"
      - "SourceGenerators/global.json"
      - ".config/dotnet-tools.json"
  pull_request:
    branches:
      - "*"
    paths:
      - "**/*.cs"
      - "**/*.csproj"
      - "**/*.sln"
      - ".github/workflows/dotnet-tests.yml"
      - "Editor/Analyzers/**"
      - "SourceGenerators/**"
      - "SourceGenerators/global.json"
      - ".config/dotnet-tools.json"
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          global-json-file: SourceGenerators/global.json

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22.18.0"

      - name: Install reportgenerator tool
        run: |
          dotnet tool install --global dotnet-reportgenerator-globaltool
          echo "$HOME/.dotnet/tools" >> "$GITHUB_PATH"

      - name: Restore
        working-directory: SourceGenerators
        run: >
          dotnet restore
          WallstopStudios.DxMessaging.SourceGenerators.Tests/WallstopStudios.DxMessaging.SourceGenerators.Tests.csproj
          /p:CopyAnalyzerPayload=false

      - name: Run generator diagnostics tests
        working-directory: SourceGenerators
        run: >
          dotnet test
          WallstopStudios.DxMessaging.SourceGenerators.Tests/WallstopStudios.DxMessaging.SourceGenerators.Tests.csproj
          --configuration Release
          /p:CopyAnalyzerPayload=false
          --collect:"XPlat Code Coverage"

      - name: Verify committed analyzer payload is current
        run: npm run check:analyzers

      - name: Generate coverage summary
        run: |
          mkdir -p artifacts/coverage
          # SourceGenerators/Directory.Build.props redirects test output to
          # .artifacts/$(MSBuildProjectName)/TestResults/, i.e.
          # .artifacts/WallstopStudios.DxMessaging.SourceGenerators.Tests/TestResults/...
          # A glob hardcoding ".artifacts/SourceGenerators.Tests/..." misses the
          # MSBuildProjectName prefix and reportgenerator fails with "found no
          # matching files". Match any redirected TestResults coverage file so a
          # future project rename cannot silently break the summary again.
          reportgenerator \
            -reports:".artifacts/**/TestResults/**/coverage.cobertura.xml" \
            -targetdir:"artifacts/coverage" \
            -reporttypes:"TextSummary;HtmlSummary;Cobertura"
          cat artifacts/coverage/Summary.txt

      - name: Upload coverage report
        uses: actions/upload-artifact@v7
        with:
          name: generator-coverage
          path: artifacts/coverage

      - name: Check for TODO/FIXME markers
        shell: bash
        run: |
          set -uo pipefail
          if rg --files-with-matches "(TODO|FIXME)" \
                --hidden \
                --no-ignore \
                -g '!.git/**' \
                -g '!.artifacts/**' \
                -g '!node_modules/**' \
                -g '!Tests/**/TestResults/**' \
                -g '!PLAN.md' \
                -g '!.vs/**'; then
            echo "::error::Found TODO/FIXME markers in the repository. Please resolve or suppress them."
            exit 1
          else
            echo "No TODO/FIXME markers detected."
          fi
