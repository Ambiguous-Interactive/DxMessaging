name: CSharpier Check

on:
  # No pull_request paths filter: the workflow must always start so its required
  # check reports on every PR shape. The `changes` job decides whether to do the
  # real work; when nothing relevant changed it skips to success. See
  # docs/runbooks/required-checks.md.
  pull_request:
    branches:
      - main
      - master
  push:
    branches:
      - main
      - master
    paths:
      - "**/*.cs"
      - ".config/dotnet-tools.json"
      - ".csharpierrc*"
      - "**/.csharpierrc*"
      - ".csharpierignore"
      - "**/.csharpierignore"
      - ".editorconfig"
      - "**/.editorconfig"
      - ".github/workflows/csharpier-check.yml"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  changes:
    name: Detect C#-affecting changes
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
      pull-requests: read
    outputs:
      relevant: ${{ steps.filter.outputs.relevant }}
    steps:
      - name: Determine whether relevant files changed
        id: filter
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if [ "${{ github.event_name }}" != "pull_request" ]; then
            echo "relevant=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          if ! files="$(gh api \
            "repos/${{ github.repository }}/pulls/${{ github.event.pull_request.number }}/files" \
            --paginate --jq '.[].filename')"; then
            echo "relevant=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          pattern='(\.cs$|^\.config/dotnet-tools\.json$|(^|/)\.csharpierrc[^/]*$'
          pattern="$pattern"'|(^|/)\.csharpierignore$|(^|/)\.editorconfig$'
          pattern="$pattern"'|^\.github/workflows/csharpier-check\.yml$)'
          if printf '%s\n' "$files" | grep -qE "$pattern"; then
            echo "relevant=true" >> "$GITHUB_OUTPUT"
          else
            echo "relevant=false" >> "$GITHUB_OUTPUT"
          fi

  csharpier-check:
    name: Check C# formatting
    needs: changes
    if: ${{ always() && (needs.changes.result != 'success' || needs.changes.outputs.relevant != 'false') }}
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Validate change detection
        if: ${{ needs.changes.result != 'success' || (needs.changes.outputs.relevant != 'true' && needs.changes.outputs.relevant != 'false') }}
        run: |
          echo "::error::Change detection concluded '${{ needs.changes.result }}' with relevant='${{ needs.changes.outputs.relevant }}'."
          echo "::error::Required gates only skip after successful detection emits relevant=false."
          exit 1

      - name: Checkout
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Normalize line endings
        run: |
          git add --renormalize .
          git reset --hard

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "8.0.x"

      - name: Restore .NET tools
        run: dotnet tool restore

      - name: Run CSharpier check
        run: dotnet tool run csharpier check .
