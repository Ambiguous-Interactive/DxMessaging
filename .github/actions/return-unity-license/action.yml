name: Return Unity license
description: >-
  Return the runner's Unity activation, classify exact cleanup evidence, and
  report sanitized account-health evidence to the organization lock.
inputs:
  unity-editor-path:
    description: "Path to the resolved Unity editor executable."
    required: false
  prior-return-log-path:
    description: "Non-uploaded return log produced by the licensed command."
    required: false
  evidence-paths:
    description: "Newline-separated current-run files or directories to inspect for exact 20111 evidence."
    required: false
outputs:
  resource-safe:
    description: "Compatibility cleanup result; false for blocked account health."
    value: ${{ steps.health.outputs.resource-health == 'blocked' && 'false' || steps.return_license.outputs.resource-safe }}
  resource-cleanup-status:
    description: "confirmed only for exact positive cleanup evidence; otherwise unknown."
    value: ${{ steps.health.outputs.resource-health == 'blocked' && 'unknown' || steps.return_license.outputs.resource-cleanup-status }}
  resource-health:
    description: "healthy or blocked account classification."
    value: ${{ steps.health.outputs.resource-health }}
  resource-reason:
    description: "Stable sanitized evidence reason code."
    value: ${{ steps.health.outputs.resource-reason }}
runs:
  using: composite
  steps:
    - name: Return Unity license
      id: return_license
      shell: pwsh
      env:
        PRIOR_RETURN_LOG_PATH: ${{ inputs.prior-return-log-path }}
      run: |
        Set-StrictMode -Version Latest
        . (Join-Path '${{ github.action_path }}' 'Classify-UnityLicenseReturn.ps1')
        $PSNativeCommandUseErrorActionPreference = $false

        function Set-ConfirmedCleanupOutput {
          "resource-safe=true" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          "resource-cleanup-status=confirmed" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          "resource-reason=cleanup-confirmed" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
        }

        function Test-PriorReturnEvidence {
          if ([string]::IsNullOrWhiteSpace($env:PRIOR_RETURN_LOG_PATH)) {
            return $false
          }
          return Test-UnityLicenseReturnResourceSafe -ExitCode 0 -LogPath $env:PRIOR_RETURN_LOG_PATH
        }

        try {
          "resource-safe=false" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          "resource-cleanup-status=unknown" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          "resource-reason=return-missing-positive-evidence" | Out-File -FilePath $env:GITHUB_OUTPUT -Append

          $editorPath = '${{ inputs.unity-editor-path }}'
          if ([string]::IsNullOrWhiteSpace($editorPath)) {
            $editorPath = $env:UNITY_EDITOR_PATH
          }

          if ([string]::IsNullOrWhiteSpace($editorPath) -or -not (Test-Path -LiteralPath $editorPath -PathType Leaf)) {
            if (Test-PriorReturnEvidence) {
              Set-ConfirmedCleanupOutput
              Write-Host "::notice::Licensed work already produced exact positive Unity return evidence."
            } else {
              Write-Host "::notice::No usable Unity editor path or exact prior return evidence; cleanup remains unknown."
            }
            exit 0
          }

          if ([string]::IsNullOrWhiteSpace($env:UNITY_EMAIL) -or [string]::IsNullOrWhiteSpace($env:UNITY_PASSWORD)) {
            if (Test-PriorReturnEvidence) {
              Set-ConfirmedCleanupOutput
              Write-Host "::notice::Licensed work already produced exact positive Unity return evidence."
            } else {
              Write-Host "::warning::Unity credentials are unavailable and no exact prior return evidence exists; cleanup remains unknown."
            }
            exit 0
          }

          $licenseLogDir = if ($env:RUNNER_TEMP) { $env:RUNNER_TEMP } else { [System.IO.Path]::GetTempPath() }
          $returnLog = Join-Path $licenseLogDir 'unity-return-license.log'
          $returnArgs = @(
            '-quit',
            '-batchmode',
            '-nographics',
            '-returnlicense',
            '-username', $env:UNITY_EMAIL,
            '-password', $env:UNITY_PASSWORD,
            '-logFile', '-'
          )

          Write-Host "::group::Return Unity license"
          & $editorPath @returnArgs 2>&1 | Tee-Object -FilePath $returnLog
          $exitCode = $LASTEXITCODE
          Write-Host "::endgroup::"

          $currentReturnConfirmed = Test-UnityLicenseReturnResourceSafe -ExitCode $exitCode -LogPath $returnLog
          $priorReturnConfirmed = -not $currentReturnConfirmed -and (Test-PriorReturnEvidence)
          if ($currentReturnConfirmed -or $priorReturnConfirmed) {
            Set-ConfirmedCleanupOutput
            Write-Host "::notice::Unity cleanup has exact positive return evidence."
          } else {
            Write-Host "::warning::Unity returned without exact positive evidence; cleanup remains unknown."
          }
        } catch {
          $priorReturnConfirmed = $false
          try {
            $priorReturnConfirmed = Test-PriorReturnEvidence
          } catch {
            Write-Host "::warning::Exact prior return evidence could not be inspected."
          }
          if ($priorReturnConfirmed) {
            Set-ConfirmedCleanupOutput
            Write-Host "::notice::The dedicated post-activation return log contains exact positive cleanup evidence."
          } else {
            Write-Host "::warning::Unity license return hit an unexpected error. Cleanup remains unknown and this runner will be quarantined."
          }
        }
        exit 0

    - name: Classify Unity account health
      id: health
      shell: pwsh
      env:
        EVIDENCE_PATHS: ${{ inputs.evidence-paths }}
        HEALTHY_REASON: ${{ steps.return_license.outputs.resource-reason }}
      run: |
        $python = Get-Command python3 -CommandType Application -ErrorAction SilentlyContinue |
          Where-Object { -not [string]::IsNullOrWhiteSpace($_.Source) -and (Test-Path -LiteralPath $_.Source -PathType Leaf) } |
          Select-Object -First 1
        if ($null -eq $python) {
          $python = Get-Command python -CommandType Application -ErrorAction SilentlyContinue |
            Where-Object { -not [string]::IsNullOrWhiteSpace($_.Source) -and (Test-Path -LiteralPath $_.Source -PathType Leaf) } |
            Select-Object -First 1
        }
        if ($null -eq $python) {
          Write-Host "::error::A usable python3 or python executable is required to classify sanitized Unity account-health evidence."
          exit 1
        }
        & $python.Source "${{ github.action_path }}/classify_unity_account_health.py"
        exit $LASTEXITCODE
